<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>ATPC</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main>
    <div class="hero">
      <video class="hero__video" id="heroVideo" autoplay muted playsinline>
        <source src="atpcintro.mp4" type="video/mp4" />
      </video>
      <audio id="heroAudio" preload="auto" playsinline>
        <source src="atpccc5.mp3" type="audio/mpeg" />
      </audio>
      <div class="hint-wrap" id="tapHint" aria-hidden="true">
        <div class="particle-row">
          <div class="particle p1"></div>
          <div class="particle p2"></div>
          <div class="particle p3"></div>
          <div class="particle p4"></div>
        </div>
        <div class="hint-text">tap anywhere</div>
      </div>
      <a class="hero__title" id="heroTitle" href="stage/" aria-label="Open stage page">ATPC</a>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
