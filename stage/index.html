      const z0 = rest[i + 2];
      const t = clamp((half - y0) / len, 0, 1);
      const ssT = t * t * (3 - 2 * t);
      const wght = Math.pow(ssT, 1.62) * mw;
      const row = ssT;
      const rj = u.dfRowJ;
      const rowPh = row * Math.PI * 2 * rj;
      let dx =
        u.dfLat * Math.sin(tw * u.dfRx + ph + rowPh) * wght
        + u.dfLat2 * Math.sin(tw * u.dfRx2 + ph2 + rowPh * 2.17 + y0 * 0.0018) * wght
        + u.dfLat3 * Math.sin(tw * u.dfRx3 + ph3 + row * 5.5) * wght * (0.35 + 0.65 * row);
      let dz =
        u.dfOut * Math.sin(tw * u.dfRz + ph * 1.07 + rowPh * 1.55) * wght
        + u.dfOut2 * Math.cos(tw * u.dfRz2 + ph2 * 0.93 + rowPh * 2.8) * wght
        + u.dfOut3 * Math.sin(tw * u.dfRz3 + ph3 + row * 4.2) * wght * row;
      dx += wght * wkx * len * 0.031;
      dz += wght * wkz * len * 0.036;
      dx += u.dfCurl * Math.sin(tw * u.dfCr + rowPh * 3.4 + ph2 * 0.5) * wght * row * row;
      dz += u.dfShear * Math.sin(tw * u.dfCr * 1.3 + rowPh * 2.1 + ph * 0.7) * wght * row;
      const xN = x0 + dx;
      const zN = z0 + dz;
      arr[i] = xN;
      arr[i + 1] = y0;
      arr[i + 2] = zN;
    }
    posAttr.needsUpdate = true;
    geo.computeVertexNormals();
  }

  function updateScene(p) {
    const step = p * NSEG;
    const s = clamp(Math.floor(step), 0, NSEG - 1);
    const t = ss(step - s);
    const A = KF[s], B = KF[s + 1];

    posA.set(...A.pos); posB.set(...B.pos);
    lkA.set(...A.look); lkB.set(...B.look);

    let upliftBoost;
    /** Линейная доля сегмента по скроллу — равномерная скорость (без ss/cos/двойного smootherstep). */
    const uLin = clamp(step - s, 0, 1);
    /** Фаза Assembly: полёт в белый объём (3D); чертёж — отдельным кроссфейдом drawingPageT */
    const blueprintT = s === 7 ? smootherstep(uLin) : 0;
    const drawingPageT =
      s === 7
        ? ss(clamp((uLin - ASSEMBLY_PAGE_CROSS_START) / ASSEMBLY_PAGE_CROSS_LEN, 0, 1))
        : 0;
    const sceneWhiteMix = s === 7 ? blueprintT * (1 - 0.94 * drawingPageT) : 0;

    /** Фаза Light (sl3): солнце + god-rays синхронно с появлением луча */
    const lightSegA = INTERIOR_TABLE_LIGHT_SEG / NSEG;
    const lightSegB = (INTERIOR_TABLE_LIGHT_SEG + 1) / NSEG;
    const lightScrollU = clamp((p - lightSegA) / Math.max(1e-6, lightSegB - lightSegA), 0, 1);
    const lightEase = ss(lightScrollU);

    if (s === 5) {
      /** Предпоследний сегмент: перенос + look — тот же приём, что на финале (uLin), без «рваного» нарастания */
      camera.position.lerpVectors(posA, posB, uLin);
      lkT.lerpVectors(lkA, lkB, uLin);
      upliftBoost = 0;
    } else if (s === 6) {
      /** SPACE: наклон к окуляру; позиция KF6=KF7 */
      camera.position.lerpVectors(posA, posB, uLin);
      lkT.lerpVectors(lkA, lkB, uLin);
      upliftBoost = uLin;
    } else if (s === 7) {
      /** Assembly: кинематографичный полёт вперёд в белый объём к «чертежному» горизонту */
      const q = smootherstep(uLin);
      camera.position.lerpVectors(posA, posB, q);
      lkT.lerpVectors(lkA, lkB, q);
      upliftBoost = (1 - q) * 0.22;
    } else {
      camera.position.lerpVectors(posA, posB, t);
      lkT.lerpVectors(lkA, lkB, t);
      upliftBoost = 0;
    }

    const oculusOpKF = lerp(A.oculusOp ?? 0, B.oculusOp ?? 0, t);
    const interiorCamPhase = ss(clamp((p - 0.52) / 0.36, 0, 1));
    let wobbleAmt = (1 - 0.82 * interiorCamPhase) * (1 - 0.94 * upliftBoost);
    if (s === 7) wobbleAmt = 0;
    camera.position.x += Math.sin(clk * 0.14) * 0.06 * wobbleAmt;
    camera.position.y += Math.cos(clk * 0.1) * 0.05 * wobbleAmt;

    camera.lookAt(lkT);

    let fovK = cameraBaseFov + upliftBoost * 2.5;
    if (s === 7) {
      fovK = lerp(fovK, 42, blueprintT * 0.88);
    }
    camera.fov = fovK;
    camera.updateProjectionMatrix();

    if (sceneBgOrig && scene.background && scene.background.isColor) {
      scene.background.copy(sceneBgOrig).lerp(BLUEPRINT_WHITE, sceneWhiteMix);
    }
    if (scene.fog && fogColorOrig) {
      scene.fog.color.copy(fogColorOrig).lerp(BLUEPRINT_WHITE, sceneWhiteMix * 0.94);
      scene.fog.near = lerp(sceneFogNearOrig, 85, sceneWhiteMix);
      scene.fog.far = lerp(sceneFogFarOrig, 5200, sceneWhiteMix);
    }
    if (blueprintGlow) {
      blueprintGlow.intensity = 1.85 * blueprintT * (1 - 0.85 * drawingPageT);
      blueprintGlow.position.set(22, 168, 412);
    }
    const bloomA =
      s === 7 ? Math.min(1, 1.06 * blueprintT) * 0.92 * (1 - drawingPageT) : 0;
    if (whiteBloomEl) whiteBloomEl.style.opacity = String(bloomA);
    if (assemblyShellEl && assemblyIFrameEl && stageCanvasEl) {
      assemblyShellEl.style.opacity = drawingPageT > 0.002 ? String(drawingPageT) : '0';
      assemblyShellEl.style.background = '#ffffff';
      const iframeReveal =
        drawingPageT < 0.07 ? 0 : ss(clamp((drawingPageT - 0.07) / 0.86, 0, 1));
      assemblyIFrameEl.style.opacity = String(iframeReveal);
      assemblyShellEl.classList.toggle('on', drawingPageT > 0.055);
      const suppressStageAudio = drawingPageT > 0.055;
      if (stageAudioAmbientSuppressed !== suppressStageAudio) {
        stageAudioAmbientSuppressed = suppressStageAudio;
        syncStageAudioPlayback();
      }
      stageCanvasEl.style.opacity = String(1 - drawingPageT);
      stageCanvasEl.style.pointerEvents = 'none';
      /**
       * Safari: вложенный ambient-stage-2026 иногда открывается с scroll внизу (restoration / ранний layout).
       * Сбрасываем при первом заметном появлении чертежа и при повторном входе в зону после отката скролла родителя.
       */
      if (s === 7 && drawingPageT > 0.055 && ambientRevealPrevT <= 0.055) {
        resetEmbeddedAmbientScroll();
      }
      if (s !== 7 || drawingPageT < 0.02) ambientRevealPrevT = 0;
      else ambientRevealPrevT = drawingPageT;
      const drawingEnd = s === 7 && drawingPageT > 0.93;
      document.body.classList.toggle('atpc-drawing-end', drawingEnd);
      document.documentElement.classList.toggle('atpc-drawing-end', drawingEnd);
    } else if (stageCanvasEl) {
      if (stageAudioAmbientSuppressed) {
        stageAudioAmbientSuppressed = false;
        syncStageAudioPlayback();
      }
      stageCanvasEl.style.opacity = '1';
      stageCanvasEl.style.pointerEvents = 'none';
    }

    const cy = lerp(A.canopyY, B.canopyY, t);
    const tf = lerp(A.tFade, B.tFade, t);
    canopyGroup.position.y = cy;

    if (squareBedTentGroup && squareFabricMats && squareFabricMats.length) {
      squareBedTentGroup.visible = s < 7 || uLin < 0.04;
      const settleFade = 1 - ss(clamp(p / 0.38, 0, 1));
      const parentBob = Math.sin(clk * 0.52) * 0.18 * TENT_SCALE * settleFade;
      squareBedTentGroup.position.y = parentBob;
      const baseOp = clamp(0.34 + 0.52 * clamp(tf, 0.5, 1), 0.34, 0.78);
      const wallReveal = ss(clamp((p - WALLS_SCROLL_START) / (WALLS_SCROLL_END - WALLS_SCROLL_START), 0, 1));
      if (tentFloorMesh && tentFloorMesh.userData.floorBaseY != null) {
        const fby = tentFloorMesh.userData.floorBaseY;
        const drop =
          tentFloorMesh.userData.floorDropFromSky
          ?? SQ_ROOF_Y - fby + 2.05 * TENT_SCALE + FLOOR_SKY_DROP_EXTRA_SCALE * TENT_SCALE;
        if (p < FLOOR_DESCENT_START_P) {
          tentFloorMesh.visible = false;
        } else {
          const span = Math.max(1e-6, FLOOR_DESCENT_END_P - FLOOR_DESCENT_START_P);
          const linear = clamp((p - FLOOR_DESCENT_START_P) / span, 0, 1);
          const slowed = Math.pow(linear, FLOOR_DESCENT_SLOW_POW);
          const landEase = slowed * slowed * (3 - 2 * slowed);
          tentFloorMesh.visible = true;
          tentFloorMesh.position.y = fby + (1 - landEase) * drop;
          const sc = 0.965 + 0.035 * landEase;
          tentFloorMesh.scale.set(sc, 1, sc);
        }
      }
      if (squareWallMesh) {
        const wallsOn = wallReveal > 0.004;
        squareWallMesh.visible = wallsOn || upliftBoost > 0.008;
      }
      const roofProg = clamp((p - ROOF_SCROLL_START) / (ROOF_SCROLL_END - ROOF_SCROLL_START), 0, 1);
      const roofInstallEase = ss(ss(roofProg));
      if (squareFabricRoofGroup) {
        const roofOn = p >= ROOF_SCROLL_START - 1e-8;
        squareFabricRoofGroup.visible = roofOn;
        let roofLocalY;
        if (!roofOn) {
          roofLocalY = ROOF_DESCEND_Y;
        } else if (p < ROOF_SCROLL_END) {
          roofLocalY = (1 - roofInstallEase) * ROOF_DESCEND_Y;
        } else {
          roofLocalY = -parentBob;
        }
        squareFabricRoofGroup.position.y = roofLocalY;
      }
      const skyHold = upliftBoost;
      const fabricSheer = [
        0.64 + 0.24 * skyHold,
        0.36 + 0.2 * skyHold,
        0.5 + 0.46 * skyHold,
        0.46,
      ];
      const roofGlow = 1 + 0.14 * upliftBoost;
      squareFabricMats.forEach((m, mi) => {
        if (mi === 3) {
          /** Пол: фиксированный цвет/альфа — не привязываем к wallReveal / фазам (не затемнять) */
          m.opacity = 1;
          m.transparent = false;
          return;
        }
        const sheer = fabricSheer[Math.min(mi, fabricSheer.length - 1)];
        const wallMul = mi === 2
          ? (skyHold > 0.008 ? Math.max(wallReveal, 0.22 + 0.78 * skyHold) : wallReveal)
          : 1;
        const topMul = mi <= 1 ? roofGlow : mi === 2 ? 1 + 0.22 * skyHold : 1;
        let op = Math.min(1, baseOp * sheer * wallMul * topMul);
        if (mi <= 1) {
          if (p < ROOF_SCROLL_START) op = 0;
          else op *= roofInstallEase;
        }
        m.opacity = op;
        m.transparent = true;
        if (mi === 0) {
          m.emissiveIntensity = 0.034 * (1 + 0.9 * skyHold);
        } else if (mi === 1) {
          m.emissiveIntensity = 0.048 * (1 + 0.45 * skyHold);
        } else if (mi === 2) {
          m.emissiveIntensity = 0.042 * (1 + 1.1 * skyHold);
        }
      });
      if (squareTentStakeMesh) {
        squareTentStakeMesh.visible = wallReveal > 0.02;
      }
      if (squareTentDiagMat) {
        squareTentDiagMat.opacity = 0.34 * baseOp;
      }
      if (hangingInteriorFabricGroup) {
        let hangAccentT = 0;
        if (p >= ROOF_SCROLL_START && p < ROOF_SCROLL_END) {
          const uLate = clamp(
            (roofProg - HANGING_PROFILE_LATE_START) / Math.max(1e-6, 1 - HANGING_PROFILE_LATE_START),
            0,
            1
          );
          hangAccentT = ss(uLate);
        } else if (p >= ROOF_SCROLL_END) {
          hangAccentT = 1;
        }
        const hangVis = hangAccentT > 0.008 && p >= ROOF_SCROLL_START - 1e-6 && wallReveal > 0.02;
        hangingInteriorFabricGroup.visible = hangVis;
        if (hangVis) {
          const tw = clk * HANG_WIND_CLK;
          /** Общий «порыв» для всех полос — ощущение одного потока воздуха в объёме */
          const windGustX =
            Math.sin(tw * 0.098 + 0.31) * 0.095
            + Math.sin(tw * 0.171 + 1.12) * 0.042
            + Math.sin(tw * 0.246 + 0.55) * 0.026;
          const windGustZ =
            Math.sin(tw * 0.084 + 0.18) * 0.118
            + Math.cos(tw * 0.152 + 0.74) * 0.052
            + Math.sin(tw * 0.203 + 2.1) * 0.028;
          hangingInteriorFabricGroup.traverse((obj) => {
            if (obj.isMesh && obj.material && obj.material.userData && obj.material.userData.hangBaseOpacity != null) {
              const b = obj.material.userData.hangBaseOpacity;
              obj.material.opacity = b * hangAccentT;
              obj.material.transparent = true;
            }
            if (!obj.userData.panelSway) return;
            const u = obj.userData;
            const mw = Math.max(0.18, hangAccentT);
            const wk = u.windK;
            obj.position.set(u.anchorPx, u.anchorPy, u.anchorPz);
            obj.rotation.x = 0;
            obj.rotation.z = 0;
            obj.rotation.y = u.baseRy + Math.sin(tw * 0.036 + u.swayPhase * 0.8) * 0.0075 * mw;
            for (let ci = 0; ci < obj.children.length; ci++) {
              const ch = obj.children[ci];
              if (!ch.isMesh || !ch.userData.hangRestPos) continue;
              ch.rotation.set(0, 0, 0);
              deformHangStrip(ch, u, tw, windGustX, windGustZ, mw, wk);
            }
          });
        }
      }
    }

    const bpDim = 1 - blueprintT * 0.9;
    /** Assembly: объёмные лучи и «кратер» не гаснут с bpDim — контролируемый рост к финалу */
    const volEase = s === 7 ? smootherstep(uLin) : 0;
    const volVis = s === 7 ? lerp(0.44, 1.42, volEase) : bpDim;
    const rayBoostEff = s === 7 ? lerp(1.05, 1.78, volEase) : (1 + 0.55 * upliftBoost);
    const rayAperture = s === 7 ? lerp(0.82, 1.45, volEase) : (0.88 + 0.35 * oculusOpKF);
    if (mainSun && hemiMain) {
      const uDim = ss(clamp((p - INTERIOR_PROPS_START) / (INTERIOR_PROPS_FULL - INTERIOR_PROPS_START + 0.08), 0, 1));
      const skyDim = upliftBoost * oculusOpKF;
      let sunI = lerp(0.68, 0.48, uDim) + 0.38 * upliftBoost;
      sunI *= 1 - 0.1 * skyDim;
      sunI *= 1 + 0.26 * lightEase;
      mainSun.intensity = Math.max(0.22, sunI) * bpDim;
      let hemiI = (lerp(0.48, 0.38, uDim) + 0.08 * upliftBoost) * (1 - 0.18 * skyDim);
      hemiI *= 1 + 0.1 * lightEase;
      hemiMain.intensity = Math.max(0.12, hemiI) * bpDim;
      if (fillSun) {
        /** Луч/заливка остаются в кадре до конца SPACE — не гасим при взгляде вверх */
        fillSun.intensity = 0.152 * (1 + 0.42 * lightEase) * bpDim;
      }
      mainSun.position.set(58, 132 + 48 * upliftBoost, 52);
    }
    if (sceneAmbient) {
      sceneAmbient.intensity = 0.09 * (1 - 0.22 * upliftBoost * oculusOpKF) * (0.55 + 0.45 * bpDim);
    }
    if (oculusSpot) {
      const sb = upliftBoost * oculusOpKF;
      oculusSpot.visible = sb > 0.02;
      oculusSpot.intensity = Math.max(2.95, 3.65 * sb) * bpDim;
    }

    const mastS = lerp(A.mast, B.mast, t);
    mastGroup.visible = false;
    mastGroup.scale.setScalar(1);
    mastGroup.scale.y = Math.max(0.001, mastS);

    const sh = lerp(A.shadow, B.shadow, t);
    shadowDisc.material.opacity = sh * bpDim;

    const bA = lerp(A.beam, B.beam, t);
    const rA = lerp(A.rays, B.rays, t);
    const cab = lerp(A.cable, B.cable, t);

    /** Плавное нарастание вместо порога bA>0.02 — иначе луч «щёлкает» кадрами */
    const beamPulseAnim = 0.86 + Math.sin(clk * 0.24) * 0.14;
    const beamStrengthSmooth = ss(clamp(bA / 0.16, 0, 1));
    const pulse = beamPulseAnim * beamStrengthSmooth;
    const beamLightBoost = 1 + 0.24 * lightEase;
    bCoreMat.opacity = 0.14 * bA * pulse * rayBoostEff * volVis * beamLightBoost;
    bHaloMat.opacity = 0.055 * bA * pulse * rayBoostEff * volVis * beamLightBoost;
    poolMat.opacity = 0.32 * bA * (0.82 + Math.sin(clk * 0.33) * 0.18) * (1 + 0.45 * upliftBoost) * volVis * beamLightBoost;

    const oculusWorldY = SQ_ROOF_OCULUS_Y;
    bGrp.position.set(OCULUS_CENTER_X, oculusWorldY + 1.4 * TENT_SCALE, OCULUS_CENTER_Z);

    const rayPulseAnim = 0.8 + Math.sin(clk * 0.31) * 0.2;
    const rayStrengthSmooth = ss(clamp(rA / 0.2, 0, 1));
    const rayPulse = rayPulseAnim * rayStrengthSmooth;
    const godRayPack =
      rA * rayPulse * rayBoostEff * rayAperture * volVis * (1 + 0.32 * lightEase);
    const rayOpScale = s === 7 ? lerp(1, 1.22, volEase) : 1;
    rayGrp.position.set(0, 0, 0);
    const oW = oculusWorldY;
    const rayColumn = rayGrp.getObjectByName('godRayColumn');
    if (rayColumn) {
      rayColumn.position.set(OCULUS_CENTER_X, oW, OCULUS_CENTER_Z);
      rayColumn.rotation.x = 0.062;
    }
    if (rayMats.length) {
      const opShell = Math.min(1, 0.048 * rayOpScale * godRayPack * 1.15);
      const opCore = Math.min(1, 0.128 * rayOpScale * godRayPack * 1.35);
      const opFin = Math.min(1, 0.036 * rayOpScale * godRayPack * 1.08);
      if (rayMats[0]) rayMats[0].opacity = opShell;
      if (rayMats[1]) rayMats[1].opacity = opCore;
      for (let ri = 2; ri < rayMats.length; ri++) rayMats[ri].opacity = opFin;
    }
    if (godSunGroup && godSunMat && godSunSprite) {
      sunDirTmp.set(58, 132 + 48 * upliftBoost, 52).normalize();
      const sunLift = RAY_LEN_SKY * 0.9 + 1040;
      godSunGroup.position.set(
        OCULUS_CENTER_X + sunDirTmp.x * sunLift,
        SQ_ROOF_OCULUS_Y + sunDirTmp.y * sunLift,
        OCULUS_CENTER_Z + sunDirTmp.z * sunLift
      );
      const sunStrength = clamp(
        Math.max(lightEase * 0.98, rA * 0.9 + upliftBoost * 0.3) * (1 - blueprintT * 0.94),
        0,
        1
      );
      godSunGroup.visible = sunStrength > 0.002;
      godSunMat.opacity = ss(clamp(sunStrength * 1.25, 0, 1)) * 0.88;
      const sc = (TENT_SCALE / 24) * (320 + 110 * sunStrength);
      godSunSprite.scale.set(sc, sc, 1);
    }
    if (s === 7) {
      volRayColorTmp.setHex(BCOL).lerp(VOL_RAY_WHITE, volEase * 0.52);
      bCoreMat.color.copy(volRayColorTmp);
      bHaloMat.color.copy(volRayColorTmp);
      poolMat.color.copy(volRayColorTmp);
      for (let ri = 0; ri < rayMats.length; ri++) rayMats[ri].color.copy(volRayColorTmp);
    } else {
      bCoreMat.color.setHex(BCOL);
      bHaloMat.color.setHex(BCOL);
      poolMat.color.setHex(BCOL);
      const cCore = 0xfff6e0;
      const cFin = 0xffefcc;
      if (rayMats[0]) rayMats[0].color.setHex(BCOL);
      if (rayMats[1]) rayMats[1].color.setHex(cCore);
      for (let ri = 2; ri < rayMats.length; ri++) rayMats[ri].color.setHex(cFin);
    }

    updateTreeGuyCables(
      cab * 0.62 * bpDim,
      squareBedTentGroup ? squareBedTentGroup.position.y : 0
    );

    const oculusShow = upliftBoost * oculusOpKF;
    if (oculus && oclMat) {
      oculus.visible = oculusShow > 0.035;
      oclMat.opacity = oculus.visible ? 0.18 + 0.52 * oculusShow : 0;
      oclMat.transparent = oclMat.opacity < 0.995;
    }

    LWIN.forEach(([inAt, outAt], i) => {
      labels[i].classList.toggle('on', p >= inAt && p <= outAt);
    });

    document.body.classList.toggle('atpc-ui-dark', p >= INTERIOR_UI_START_P);

    if (scrollHint) {
      /** Только финал Assembly (белый объём / чертёж) — не глушить подсказку на всём скролле (раньше p>0.06 отключал её почти сразу) */
      const sceneHide = blueprintT > 0.22;
      scrollHint.classList.toggle('hidden', sceneHide || !scrollHintScrollIdle);
    }

    if (interiorGroup) {
      const tableSegStart = INTERIOR_TABLE_LIGHT_SEG / NSEG;
      const tableSegEnd = (INTERIOR_TABLE_LIGHT_SEG + 1) / NSEG;
      const uTable = clamp(
        (p - tableSegStart) / Math.max(1e-6, tableSegEnd - tableSegStart),
        0,
        1
      );
      const uProps = clamp(
        (p - INTERIOR_PROPS_START) / (INTERIOR_PROPS_FULL - INTERIOR_PROPS_START),
        0,
        1
      );
      const uGroup = Math.max(uTable, uProps);
      interiorGroup.visible =
        (p >= tableSegStart - 1e-5 || uProps > 0.006) && (s < 7 || uLin < 0.035);
      const scG = (0.9 + 0.1 * ss(uGroup)) * INTERIOR_SCALE;
      interiorGroup.scale.setScalar(scG);

      if (djSpeakersRiseGroup && djSpeakersRiseGroup.userData.riseLift != null) {
        const spkEase = ss(uTable * 0.9);
        djSpeakersRiseGroup.position.y =
          -djSpeakersRiseGroup.userData.riseLift * (1 - spkEase);
        /**
         * Фронт колонок +Z: азимут — из центра lowDjBooth к камере в XZ; затем +70° вокруг Y в плоскости пола.
         * Фиксация базового направления после uTable>SPK_FACE_LOCK_U.
         */
        const SPK_FACE_LOCK_U = 0.62;
        const sud = djSpeakersRiseGroup.userData;
        if (!sud.faceDirLocked) {
          const booth = djSpeakersRiseGroup.parent;
          if (booth) booth.getWorldPosition(djSpkBoothW);
          else djSpeakersRiseGroup.getWorldPosition(djSpkBoothW);
          camera.getWorldPosition(djSpkCamW);
          djSpkDir.copy(djSpkCamW).sub(djSpkBoothW);
          djSpkDir.y = 0;
          if (djSpkDir.lengthSq() < 1e-12) djSpkDir.set(0, 0, 1);
          else djSpkDir.normalize();
          if (uTable >= SPK_FACE_LOCK_U) sud.faceDirLocked = djSpkDir.clone();
        } else {
          djSpkDir.copy(sud.faceDirLocked);
        }
        djSpkFaceDir.copy(djSpkDir).applyQuaternion(DJ_SPK_YAW_EXTRA);
        djSpkFaceDir.y = 0;
        if (djSpkFaceDir.lengthSq() < 1e-12) djSpkFaceDir.set(0, 0, 1);
        else djSpkFaceDir.normalize();
        djSpeakersRiseGroup.children.forEach((anchor) => {
          const spk = anchor.children[0];
          if (!spk || !spk.isObject3D) return;
          djSpkAlignQuat.setFromUnitVectors(new THREE.Vector3(0, 0, 1), djSpkFaceDir);
          const par = spk.parent;
          if (par) {
            par.updateWorldMatrix(true, false);
            par.getWorldQuaternion(djSpkParentQuat);
            spk.quaternion.copy(djSpkParentQuat).invert().multiply(djSpkAlignQuat);
          } else {
            spk.quaternion.copy(djSpkAlignQuat);
          }
        });
      }

      /** Напольные подушки: короче окно подъёма — заметны уже в ходе Light */
      const riseSpanDefault = 0.52;
      /** uNode ≤ 1; большие interiorDelay давали t0=0. Масштабируем задержки в [0 … riseDelayCap], порядок сохраняем */
      const riseDelayCap = 0.34;
      const interiorDelayRef = 2.4;
      function applyInteriorOpacity(root, ti, futonFade) {
        const op = clamp(ti * 1.08 * futonFade, 0, 1);
        root.traverse((obj) => {
          if (obj.isMesh && obj.material && obj.material.opacity !== undefined) {
            obj.material.opacity = op;
            obj.material.transparent = obj.material.opacity < 0.995;
          }
        });
      }
      interiorGroup.children.forEach((node) => {
        const ud = node.userData;
        if (!ud.interiorBase) return;
        const uNode =
          node.name === 'lowDjBooth' || node.userData.interiorReveal === 'table'
            ? uTable
            : node.userData.interiorReveal === 'lounge'
              ? uGroup
              : uProps;
        const dEff = Math.min(
          riseDelayCap * (ud.interiorDelay / interiorDelayRef),
          riseDelayCap
        );
        const riseSpan = ud.interiorReveal === 'lounge' ? 0.36 : riseSpanDefault;
        const t0 = clamp((uNode - dEff) / riseSpan, 0, 1);
        const ti = interiorRiseEase(t0);
        const { bx, by, bz } = ud.interiorBase;
        node.position.set(bx, by - INTERIOR_BURY_Y * (1 - ti), bz);
        const scM = 0.18 + 0.82 * ti;
        node.scale.setScalar(scM);
        const futonFade = 1 - 0.4 * upliftBoost;
        if (node.isMesh && node.material && node.material.opacity !== undefined) {
          node.material.opacity = clamp(ti * 1.08 * futonFade, 0, 1);
          node.material.transparent = node.material.opacity < 0.995;
        } else {
          applyInteriorOpacity(node, ti, futonFade);
        }
        const baseRy = ud.interiorRotY ?? 0;
        const tw = ud.interiorTwist ?? 0;
        node.rotation.y = baseRy + tw * (1 - ti);
      });
    }
  }

    /** Скруглённый «матрас» (сфероид), ~м → локаль интерьера шатра */
    function makeRoundedBox(W, H, D) {
      const positions = [];
      const normals = [];
      const uvs = [];
      const indices = [];
      const ws = 24;
      const hs = 12;
      for (let iy = 0; iy <= hs; iy++) {
        const v = iy / hs;
        for (let ix = 0; ix <= ws; ix++) {
          const u = ix / ws;
          const theta = u * Math.PI * 2;
          const phi = v * Math.PI;
          const sx = Math.sin(phi) * Math.cos(theta);
          const sy = Math.cos(phi);
          const sz = Math.sin(phi) * Math.sin(theta);
          positions.push(
            Math.sign(sx) * Math.pow(Math.abs(sx), 0.65) * W / 2,
            Math.sign(sy) * Math.pow(Math.abs(sy), 0.55) * H / 2,
            Math.sign(sz) * Math.pow(Math.abs(sz), 0.65) * D / 2
          );
          normals.push(sx, sy, sz);
          uvs.push(u, 1 - v);
        }
      }
      for (let iy = 0; iy < hs; iy++) {
        for (let ix = 0; ix < ws; ix++) {
          const a = iy * (ws + 1) + ix;
          const b = a + 1;
          const c = (iy + 1) * (ws + 1) + ix + 1;
          const d = (iy + 1) * (ws + 1) + ix;
          indices.push(a, b, d, b, c, d);
        }
      }
      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
      geo.setAttribute('normal', new THREE.Float32BufferAttribute(normals, 3));
      geo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
      geo.setIndex(indices);
      geo.computeVertexNormals();
      return geo;
    }

    /**
     * Подушка-суперэллипсоид: меньшие показатели px/pz → пышнее «бочкообразный» объём,
     * py побольше — менее сплюснута по вертикали, выпуклее сверху/снизу.
     */
    function makePillowGeo(W, H, D, pows = { px: 0.6, py: 0.45, pz: 0.6 }) {
      const positions = [];
      const normals = [];
      const uvs = [];
      const indices = [];
      const ws = 18;
      const hs = 12;
      const { px, py, pz } = pows;
      for (let iy = 0; iy <= hs; iy++) {
        const v = iy / hs;
        for (let ix = 0; ix <= ws; ix++) {
          const u = ix / ws;
          const theta = u * Math.PI * 2;
          const phi = v * Math.PI;
          const sx = Math.sin(phi) * Math.cos(theta);
          const sy = Math.cos(phi);
          const sz = Math.sin(phi) * Math.sin(theta);
          positions.push(
            Math.sign(sx) * Math.pow(Math.abs(sx), px) * W / 2,
            Math.sign(sy) * Math.pow(Math.abs(sy), py) * H / 2,
            Math.sign(sz) * Math.pow(Math.abs(sz), pz) * D / 2
          );
          normals.push(sx, sy, sz);
          uvs.push(u, 1 - v);
        }
      }
      for (let iy = 0; iy < hs; iy++) {
        for (let ix = 0; ix < ws; ix++) {
          const a = iy * (ws + 1) + ix;
          const b = a + 1;
          const c = (iy + 1) * (ws + 1) + ix + 1;
          const d = (iy + 1) * (ws + 1) + ix;
          indices.push(a, b, d, b, c, d);
        }

      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
      geo.setAttribute('normal', new THREE.Float32BufferAttribute(normals, 3));
      geo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
      geo.setIndex(indices);
      geo.computeVertexNormals();
      return geo;
    }

    /**
     * Concrete brutalist monolith — parent.add; азимут в updateScene (фронт с динамиками — локальный +Z).
     */
    function makeConcreteMonolithSpeaker(parent, x, y, z) {
      const M = getConcreteMonolithSpkTextures();
      const {
        concSmoothM,
        concRoughM,
        wooferRingM,
        wooferConeM,
        wooferSurrM,
        dustCapM,
        cableM,
        innerExposedM,
        crackLineM,
        roughRingM,
        topDetailM,
      } = M;
      const g = new THREE.Group();
      const CW = 0.52;
      const CH = 1.35;
      const CD = 0.38;

      const body = new THREE.Mesh(new THREE.BoxGeometry(CW, CH, CD), concSmoothM);
      body.position.set(0, CH / 2, 0);
      body.castShadow = true;
      body.receiveShadow = true;
      g.add(body);

      const crackZone = new THREE.Mesh(new THREE.BoxGeometry(0.06, CH * 0.85, CD * 0.18), concRoughM);
      crackZone.position.set(CW / 2 - 0.01, CH * 0.52, 0);
      crackZone.rotation.y = 0.15;
      g.add(crackZone);

      const crackFragments = [
        { x: CW / 2 + 0.018, y: CH * 0.78, z: 0.02, rx: 0.2, ry: 0.3, s: [0.055, 0.12, 0.08] },
        { x: CW / 2 + 0.028, y: CH * 0.65, z: -0.04, rx: -0.1, ry: -0.2, s: [0.08, 0.09, 0.12] },
        { x: CW / 2 + 0.012, y: CH * 0.52, z: 0.06, rx: 0.3, ry: 0.15, s: [0.045, 0.14, 0.07] },
        { x: CW / 2 + 0.035, y: CH * 0.42, z: -0.02, rx: -0.2, ry: 0.25, s: [0.07, 0.08, 0.1] },
        { x: CW / 2 + 0.022, y: CH * 0.3, z: 0.03, rx: 0.15, ry: -0.18, s: [0.06, 0.11, 0.09] },
        { x: CW / 2 + 0.015, y: CH * 0.22, z: -0.05, rx: 0.25, ry: 0.1, s: [0.05, 0.07, 0.08] },
        { x: CW / 2 - 0.015, y: CH * 0.7, z: 0.08, rx: -0.1, ry: 0.2, s: [0.04, 0.18, 0.06] },
        { x: CW / 2 + 0.008, y: CH * 0.58, z: -0.07, rx: 0.1, ry: -0.1, s: [0.05, 0.09, 0.05] },
      ];
      crackFragments.forEach((f) => {
        const frag = new THREE.Mesh(new THREE.BoxGeometry(f.s[0], f.s[1], f.s[2]), concRoughM);
        frag.position.set(f.x, f.y, f.z);
        frag.rotation.set(f.rx, f.ry, f.rx * 0.5);
        frag.castShadow = true;
        g.add(frag);
      });

      const innerExposed = new THREE.Mesh(new THREE.BoxGeometry(0.04, CH * 0.72, CD * 0.55), innerExposedM);
      innerExposed.position.set(CW / 2 - 0.005, CH * 0.5, 0);
      innerExposed.rotation.y = -0.05;
      g.add(innerExposed);

      const crackLine = new THREE.Mesh(new THREE.BoxGeometry(0.012, CH * 0.82, 0.012), crackLineM);
      crackLine.position.set(CW / 2 - 0.024, CH * 0.52, 0);
      crackLine.rotation.y = 0.08;
      g.add(crackLine);

      const fz = CD / 2;
      const wooferPositions = [
        { y: CH * 0.76, r: 0.095 },
        { y: CH * 0.5, r: 0.115 },
        { y: CH * 0.24, r: 0.105 },
      ];
      wooferPositions.forEach(({ y, r }) => {
        const wx = -CW * 0.06;

        const roughRing = new THREE.Mesh(new THREE.CylinderGeometry(r + 0.032, r + 0.032, 0.025, 32), roughRingM);
        roughRing.rotation.x = Math.PI / 2;
        roughRing.position.set(wx, y, fz + 0.005);
        g.add(roughRing);

        const ring = new THREE.Mesh(new THREE.CylinderGeometry(r + 0.004, r + 0.004, 0.018, 36), wooferRingM);
        ring.rotation.x = Math.PI / 2;
        ring.position.set(wx, y, fz + 0.01);
        g.add(ring);

        const surr = new THREE.Mesh(new THREE.CylinderGeometry(r, r, 0.022, 36), wooferSurrM);
        surr.rotation.x = Math.PI / 2;
        surr.position.set(wx, y, fz + 0.014);
        g.add(surr);

        const cone = new THREE.Mesh(new THREE.CylinderGeometry(0.025, r - 0.01, 0.06, 36), wooferConeM);
        cone.rotation.x = -Math.PI / 2;
        cone.position.set(wx, y, fz + 0.018);
        g.add(cone);

        const dome = new THREE.Mesh(
          new THREE.SphereGeometry(0.024, 18, 9, 0, Math.PI * 2, 0, Math.PI / 2),
          dustCapM
        );
        dome.rotation.x = Math.PI / 2;
        dome.position.set(wx, y, fz + 0.046);
        g.add(dome);

        for (let i = 0; i < 5; i++) {
          const angle = (i / 5) * Math.PI * 2 + Math.random() * 0.5;
          const dist = r + 0.025 + Math.random() * 0.025;
          const chip = new THREE.Mesh(
            new THREE.BoxGeometry(0.02 + Math.random() * 0.035, 0.015 + Math.random() * 0.025, 0.012),
            concRoughM
          );
          chip.position.set(
            wx + Math.cos(angle) * dist,
            y + Math.sin(angle) * dist,
            fz + 0.012 + Math.random() * 0.01
          );
          chip.rotation.set(Math.random() * 0.4, Math.random() * 0.4, angle);
          g.add(chip);
        }
      });

      const cablePts = [
        new THREE.Vector3(-CW * 0.06, 0.04, fz),
        new THREE.Vector3(-CW * 0.06, 0.02, fz + 0.05),
        new THREE.Vector3(-CW * 0.14, 0.01, fz + 0.12),
        new THREE.Vector3(-CW * 0.28, 0.008, fz + 0.18),
        new THREE.Vector3(-CW * 0.55, 0.006, fz + 0.22),
        new THREE.Vector3(-CW * 0.8, 0.005, fz + 0.25),
      ];
      const cable = new THREE.Mesh(
        new THREE.TubeGeometry(new THREE.CatmullRomCurve3(cablePts), 20, 0.009, 8, false),
        cableM
      );
      g.add(cable);

      const topDetail = new THREE.Mesh(new THREE.BoxGeometry(CW + 0.004, 0.018, CD + 0.004), topDetailM);
      topDetail.position.set(0, CH, 0);
      g.add(topDetail);

      g.position.set(x, y, z);
      parent.add(g);
      return g;
    }

    const lowDjBooth = new THREE.Group();
    lowDjBooth.name = 'lowDjBooth';

    const benchTopMat = new THREE.MeshStandardMaterial({
      color: 0xf3ead9,
      roughness: 0.82,
      metalness: 0.02,
      envMap: scene.environment,
      envMapIntensity: 0.55,
    });
    const benchLegMat = new THREE.MeshStandardMaterial({
      color: 0xe7dac1,
      roughness: 0.8,
      metalness: 0.03,
      envMap: scene.environment,
      envMapIntensity: 0.52,
    });
    const topSlab = new THREE.Mesh(new THREE.BoxGeometry(topW, topTy, topD), benchTopMat);
    topSlab.position.y = legH + 0.5 * topTy;
    topSlab.castShadow = true;
    topSlab.receiveShadow = true;
    lowDjBooth.add(topSlab);
    function addDjLeg(xLeg) {
      const leg = new THREE.Mesh(new THREE.BoxGeometry(legW, legH, legD), benchLegMat);
      leg.position.set(xLeg, 0.5 * legH, 0);
      leg.castShadow = true;
      leg.receiveShadow = true;
      lowDjBooth.add(leg);
    }
    addDjLeg(-lx);
    addDjLeg(0);
    addDjLeg(lx);

    /** Чертёж 8×4 → масштаб так, чтобы сетап помещался на topW×topD; origin на верхней грани столешницы */
    const slabTopY = legH + topTy;
    const djGearRoot = new THREE.Group();
    const gearScale = Math.min(topW / 8, topD / 4);
    djGearRoot.position.set(0, slabTopY, 0);
    djGearRoot.scale.setScalar(gearScale);
    lowDjBooth.add(djGearRoot);
    makeTechnics(djGearRoot, -2.05, 0, 0, false);
    makeTechnics(djGearRoot, 2.05, 0, 0, true);
    makeEcler(djGearRoot, 0, 0, 0);

    /**
     * Бетонный монолит: масштаб gearScale × SPK_MUL (корпус ~0.52×1.35 m в чертеже).
     * Подъём снизу — djSpeakersRise, позиция.y в updateScene по uTable.
     */
    const SPK_MUL = 5.45;
    /** Полуразмас по X от центра стола (ед. чертежа × gearScale); больше — шире стойка */
    const SPK_SIDE_X = 8.45;
    /** Подъём якоря: крестовина и ножки стойки не утопают в полу, читаются в кадре */
    const SPK_ANCHOR_Y = 0.58 * gearScale;
    /**
     * За столом в локали lowDjBooth (+Z от центра столешницы); было 0.58·topD — удвоено.
     */
    const SPK_ANCHOR_Z = topD * 1.16;
    const spkScale = gearScale * SPK_MUL;
    const djSpkRise = new THREE.Group();
    djSpkRise.name = 'djSpeakersRise';
    djSpkRise.userData.riseLift = 4.5 * spkScale;
    djSpkRise.userData.faceDirLocked = null;
    djSpkRise.position.y = -djSpkRise.userData.riseLift;
    [-1, 1].forEach((side) => {
      const anchor = new THREE.Group();
      djSpkRise.add(anchor);
      anchor.position.set(side * SPK_SIDE_X * gearScale, SPK_ANCHOR_Y, SPK_ANCHOR_Z);
      const spk = makeConcreteMonolithSpeaker(anchor, 0, 0, 0);
      spk.scale.setScalar(spkScale);
      /** Азимут стол→камера (XZ) + 70° по Y; фиксация при uTable≥0.62; фронт — локальный +Z */
    });
    lowDjBooth.add(djSpkRise);

    /**
     * Низ стола (ножки y=0) чуть выше настила интерьера — как у футонов 0.036·L·invS + запас.
     */
    const djTableBaseY = (0.036 + 0.045) * L * invS;
    lowDjBooth.position.set(
      OCULUS_CENTER_X / INTERIOR_SCALE,
      djTableBaseY,
      OCULUS_CENTER_Z / INTERIOR_SCALE
    );
    lowDjBooth.rotation.y = Math.atan2(OCULUS_CENTER_X, OCULUS_CENTER_Z) + rndRange(-0.1, 0.1);
    registerInteriorRiseGroup(lowDjBooth, 0, -0.06);
    interiorGroup.add(lowDjBooth);
    djSpeakersRiseGroup = lowDjBooth.getObjectByName('djSpeakersRise');

    /** Чертёж: 1 ед ≈ 1 м → локаль interiorGroup (ромб шатра) */
    const M2I = 3.52;
    /** Толщина матраса (м), было 0.38 — чуть выше для объёма */
    const FUTON_H_M = 0.47;
    const intFloorY = 0.036 * L * invS;
    const intEnv = scene.environment;
    const futonMatOpts = {
      roughness: 0.86,
      metalness: 0,
      envMap: intEnv,
      envMapIntensity: 0.5,
      transparent: true,
      opacity: 0,
    };
    const futonColors = [0xa8c8d8, 0xb2ccdc, 0xbdd5df, 0x96bccf, 0xc8e2ee];
    const futonMats = futonColors.map((c) => new THREE.MeshStandardMaterial({ ...futonMatOpts, color: c }));
    const pillowMats = [
      new THREE.MeshStandardMaterial({ ...futonMatOpts, color: 0xe5e7e9 }),
      new THREE.MeshStandardMaterial({ ...futonMatOpts, color: 0xe5e7e9 }),
      new THREE.MeshStandardMaterial({ ...futonMatOpts, color: 0xe5e7e9 }),
    ];
    const quiltMat = new THREE.MeshStandardMaterial({
      ...futonMatOpts,
      color: 0x6888a0,
      opacity: 0,
      transparent: true,
      depthWrite: false,
    });
    /** Отдельные напольные подушки + единый тон с подушками на футонах */
    const floorCushionMat = new THREE.MeshStandardMaterial({
      ...futonMatOpts,
      color: 0xe5e7e9,
      emissive: 0x2a2b2e,
      emissiveIntensity: 0.028,
    });

    const mattGeo = makeRoundedBox(2.0 * M2I, FUTON_H_M * M2I, 3.2 * M2I);
    const pillPlump = { px: 0.52, py: 0.56, pz: 0.52 };
    const pillGeoSm = makePillowGeo(0.86 * M2I, 0.34 * M2I, 0.6 * M2I, pillPlump);
    const pillGeoWide = makePillowGeo(1.76 * M2I, 0.32 * M2I, 0.6 * M2I, pillPlump);
    /** Напольные: выше и пышнее, без «блина» */
    const floorPlump = { px: 0.5, py: 0.58, pz: 0.5 };
    const floorCushionGeo = makePillowGeo(1.22 * M2I, 0.48 * M2I, 1.22 * M2I, floorPlump);

    function makeFutonAssembly(xm, zm, rotY, mi, pillows, delaySteps, twist = 0) {
      const group = new THREE.Group();
      group.name = 'futonAssembly';
      const matt = new THREE.Mesh(mattGeo, futonMats[mi % futonMats.length].clone());
      matt.position.y = (FUTON_H_M * 0.5) * M2I;
      matt.castShadow = true;
      matt.receiveShadow = true;
      group.add(matt);

      const quiltY = (FUTON_H_M - 0.006) * M2I;
      [-0.85 * M2I, 0, 0.85 * M2I].forEach((zi) => {
        const q = new THREE.Mesh(
          new THREE.BoxGeometry(1.85 * M2I, 0.008 * M2I, 0.014 * M2I),
          quiltMat.clone()
        );
        q.position.set(0, quiltY, zi);
        group.add(q);
      });
      [-0.55 * M2I, 0, 0.55 * M2I].forEach((xi) => {
        const q = new THREE.Mesh(
          new THREE.BoxGeometry(0.014 * M2I, 0.008 * M2I, 3.05 * M2I),
          quiltMat.clone()
        );
        q.position.set(xi, quiltY, 0);
        group.add(q);
      });

      const pillowTopY = (FUTON_H_M + 0.13) * M2I;
      const pm = pillowMats[mi % pillowMats.length].clone();
      if (pillows === 'two') {
        [-0.52 * M2I, 0.52 * M2I].forEach((px) => {
          const p = new THREE.Mesh(pillGeoSm, pm.clone());
          p.position.set(px, pillowTopY, -1.26 * M2I);
          p.castShadow = true;
          group.add(p);
        });
      } else {
        const p = new THREE.Mesh(pillGeoWide, pm.clone());
        p.position.set(0, pillowTopY, -1.26 * M2I);
        p.castShadow = true;
        group.add(p);
      }

      group.position.set(xm * M2I, intFloorY, zm * M2I);
      group.rotation.y = rotY;
      registerInteriorRiseGroup(group, delaySteps, twist, 'table');
      interiorGroup.add(group);
    }

    /**
     * Напольные подушки в зоне отдыха: фаза Light (uTable) + дальше uGroup; без DJ и без пересечения с футонами.
     */
    function addFloorCushion(xLoc, zLoc, delaySteps, twist = 0, rotY = 0) {
      const mesh = new THREE.Mesh(floorCushionGeo, floorCushionMat);
      mesh.name = 'floorCushion';
      mesh.position.set(xLoc, intFloorY + 0.24 * M2I, zLoc);
      mesh.rotation.y = rotY;
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      registerInteriorRise(mesh, delaySteps, twist, floorCushionMat, 'lounge');
      interiorGroup.add(mesh);
    }

    makeFutonAssembly(-6.2, -4.5, Math.PI * 0.1, 0, 'two', 2, rndRange(-0.06, 0.06));
    makeFutonAssembly(1.2, -5.5, Math.PI * 0.5, 1, 'one', 3, rndRange(-0.05, 0.05));
    makeFutonAssembly(6.2, -3.0, Math.PI * -0.15, 2, 'two', 4, rndRange(-0.07, 0.07));
    /** (-5.2, 2.8) в локали интерьера совпадал с зоной DJ-стола (окуляр) — убран */
    makeFutonAssembly(4.8, 3.2, Math.PI * -0.33, 4, 'one', 5, rndRange(-0.06, 0.06));

    const futonBlockLocal = [
      { x: -6.2 * M2I, z: -4.5 * M2I, r: 2.45 * M2I },
      { x: 1.2 * M2I, z: -5.5 * M2I, r: 2.45 * M2I },
      { x: 6.2 * M2I, z: -3.0 * M2I, r: 2.45 * M2I },
      { x: 4.8 * M2I, z: 3.2 * M2I, r: 2.45 * M2I },
    ];
    const djCxLoc = OCULUS_CENTER_X / INTERIOR_SCALE;
    const djCzLoc = OCULUS_CENTER_Z / INTERIOR_SCALE;
    const djClearR = Math.hypot(topW, topD) * 0.52 + 2.35 * M2I;
    const cushFootR = 0.62 * M2I;
    const minCushGap = 1.12 * M2I;
    const loungeManhattan = (DIAMOND_R / INTERIOR_SCALE) * 0.82;

    const placedCush = [];
    function okFloorCushionSpot(x, z) {
      if (Math.abs(x) + Math.abs(z) > loungeManhattan) return false;
      const dDj = Math.hypot(x - djCxLoc, z - djCzLoc);
      if (dDj < djClearR + cushFootR) return false;
      for (const f of futonBlockLocal) {
        if (Math.hypot(x - f.x, z - f.z) < f.r + cushFootR) return false;
      }
      for (const [px, pz] of placedCush) {
        if (Math.hypot(x - px, z - pz) < minCushGap) return false;
      }
      return true;
    }

    const targetFloorCushions = 16;
    let tries = 0;
    while (placedCush.length < targetFloorCushions && tries < 900) {
      tries++;
      const x = rndRange(-loungeManhattan * 0.88, loungeManhattan * 0.88);
      const z = rndRange(-loungeManhattan * 0.88, loungeManhattan * 0.88);
      if (!okFloorCushionSpot(x, z)) continue;
      placedCush.push([x, z]);
      const delaySteps = 1 + Math.floor(rnd() * 6);
      addFloorCushion(
        x + rndRange(-0.22, 0.22) * M2I,
        z + rndRange(-0.22, 0.22) * M2I,
        delaySteps,
        rndRange(-0.05, 0.05),
        rnd() * Math.PI * 2
      );
    }
    interiorGroup.visible = false;
    scene.add(interiorGroup);

    rayGrp = new THREE.Group();
    const raySegs = 40;

    const rayShellMat = new THREE.MeshBasicMaterial({
      color: BCOL,
      transparent: true,
      opacity: 0,
      side: THREE.DoubleSide,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
    });

    const lowerSh = new THREE.CylinderGeometry(
      RAY_R_IN_BASE * 1.1,
      RAY_R_IN_FLOOR * 1.14,
      RAY_LEN_BELOW,
      raySegs, 1, true
    );
    lowerSh.translate(0, -RAY_LEN_BELOW / 2, 0);

    const upperSh = new THREE.CylinderGeometry(
      RAY_R_SKY * 1.08,
      RAY_R_IN_BASE * 1.1,
      RAY_LEN_SKY,
      raySegs, 1, true
    );
    upperSh.translate(0, RAY_LEN_SKY / 2, 0);

    const rayShellGeo = mergeGeometries([lowerSh, upperSh], false);
    lowerSh.dispose();
    upperSh.dispose();

    const rayCoreMat = new THREE.MeshBasicMaterial({
      color: 0xfff6e0,
      transparent: true,
      opacity: 0,
      side: THREE.DoubleSide,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
    });

    const lowerCr = new THREE.CylinderGeometry(
      RAY_R_IN_BASE * 0.5,
      RAY_R_IN_FLOOR * 0.46,
      RAY_LEN_BELOW,
      raySegs, 1, true
    );
    lowerCr.translate(0, -RAY_LEN_BELOW / 2, 0);

    const upperCr = new THREE.CylinderGeometry(
      RAY_R_SKY * 0.36,
      RAY_R_IN_BASE * 0.5,
      RAY_LEN_SKY,
      raySegs, 1, true
    );
    upperCr.translate(0, RAY_LEN_SKY / 2, 0);

    const rayCoreGeo = mergeGeometries([lowerCr, upperCr], false);
    lowerCr.dispose();
    upperCr.dispose();

    const rayColumn = new THREE.Group();
    rayColumn.name = 'godRayColumn';

    const shellMesh = new THREE.Mesh(rayShellGeo, rayShellMat);
    shellMesh.renderOrder = 0;
    rayColumn.add(shellMesh);

    const coreMesh = new THREE.Mesh(rayCoreGeo, rayCoreMat);
    coreMesh.renderOrder = 2;
    rayColumn.add(coreMesh);

    const finH = RAY_LEN_SKY + RAY_LEN_BELOW;
    const finW = RAY_R_SKY * 2.8;
    const sharedFinGeo = new THREE.PlaneGeometry(finW, finH, 1, 56);
    sharedFinGeo.translate(0, (RAY_LEN_SKY - RAY_LEN_BELOW) * 0.5, 0);

    const finMats = [];
    const nFins = 10;
    for (let fi = 0; fi < nFins; fi++) {
      const finMat = new THREE.MeshBasicMaterial({
        color: 0xffefcc,
        transparent: true,
        opacity: 0,
        side: THREE.DoubleSide,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
      });
      finMats.push(finMat);
      const fin = new THREE.Mesh(sharedFinGeo, finMat);
      fin.rotation.y = (fi / nFins) * Math.PI + fi * 0.031;
      fin.renderOrder = 1;
      rayColumn.add(fin);
    }

    rayColumn.rotation.order = 'YXZ';
    rayGrp.add(rayColumn);
    rayGrp.position.set(0, 0, 0);
    scene.add(rayGrp);

    rayMats = [rayShellMat, rayCoreMat, ...finMats];

    const scrollEventTarget = useInternalScrollRoot && scrollRootEl ? scrollRootEl : window;
    scrollEventTarget.addEventListener('scroll', () => {
      if (scrollPositionY() > 0.5) markStageInteraction();
      applyScrollPhaseControl();
      syncRawScrollProgress();
    }, { passive: true });

    window.addEventListener('wheel', (e) => {
      if (!e.ctrlKey && Math.abs(e.deltaY) > 0.25) bumpScrollHintMotionFromWheel();
    }, { passive: true });

    function syncRendererToViewport() {
      applyDeviceProfile();
      const w = scrollViewportWidth();
      const h = Math.max(1, scrollViewportHeight());
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
      syncRawScrollProgress();
    }

    window.addEventListener('resize', syncRendererToViewport);
    /** Только resize: подписка на visualViewport.scroll даёт лишние setSize на iOS Safari и ломает инерцию скролла. */
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', syncRendererToViewport);
    }

    requestAnimationFrame(tick);
  }

  try {
    init();
  } catch (err) {
    console.error(err);
    const dot = document.getElementById('loader-dot');
    if (dot) dot.remove();
    loader.textContent = 'WebGL failed to start. Try another browser or GPU.';
  }
  </script>
</body>
</html>
