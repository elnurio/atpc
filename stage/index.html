<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ATPC — Stage</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { background: #eaeaec; }
    body { height: 400vh; background: #eaeaec; }

    canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: block; }

    /* ── Preloader ─────────────────────────────────────────────────── */
    #loader {
      position: fixed; inset: 0; z-index: 100;
      background: #eaeaec;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.9s ease;
    }
    #loader.hide { opacity: 0; pointer-events: none; }
    #loader-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: rgba(0,0,0,.2);
      animation: ldot 1.3s ease-in-out infinite;
    }
    @keyframes ldot {
      0%,100% { transform: scale(1);   opacity: .2; }
      50%      { transform: scale(2.2); opacity: .8; }
    }

    /* ── Nav ───────────────────────────────────────────────────────── */
    #back {
      position: fixed; top: 36px; left: 40px; z-index: 30;
      color: rgba(0,0,0,.25);
      font: 300 10px/1 'Helvetica Neue', sans-serif;
      letter-spacing: .25em; text-transform: uppercase; text-decoration: none;
      transition: color .4s;
    }
    #back:hover { color: rgba(0,0,0,.6); }

    /* ── Step labels ──────────────────────────────────────────────── */
    .slabel {
      position: fixed; bottom: 18vh; left: 50%;
      transform: translateX(-50%) translateY(12px);
      text-align: center; pointer-events: none;
      opacity: 0; transition: opacity .7s ease, transform .7s ease;
      z-index: 20; white-space: nowrap;
    }
    .slabel.on { opacity: 1; transform: translateX(-50%) translateY(0); }
    .slabel h2 {
      color: rgba(0,0,0,.75);
      font: 200 clamp(26px, 4.5vw, 56px)/1 'Helvetica Neue', sans-serif;
      letter-spacing: .14em; text-transform: uppercase; margin-bottom: 10px;
    }
    .slabel p {
      color: rgba(0,0,0,.3);
      font: 300 10px/1.6 'Helvetica Neue', sans-serif;
      letter-spacing: .22em; text-transform: uppercase;
    }

    /* ── Scroll hint ──────────────────────────────────────────────── */
    #hint {
      position: fixed; bottom: 36px; left: 50%;
      transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      pointer-events: none; z-index: 20; transition: opacity .8s ease;
    }
    #hint.hide { opacity: 0; }
    #hint span {
      color: rgba(0,0,0,.2);
      font: 300 9px/1 'Helvetica Neue', sans-serif;
      letter-spacing: .3em; text-transform: uppercase;
    }
    #hint-line {
      width: 1px; height: 32px;
      background: linear-gradient(to bottom, rgba(0,0,0,.2), transparent);
      animation: drip 2.2s ease-in-out infinite; transform-origin: top;
    }
    @keyframes drip {
      0%  { transform: scaleY(0); opacity: 1; }
      60% { transform: scaleY(1); opacity: 1; }
      100%{ transform: scaleY(1); opacity: 0; }
    }

    /* ── Dots ─────────────────────────────────────────────────────── */
    #dots {
      position: fixed; right: 28px; top: 50%; transform: translateY(-50%);
      display: flex; flex-direction: column; gap: 14px;
      z-index: 20; pointer-events: none;
    }
    .dot {
      width: 3px; height: 3px; border-radius: 50%;
      background: rgba(0,0,0,.15); transition: background .4s, transform .4s;
    }
    .dot.on { background: rgba(0,0,0,.6); transform: scale(1.8); }
  </style>
</head>
<body>

  <div id="loader"><div id="loader-dot"></div></div>
  <a href="../" id="back">← ATPC</a>

  <div class="slabel" id="sl0">
    <h2>Location</h2>
    <p>An open site for the ambient zone</p>
  </div>
  <div class="slabel" id="sl1">
    <h2>Canopy</h2>
    <p>A pneumatic structure settles into place</p>
  </div>
  <div class="slabel" id="sl2">
    <h2>Light</h2>
    <p>Sunlight enters through the fabric</p>
  </div>

  <div id="hint"><span>Scroll</span><div id="hint-line"></div></div>

  <div id="dots">
    <div class="dot on" id="d0"></div>
    <div class="dot"    id="d1"></div>
    <div class="dot"    id="d2"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script>
  'use strict';

  // ── Renderer ──────────────────────────────────────────────────────
  const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 1.5));
  renderer.setSize(innerWidth, innerHeight);
  document.body.insertBefore(renderer.domElement, document.body.firstChild);

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0xe8e8ea);
  scene.fog = new THREE.Fog(0xe8e8ea, 28, 80);

  const camera = new THREE.PerspectiveCamera(38, innerWidth / innerHeight, 0.1, 200);

  // ── Lights ────────────────────────────────────────────────────────
  // Outdoor daylight: hemisphere (sky/ground) + sun
  scene.add(new THREE.HemisphereLight(0xdde8f0, 0xcecbb8, 0.9));

  const sun = new THREE.DirectionalLight(0xfff5e0, 1.6);
  sun.position.set(14, 20, 8);
  scene.add(sun);

  const fillSun = new THREE.DirectionalLight(0xf0f4ff, 0.4);
  fillSun.position.set(-8, 10, -5);
  scene.add(fillSun);

  // ── Ground ────────────────────────────────────────────────────────
  // Grass (outer)
  const grass = new THREE.Mesh(
    new THREE.PlaneGeometry(70, 70),
    new THREE.MeshLambertMaterial({ color: 0xc8ccb2 })
  );
  grass.rotation.x = -Math.PI / 2;
  grass.position.y = -0.05;
  scene.add(grass);

  // Concrete plaza
  const plaza = new THREE.Mesh(
    new THREE.PlaneGeometry(26, 26),
    new THREE.MeshLambertMaterial({ color: 0xd0cdc6 })
  );
  plaza.rotation.x = -Math.PI / 2;
  plaza.position.y = 0;
  scene.add(plaza);

  // Subtle grid on plaza (tile lines)
  const grid = new THREE.GridHelper(26, 13, 0xb8b5ae, 0xbbb8b1);
  grid.position.y = 0.01;
  scene.add(grid);

  // ── Tent — GPU shader fabric ──────────────────────────────────────
  const VERT = /* glsl */`
    uniform float u_time;
    varying vec3 v_wpos;
    varying vec3 v_wnorm;

    // Gentle daytime breeze — much subtler than night version
    float disp(float x, float z, float t) {
      float r  = length(vec2(x, z));
      float br = sin(t * 0.28) * 0.07;
      float w1 = sin(x * 0.38 + t * 0.85) * cos(z * 0.28 + t * 0.65) * 0.05;
      float w2 = sin(r * 0.45 - t * 0.7) * 0.04;
      return br + w1 + w2;
    }

    void main() {
      float v   = clamp(length(position.xz) / 9.5, 0.0, 1.0);
      float dy  = disp(position.x, position.z, u_time) * v;
      vec3  pos = position + vec3(0.0, dy, 0.0);

      float e   = 0.12;
      float dyx = disp(position.x + e, position.z,     u_time) * v;
      float dyz = disp(position.x,     position.z + e, u_time) * v;
      vec3  tx  = normalize(vec3(e, dyx - dy, 0.0));
      vec3  tz  = normalize(vec3(0.0, dyz - dy, e));
      v_wnorm = normalize(mat3(modelMatrix) * normalize(cross(tz, tx)));
      v_wpos  = (modelMatrix * vec4(pos, 1.0)).xyz;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
    }
  `;

  const FRAG = /* glsl */`
    uniform float u_fade;
    uniform vec3  cameraPosition;
    varying vec3  v_wpos;
    varying vec3  v_wnorm;

    void main() {
      vec3 n = normalize(v_wnorm);

      vec3 sunDir  = normalize(vec3(14.0, 20.0, 8.0));
      vec3 skyDir  = vec3(0.0, 1.0, 0.0);

      // Sunlight diffuse
      float sun    = max(dot(n, sunDir),  0.0) * 0.85;
      // Sky bounce
      float sky    = 0.38 + max(dot(n, skyDir), 0.0) * 0.22;
      // Translucency — backlit fabric glows
      float trans  = max(dot(-n, sunDir), 0.0) * 0.35;

      float light  = sky + sun + trans;
      vec3  color  = vec3(0.97, 0.95, 0.91) * light;

      // White fog
      float dist = length(v_wpos - cameraPosition);
      float fog  = smoothstep(22.0, 70.0, dist);
      color = mix(color, vec3(0.91, 0.91, 0.92), fog);

      // Fade to scene background (not black) for clean reveal
      vec3 bg = vec3(0.91, 0.91, 0.92);
      color = mix(bg, color, u_fade);

      gl_FragColor = vec4(color, 1.0);
    }
  `;

  const tentMat = new THREE.ShaderMaterial({
    uniforms: { u_time: { value: 0 }, u_fade: { value: 0 } },
    vertexShader: VERT, fragmentShader: FRAG,
    side: THREE.DoubleSide,
  });

  // Build conical tent mesh — peak at y=8, outer edge at r=9.5, y=0
  const T_RINGS = 32, T_SECTS = 54, T_OUTER = 9.5, T_H = 8.0;

  function tentH(v, u) {
    // Conical drape from peak (v=0) to ground edge (v=1)
    const cone     = T_H * Math.pow(1.0 - v, 0.82);
    // Scalloped edge — 6 lobes, visible at outer half
    const scallop  = Math.cos(u * 6) * 0.55 * (v * v);
    // Fabric ripple across surface
    const ripple   = Math.cos(u * 12 + v * Math.PI * 2.5) * 0.18 * v * (1 - v);
    return cone + scallop + ripple;
  }

  function tentR(v, u) {
    return v * T_OUTER * (1 + 0.07 * Math.cos(u * 6));
  }

  const tentGroup = new THREE.Group();

  (function buildTent() {
    const pos = [], uvs = [], idx = [];
    pos.push(0, tentH(0, 0), 0); uvs.push(0.5, 0.5);
    for (let ri = 0; ri < T_RINGS; ri++) {
      const v = (ri + 1) / T_RINGS;
      for (let si = 0; si < T_SECTS; si++) {
        const u = (si / T_SECTS) * Math.PI * 2;
        const r = tentR(v, u);
        pos.push(Math.cos(u) * r, tentH(v, u), Math.sin(u) * r);
        uvs.push(0.5 + Math.cos(u) * v * 0.5, 0.5 + Math.sin(u) * v * 0.5);
      }
    }
    for (let s = 0; s < T_SECTS; s++)
      idx.push(0, 1 + s, 1 + (s + 1) % T_SECTS);
    for (let r = 0; r < T_RINGS - 1; r++) {
      const A = 1 + r * T_SECTS, B = 1 + (r + 1) * T_SECTS;
      for (let s = 0; s < T_SECTS; s++) {
        const a = A + s, b = A + (s + 1) % T_SECTS;
        const c = B + s, d = B + (s + 1) % T_SECTS;
        idx.push(a, c, b, b, c, d);
      }
    }
    const g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
    g.setAttribute('uv',       new THREE.Float32BufferAttribute(uvs, 2));
    g.setIndex(idx);
    tentGroup.add(new THREE.Mesh(g, tentMat));
  })();

  // Oculus ring at the peak
  const oclMat = new THREE.MeshLambertMaterial({ color: 0xc8c4bc });
  tentGroup.add(new THREE.Mesh(
    new THREE.TorusGeometry(1.1, 0.08, 8, 32),
    oclMat
  ));
  // Position the oculus at the tent peak y=T_H
  tentGroup.children[1].position.y = T_H - 0.1;

  // Tent support poles — 6 equally spaced
  const poleMat = new THREE.MeshLambertMaterial({ color: 0x909090 });
  for (let i = 0; i < 6; i++) {
    const ang = (i / 6) * Math.PI * 2;
    const pole = new THREE.Mesh(
      new THREE.CylinderGeometry(0.07, 0.07, 3.2, 6),
      poleMat
    );
    pole.position.set(Math.cos(ang) * 9.2, 1.6, Math.sin(ang) * 9.2);
    tentGroup.add(pole);
  }

  // Fake shadow — dark disc on ground under tent
  const shadowDisc = new THREE.Mesh(
    new THREE.CircleGeometry(9, 32),
    new THREE.MeshBasicMaterial({
      color: 0x000000, transparent: true, opacity: 0,
      depthWrite: false,
    })
  );
  shadowDisc.rotation.x = -Math.PI / 2;
  shadowDisc.position.y = 0.02;
  scene.add(shadowDisc);

  tentGroup.position.y = 24; // starts high above, descends in scene 2
  scene.add(tentGroup);

  // ── Sun beam — warm cone through the oculus ──────────────────────
  const BCOL = 0xfff2cc; // warm golden sunlight
  const bGrp = new THREE.Group();

  // Halo (wide, soft)
  const bHaloMat = new THREE.MeshBasicMaterial({
    color: BCOL, transparent: true, opacity: 0,
    side: THREE.BackSide, blending: THREE.AdditiveBlending, depthWrite: false,
  });
  bGrp.add(new THREE.Mesh(
    new THREE.CylinderGeometry(1.4, 5.5, 10, 24, 1, true), bHaloMat
  ));

  // Core (tight, bright)
  const bCoreMat = new THREE.MeshBasicMaterial({
    color: BCOL, transparent: true, opacity: 0,
    side: THREE.FrontSide, blending: THREE.AdditiveBlending, depthWrite: false,
  });
  bGrp.add(new THREE.Mesh(
    new THREE.CylinderGeometry(0.6, 3.5, 10, 24, 1, true), bCoreMat
  ));

  // The beam goes from y=T_H (top) to y=-2 (below ground): center at y=(T_H-2)/2=3
  bGrp.position.y = 3;
  scene.add(bGrp);

  // Floor light pool (warm golden spot)
  const poolMat = new THREE.MeshBasicMaterial({
    color: BCOL, transparent: true, opacity: 0,
    blending: THREE.AdditiveBlending, depthWrite: false,
  });
  const pool = new THREE.Mesh(new THREE.CircleGeometry(4.5, 32), poolMat);
  pool.rotation.x = -Math.PI / 2;
  pool.position.y = 0.03;
  scene.add(pool);

  // ── Scroll keyframes — 4 KFs for 3 scenes ───────────────────────
  // Scene 1 (sp 0–0.33): exterior, empty site
  // Scene 2 (sp 0.33–0.66): tent descends
  // Scene 3 (sp 0.66–1.0): interior, sunbeam
  const KF = [
    { pos:[22, 26, 22], look:[0, 0, 0],   tentY:24, tFade:0, beam:0, shadow:0  },
    { pos:[18, 20, 18], look:[0, 4, 0],   tentY: 0, tFade:1, beam:0, shadow:.12},
    { pos:[ 8,  7, 12], look:[0, 5, 0],   tentY: 0, tFade:1, beam:.4, shadow:.1},
    { pos:[ 1,  1,  7], look:[0, 6.5, 0], tentY: 0, tFade:1, beam:1, shadow:.08},
  ];

  // Label windows [inAt, outAt] — 3 labels for 3 scenes
  const LWIN = [
    [0.02, 0.28],
    [0.37, 0.60],
    [0.72, 1.00],
  ];

  const labels = [0,1,2].map(i => document.getElementById('sl' + i));
  const dots   = [0,1,2].map(i => document.getElementById('d' + i));
  const hint   = document.getElementById('hint');
  const loader = document.getElementById('loader');

  // ── Helpers ───────────────────────────────────────────────────────
  function lerp(a, b, t) { return a + (b - a) * t; }
  function ss(t) { t = Math.max(0, Math.min(1, t)); return t * t * (3 - 2 * t); }
  function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }

  const posA = new THREE.Vector3(), posB = new THREE.Vector3();
  const lkA  = new THREE.Vector3(), lkB  = new THREE.Vector3();
  const lkT  = new THREE.Vector3();

  // ── State ─────────────────────────────────────────────────────────
  let clk = 0, rawSP = 0, sp = 0;
  const targetFPS = 60;
  let lastFrame = 0, firstFrame = true;

  window.addEventListener('scroll', () => {
    const max = document.documentElement.scrollHeight - innerHeight;
    rawSP = max > 0 ? clamp(scrollY / max, 0, 1) : 0;
  }, { passive: true });

  // ── Scene update ──────────────────────────────────────────────────
  function updateScene(p) {
    // Map p∈[0,1] → step∈[0,3] across 3 transitions
    const step3 = p * 3;
    const s     = clamp(Math.floor(step3), 0, 2);
    const t     = ss(step3 - s);

    const A = KF[s], B = KF[s + 1];

    // Camera
    posA.set(...A.pos); posB.set(...B.pos);
    camera.position.lerpVectors(posA, posB, t);
    camera.position.x += Math.sin(clk * 0.16) * 0.18;
    camera.position.y += Math.cos(clk * 0.12) * 0.12;

    lkA.set(...A.look); lkB.set(...B.look);
    lkT.lerpVectors(lkA, lkB, t);
    camera.lookAt(lkT);

    // Tent descent + fade
    tentGroup.position.y = lerp(A.tentY, B.tentY, t);
    tentMat.uniforms.u_fade.value = lerp(A.tFade, B.tFade, t);

    // Fake shadow
    const sh = lerp(A.shadow, B.shadow, t);
    shadowDisc.material.opacity = sh;

    // Beam (also tracks tent position)
    const bA = lerp(A.beam, B.beam, t);
    // Pulse when beam is visible
    const pulse = bA > 0.01 ? 0.85 + Math.sin(clk * 0.25) * 0.15 : 0;
    bCoreMat.opacity = 0.16 * bA * pulse;
    bHaloMat.opacity = 0.07 * bA * pulse;
    poolMat.opacity  = 0.28 * bA * (0.8 + Math.sin(clk * 0.35) * 0.2);
    // Beam follows tent group Y
    bGrp.position.y  = tentGroup.position.y + 3;
    pool.position.y  = 0.03; // always on ground

    // Labels
    LWIN.forEach(([inAt, outAt], i) => {
      labels[i].classList.toggle('on', p >= inAt && p <= outAt);
    });

    // Active dot — which scene are we in
    const activeDot = clamp(Math.floor(p * 3 + 0.15), 0, 2);
    dots.forEach((d, i) => d.classList.toggle('on', i === activeDot));

    // Scroll hint
    hint.classList.toggle('hide', p > 0.08);
  }

  // ── Render loop ───────────────────────────────────────────────────
  function tick(now) {
    requestAnimationFrame(tick);
    if (now - lastFrame < 1000 / targetFPS) return;
    lastFrame = now;

    clk += 0.006;
    sp  += (rawSP - sp) * 0.055;

    tentMat.uniforms.u_time.value = clk;
    updateScene(sp);
    renderer.render(scene, camera);

    if (firstFrame) {
      firstFrame = false;
      setTimeout(() => loader.classList.add('hide'), 80);
    }
  }

  requestAnimationFrame(tick);

  window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });
  </script>
</body>
</html>
