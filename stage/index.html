<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ATPC — Stage</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { background: #e0d8cc; }
    body { background: #e0d8cc; overscroll-behavior: none; }
    canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: block; }

    #loader {
      position: fixed; inset: 0; z-index: 100; background: #e0d8cc;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 1s ease;
    }
    #loader.hide { opacity: 0; pointer-events: none; }
    #loader-dot {
      width: 5px; height: 5px; border-radius: 50%; background: rgba(0,0,0,.18);
      animation: ldot 1.4s ease-in-out infinite;
    }
    @keyframes ldot { 0%,100%{transform:scale(1);opacity:.2} 50%{transform:scale(2.2);opacity:.75} }

    #back {
      position: fixed; top: 36px; left: 40px; z-index: 30;
      color: rgba(0,0,0,.22); font: 300 10px/1 'Helvetica Neue', sans-serif;
      letter-spacing: .25em; text-transform: uppercase; text-decoration: none;
      transition: color .4s;
    }
    #back:hover { color: rgba(0,0,0,.55); }

    .slabel {
      position: fixed; bottom: 18vh; left: 50%;
      transform: translateX(-50%) translateY(12px);
      text-align: center; pointer-events: none; opacity: 0;
      transition: opacity .65s ease, transform .65s ease;
      z-index: 20; white-space: nowrap;
    }
    .slabel.on { opacity: 1; transform: translateX(-50%) translateY(0); }
    .slabel h2 {
      color: rgba(0,0,0,.7);
      font: 200 clamp(24px, 4vw, 52px)/1 'Helvetica Neue', sans-serif;
      letter-spacing: .14em; text-transform: uppercase; margin-bottom: 10px;
    }
    .slabel p {
      color: rgba(0,0,0,.28);
      font: 300 10px/1.6 'Helvetica Neue', sans-serif;
      letter-spacing: .22em; text-transform: uppercase;
    }

    #hint {
      position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      pointer-events: none; z-index: 20; transition: opacity .8s ease;
    }
    #hint.hide { opacity: 0; }
    #hint span { color: rgba(0,0,0,.2); font: 300 9px/1 'Helvetica Neue', sans-serif; letter-spacing: .3em; text-transform: uppercase; }
    #hint-line {
      width: 1px; height: 32px;
      background: linear-gradient(to bottom, rgba(0,0,0,.2), transparent);
      animation: drip 2.2s ease-in-out infinite; transform-origin: top;
    }
    @keyframes drip { 0%{transform:scaleY(0);opacity:1} 60%{transform:scaleY(1);opacity:1} 100%{transform:scaleY(1);opacity:0} }

    #dots {
      position: fixed; right: 28px; top: 50%; transform: translateY(-50%);
      display: flex; flex-direction: column; gap: 14px; z-index: 20; pointer-events: none;
    }
    .dot {
      width: 3px; height: 3px; border-radius: 50%;
      background: rgba(0,0,0,.15); transition: background .4s, transform .4s;
    }
    .dot.on { background: rgba(0,0,0,.65); transform: scale(1.8); }
  </style>
</head>
<body>
  <div id="loader"><div id="loader-dot"></div></div>
  <a href="../" id="back">← ATPC</a>

  <div class="slabel" id="sl0"><h2>Location</h2><p>Sandy site — an open ground for the festival</p></div>
  <div class="slabel" id="sl1"><h2>Structure</h2><p>Support poles rise — the suspension system takes form</p></div>
  <div class="slabel" id="sl2"><h2>Stage</h2><p>Tensile membrane stretches across the anchor frame</p></div>
  <div class="slabel" id="sl3"><h2>Light</h2><p>Sunlight pierces through the fabric</p></div>
  <div class="slabel" id="sl4"><h2>Interior</h2><p>Step inside the ambient zone</p></div>

  <div id="hint"><span>Scroll</span><div id="hint-line"></div></div>
  <div id="dots">
    <div class="dot on" id="d0"></div><div class="dot" id="d1"></div>
    <div class="dot" id="d2"></div><div class="dot" id="d3"></div><div class="dot" id="d4"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script>
  'use strict';

  // ── Renderer ──────────────────────────────────────────────────────
  const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 1.5));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  let lockedH = innerHeight;
  document.body.style.height = (lockedH * 6) + 'px';
  renderer.setSize(innerWidth, lockedH);
  document.body.insertBefore(renderer.domElement, document.body.firstChild);

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0xe0d8cc);
  scene.fog = new THREE.Fog(0xe0d8cc, 28, 85);

  const camera = new THREE.PerspectiveCamera(42, innerWidth / lockedH, 0.1, 200);

  // ── Lights ────────────────────────────────────────────────────────
  scene.add(new THREE.HemisphereLight(0xdde6f0, 0xc8b080, 0.85));
  const sun = new THREE.DirectionalLight(0xffe8c8, 1.8);
  sun.position.set(14, 20, 8);
  sun.castShadow = true;
  sun.shadow.mapSize.width  = 1024;
  sun.shadow.mapSize.height = 1024;
  sun.shadow.camera.near = 1;  sun.shadow.camera.far  = 80;
  sun.shadow.camera.left = -20; sun.shadow.camera.right = 20;
  sun.shadow.camera.top  = 20;  sun.shadow.camera.bottom = -20;
  sun.shadow.bias = -0.001;
  scene.add(sun);
  const fill = new THREE.DirectionalLight(0xfff4e8, 0.35);
  fill.position.set(-8, 8, -5);
  scene.add(fill);

  // ── Ground — sandy desert ─────────────────────────────────────────
  const meshGround = new THREE.Mesh(
    new THREE.PlaneGeometry(80, 80),
    new THREE.MeshLambertMaterial({ color: 0xa08860 })
  );
  meshGround.rotation.x = -Math.PI / 2;
  meshGround.position.y = -0.04;
  meshGround.receiveShadow = true;
  scene.add(meshGround);

  const meshPlaza = new THREE.Mesh(
    new THREE.PlaneGeometry(22, 22),
    new THREE.MeshLambertMaterial({ color: 0xc0a878 })
  );
  meshPlaza.rotation.x = -Math.PI / 2;
  meshPlaza.receiveShadow = true;
  scene.add(meshPlaza);

  // ══════════════════════════════════════════════════════════════════
  //  TENSILE CANOPY SYSTEM
  // ══════════════════════════════════════════════════════════════════

  // ── Anchor + mast definitions ─────────────────────────────────────

  function createAnchors() {
    // Irregular perimeter, 8 points — also defines the footprint polygon
    return [
      new THREE.Vector3(-8.0, 3.8, -4.5),  // A0 far left-back
      new THREE.Vector3(-7.2, 4.2,  1.2),  // A1 left-mid
      new THREE.Vector3(-5.5, 3.6,  6.8),  // A2 left-front
      new THREE.Vector3( 0.5, 4.0,  7.5),  // A3 front-centre
      new THREE.Vector3( 5.8, 4.5,  5.5),  // A4 right-front
      new THREE.Vector3( 6.5, 3.9, -0.5),  // A5 right-mid
      new THREE.Vector3( 5.2, 4.1, -6.0),  // A6 right-back
      new THREE.Vector3(-1.2, 3.7, -7.2),  // A7 back-centre
    ];
  }

  function createMasts() {
    return [
      new THREE.Vector3(-2.2, 13.2, -1.8),  // M0 main mast   (highest)
      new THREE.Vector3( 3.0,  9.8,  3.0),  // M1 secondary   (lower)
    ];
  }

  // ── Point-in-polygon (XZ plane) ───────────────────────────────────
  function pointInPolygon2D(x, z, poly) {
    let inside = false;
    const n = poly.length;
    for (let i = 0, j = n - 1; i < n; j = i++) {
      const xi = poly[i].x, zi = poly[i].z;
      const xj = poly[j].x, zj = poly[j].z;
      if (((zi > z) !== (zj > z)) && x < (xj - xi) * (z - zi) / (zj - zi) + xi)
        inside = !inside;
    }
    return inside;
  }

  // ── Surface generator ─────────────────────────────────────────────
  // 1. Build N×N grid in XZ
  // 2. IDW height initialisation (power-4 → sharp mast peaks)
  // 3. Pin anchor-zone + mast vertices
  // 4. Gauss-Seidel Laplacian relaxation → minimal-surface approximation
  function generateTensileSurface(anchors, masts) {
    const N    = 68;
    const xMin = -9.6, xMax = 8.2;
    const zMin = -8.6, zMax = 9.4;

    const total  = N * N;
    const pos    = new Float32Array(total * 3);
    const pinned = new Uint8Array(total);   // 1=anchor-pinned, 2=mast-pinned
    const inMesh = new Uint8Array(total);
    const vi     = (i, j) => i * N + j;

    // XZ positions + polygon mask
    for (let i = 0; i < N; i++) {
      for (let j = 0; j < N; j++) {
        const x = xMin + (xMax - xMin) * j / (N - 1);
        const z = zMin + (zMax - zMin) * i / (N - 1);
        const k = vi(i, j);
        pos[k * 3]     = x;
        pos[k * 3 + 2] = z;
        inMesh[k] = pointInPolygon2D(x, z, anchors) ? 1 : 0;
      }
    }

    // IDW height initialisation (power 4)
    const ctrl = [...anchors, ...masts];
    for (let k = 0; k < total; k++) {
      const x = pos[k * 3], z = pos[k * 3 + 2];
      let sw = 0, swh = 0;
      for (const p of ctrl) {
        const d2 = (x - p.x) * (x - p.x) + (z - p.z) * (z - p.z) + 0.01;
        const w  = 1.0 / (d2 * d2);
        sw += w; swh += w * p.y;
      }
      pos[k * 3 + 1] = swh / sw;
    }

    // Pin vertices within threshold of anchors / masts
    for (let k = 0; k < total; k++) {
      const x = pos[k * 3], z = pos[k * 3 + 2];
      for (const a of anchors) {
        const d2 = (x - a.x) * (x - a.x) + (z - a.z) * (z - a.z);
        if (d2 < 1.7 * 1.7) { pinned[k] = 1; break; }
      }
      for (const m of masts) {
        const d2 = (x - m.x) * (x - m.x) + (z - m.z) * (z - m.z);
        if (d2 < 0.65 * 0.65) {
          pinned[k] = 2;
          pos[k * 3 + 1] = m.y;
        }
      }
    }

    // Gauss-Seidel relaxation — converges to minimal (tensile) surface
    for (let iter = 0; iter < 220; iter++) {
      for (let i = 1; i < N - 1; i++) {
        for (let j = 1; j < N - 1; j++) {
          const k = vi(i, j);
          if (pinned[k] || !inMesh[k]) continue;
          pos[k * 3 + 1] = (
            pos[vi(i - 1, j) * 3 + 1] + pos[vi(i + 1, j) * 3 + 1] +
            pos[vi(i, j - 1) * 3 + 1] + pos[vi(i, j + 1) * 3 + 1]
          ) * 0.25;
        }
      }
    }

    // Index buffer — only triangles fully inside polygon
    const indices = [];
    for (let i = 0; i < N - 1; i++) {
      for (let j = 0; j < N - 1; j++) {
        const a = vi(i,   j), b = vi(i,   j + 1);
        const c = vi(i + 1, j), d = vi(i + 1, j + 1);
        if (inMesh[a] && inMesh[b] && inMesh[c]) indices.push(a, c, b);
        if (inMesh[b] && inMesh[c] && inMesh[d]) indices.push(b, c, d);
      }
    }

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    geo.setIndex(indices);
    geo.computeVertexNormals();
    return geo;
  }

  // ── Fabric shader ─────────────────────────────────────────────────
  // Subtle breathing animation proportional to height.
  // Lighting: direct sun + sky dome + backlit translucency.
  const VERT = /* glsl */`
    uniform float u_time;
    varying vec3  v_wpos;
    varying vec3  v_wnorm;

    void main() {
      vec3 pos = position;
      // Scale animation by normalised height above anchor line
      float hf = clamp((pos.y - 4.0) / 9.5, 0.0, 1.0);
      float fl = ( sin(pos.x * 0.44 + u_time * 0.80) *
                   cos(pos.z * 0.37 + u_time * 0.63) * 0.06
                 + sin((pos.x - pos.z) * 0.30 - u_time * 0.52) * 0.025
                 ) * hf;
      pos.y += fl;
      v_wnorm = normalize(mat3(modelMatrix) * normal);
      v_wpos  = (modelMatrix * vec4(pos, 1.0)).xyz;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
    }
  `;

  const FRAG = /* glsl */`
    uniform float u_fade;
    varying vec3  v_wpos;
    varying vec3  v_wnorm;

    void main() {
      vec3  n      = normalize(v_wnorm);
      vec3  sunDir = normalize(vec3(14.0, 20.0, 8.0));
      float sun    = max(dot(n,  sunDir), 0.0) * 0.78;
      float sky    = 0.32 + max(dot(n, vec3(0.0, 1.0, 0.0)), 0.0) * 0.24;
      float trans  = max(dot(-n, sunDir), 0.0) * 0.44; // backlit translucency
      float lite   = sky + sun + trans;
      vec3  col    = vec3(0.965, 0.941, 0.903) * lite;

      float dist = length(v_wpos - cameraPosition);
      float fog  = smoothstep(22.0, 72.0, dist);
      col = mix(col, vec3(0.878, 0.847, 0.800), fog);
      col = mix(vec3(0.878, 0.847, 0.800), col, u_fade);

      gl_FragColor = vec4(col, 1.0);
    }
  `;

  const canopyMat = new THREE.ShaderMaterial({
    uniforms: { u_time: { value: 0 }, u_fade: { value: 0 } },
    vertexShader: VERT, fragmentShader: FRAG,
    side: THREE.DoubleSide,
  });

  // ── Build canopy ──────────────────────────────────────────────────
  const anchors = createAnchors();
  const masts   = createMasts();

  const canopyGeo  = generateTensileSurface(anchors, masts);
  const canopyMesh = new THREE.Mesh(canopyGeo, canopyMat);
  canopyMesh.castShadow = true;
  scene.add(canopyMesh);

  // ── Fabric walls — vertical panels between anchor points ──────────
  const wallMat = new THREE.MeshLambertMaterial({
    color: 0xf0ebe1, transparent: true, opacity: 0.52, side: THREE.DoubleSide,
  });

  for (let i = 0; i < anchors.length; i++) {
    const a = anchors[i];
    const b = anchors[(i + 1) % anchors.length];
    const dx  = b.x - a.x, dz = b.z - a.z;
    const len = Math.sqrt(dx * dx + dz * dz);
    const avgH = (a.y + b.y) * 0.5;
    const wall = new THREE.Mesh(new THREE.PlaneGeometry(len, avgH), wallMat);
    wall.position.set((a.x + b.x) * 0.5, avgH * 0.5, (a.z + b.z) * 0.5);
    wall.rotation.y = -Math.atan2(dz, dx);
    scene.add(wall);
  }

  // ── Structural poles ──────────────────────────────────────────────
  const poleMat    = new THREE.MeshPhongMaterial({ color: 0x6e6a62, shininess: 55, specular: 0x181810 });
  const polesGroup = new THREE.Group();

  // Short anchor poles
  anchors.forEach(a => {
    const m = new THREE.Mesh(
      new THREE.CylinderGeometry(0.065, 0.10, a.y, 6),
      poleMat.clone()
    );
    m.position.set(a.x, a.y * 0.5, a.z);
    polesGroup.add(m);
  });

  // Tall mast poles
  masts.forEach(m => {
    const mesh = new THREE.Mesh(
      new THREE.CylinderGeometry(0.075, 0.14, m.y, 8),
      poleMat.clone()
    );
    mesh.position.set(m.x, m.y * 0.5, m.z);
    polesGroup.add(mesh);
  });

  polesGroup.traverse(c => {
    if (c.isMesh) { c.material.transparent = true; c.material.opacity = 0; }
  });
  scene.add(polesGroup);

  // ── Interior furniture ────────────────────────────────────────────
  function addFurniture(geo, mat, x, y, z) {
    const m = new THREE.Mesh(geo, mat);
    m.position.set(x, y, z);
    m.castShadow = m.receiveShadow = true;
    scene.add(m);
    return m;
  }
  const mTable   = new THREE.MeshLambertMaterial({ color: 0xb8a070 });
  const mFabric  = new THREE.MeshLambertMaterial({ color: 0xf0ebe0 });
  const mSpeaker = new THREE.MeshLambertMaterial({ color: 0x706050 });

  addFurniture(new THREE.BoxGeometry(3.5, 1.2, 2.0), mTable,    0,   0.6,  0);
  addFurniture(new THREE.BoxGeometry(2.8, 0.5, 1.4), mSpeaker,  0,   1.45, 0);
  addFurniture(new THREE.BoxGeometry(2.5, 0.6, 1.1), mFabric,  -3.2, 0.3,  1.5);
  addFurniture(new THREE.BoxGeometry(2.5, 0.6, 1.1), mFabric,   3.2, 0.3,  1.5);
  addFurniture(new THREE.BoxGeometry(2.5, 0.6, 1.1), mFabric,  -2.8, 0.3, -2.2);
  addFurniture(new THREE.BoxGeometry(2.5, 0.6, 1.1), mFabric,   2.8, 0.3, -2.2);
  addFurniture(new THREE.BoxGeometry(0.7, 0.45, 0.9), mFabric, -4.2, 0.7,  1.5);
  addFurniture(new THREE.BoxGeometry(0.7, 0.45, 0.9), mFabric,  4.2, 0.7,  1.5);
  addFurniture(new THREE.BoxGeometry(0.7, 0.45, 0.9), mFabric, -4.0, 0.7, -2.2);
  addFurniture(new THREE.BoxGeometry(0.7, 0.45, 0.9), mFabric,  4.0, 0.7, -2.2);
  addFurniture(new THREE.BoxGeometry(0.8, 2.0, 0.8), mSpeaker, -5.2, 1.0, -1.5);
  addFurniture(new THREE.BoxGeometry(0.8, 2.0, 0.8), mSpeaker,  5.2, 1.0,  1.5);

  // ── Sun beams ─────────────────────────────────────────────────────
  const BEAM_DEFS = [
    [-1.0,  0.5, 0.05, -0.04, 1.0,  0.0],
    [ 1.2, -0.8,-0.04,  0.06, 0.85, 2.1],
    [ 0.3,  1.0, 0.07,  0.03, 0.9,  3.8],
    [-0.4, -0.9,-0.05, -0.05, 0.95, 1.4],
  ];
  const BCOL   = 0xffe8a0;
  const BEAM_Y = 7.0;

  const beams = BEAM_DEFS.map(([x, z, rx, rz, intens, phase]) => {
    const g    = new THREE.Group();
    const hMat = new THREE.MeshBasicMaterial({
      color: BCOL, transparent: true, opacity: 0,
      side: THREE.BackSide, blending: THREE.AdditiveBlending, depthWrite: false,
    });
    const cMat = new THREE.MeshBasicMaterial({
      color: BCOL, transparent: true, opacity: 0,
      side: THREE.FrontSide, blending: THREE.AdditiveBlending, depthWrite: false,
    });
    g.add(new THREE.Mesh(new THREE.CylinderGeometry(0.5, 3.0, 9, 16, 1, true), hMat));
    g.add(new THREE.Mesh(new THREE.CylinderGeometry(0.2, 1.8, 9, 16, 1, true), cMat));
    g.position.set(x, BEAM_Y - 0.5, z);
    g.rotation.set(rx, 0, rz);
    scene.add(g);

    const pMat = new THREE.MeshBasicMaterial({
      color: BCOL, transparent: true, opacity: 0,
      blending: THREE.AdditiveBlending, depthWrite: false,
    });
    const pool = new THREE.Mesh(new THREE.CircleGeometry(3.2, 24), pMat);
    pool.rotation.x = -Math.PI / 2;
    pool.position.set(x, 0.01, z);
    scene.add(pool);

    return { g, cMat, hMat, pMat, phase, intens };
  });

  // ── Camera keyframes ──────────────────────────────────────────────
  const KF = [
    { pos:[22, 30, 22], look:[0,  3,   0] }, // 0 — aerial
    { pos:[12,  9, 12], look:[0,  5,   0] }, // 1 — structure
    { pos:[17,  9,  2], look:[0,  6,   0] }, // 2 — canopy side
    { pos:[10,  4,  0], look:[0,  2.5, 0] }, // 3 — low / beams
    { pos:[ 5,  3,  5], look:[0,  1.0, 0] }, // 4 — inside
  ];

  const LWIN = [
    [0.02, 0.18],
    [0.25, 0.42],
    [0.50, 0.65],
    [0.72, 0.85],
    [0.90, 1.00],
  ];

  const labels = [0,1,2,3,4].map(i => document.getElementById('sl' + i));
  const dots   = [0,1,2,3,4].map(i => document.getElementById('d' + i));
  const loader = document.getElementById('loader');
  const hint   = document.getElementById('hint');

  // ── Helpers ───────────────────────────────────────────────────────
  const ss    = t => { t = Math.max(0, Math.min(1, t)); return t * t * (3 - 2 * t); };
  const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
  const posA  = new THREE.Vector3(), posB = new THREE.Vector3();
  const lkA   = new THREE.Vector3(), lkB  = new THREE.Vector3();
  const lkT   = new THREE.Vector3();

  // ── State ─────────────────────────────────────────────────────────
  let clk = 0, rawSP = 0, sp = 0;
  let lastFrame = 0, firstFrame = true;
  const FPS = 60;

  window.addEventListener('scroll', () => {
    const max = document.documentElement.scrollHeight - lockedH;
    rawSP = max > 0 ? clamp(scrollY / max, 0, 1) : 0;
  }, { passive: true });

  // ── Scene update ──────────────────────────────────────────────────
  function updateScene(p) {
    const step4 = p * 4;
    const s = clamp(Math.floor(step4), 0, 3);
    const t = ss(step4 - s);

    posA.set(...KF[s].pos);  posB.set(...KF[s + 1].pos);
    lkA.set(...KF[s].look);  lkB.set(...KF[s + 1].look);
    camera.position.lerpVectors(posA, posB, t);
    camera.position.x += Math.sin(clk * 0.15) * 0.20;
    camera.position.y += Math.cos(clk * 0.11) * 0.12;
    lkT.lerpVectors(lkA, lkB, t);
    camera.lookAt(lkT);

    // Poles: fade in p=0.18→0.28
    const pA = clamp((p - 0.18) / 0.10, 0, 1);
    polesGroup.traverse(c => { if (c.isMesh) c.material.opacity = pA; });

    // Canopy: fade in p=0.25→0.37
    canopyMat.uniforms.u_fade.value = clamp((p - 0.25) / 0.12, 0, 1);

    // Beams: appear p=0.68→0.80
    const bA = clamp((p - 0.68) / 0.12, 0, 1);
    beams.forEach(({ cMat, hMat, pMat, phase, intens }) => {
      const pulse = bA > 0.01 ? (0.82 + Math.sin(clk * 0.25 + phase) * 0.18) : 0;
      cMat.opacity = 0.18 * intens * bA * pulse;
      hMat.opacity = 0.08 * intens * bA * pulse;
      pMat.opacity = 0.32 * intens * bA * (0.78 + Math.sin(clk * 0.3 + phase) * 0.22);
    });

    LWIN.forEach(([inAt, outAt], i) => labels[i].classList.toggle('on', p >= inAt && p <= outAt));
    const ad = clamp(Math.floor(p * 5), 0, 4);
    dots.forEach((d, i) => d.classList.toggle('on', i === ad));
    hint.classList.toggle('hide', p > 0.07);
  }

  // ── Render loop — FPS capped ──────────────────────────────────────
  function tick(now) {
    requestAnimationFrame(tick);
    if (now - lastFrame < 1000 / FPS) return;
    lastFrame = now;

    clk += 0.006;
    sp  += (rawSP - sp) * 0.055;

    canopyMat.uniforms.u_time.value = clk;
    updateScene(sp);
    renderer.render(scene, camera);

    if (firstFrame) { firstFrame = false; setTimeout(() => loader.classList.add('hide'), 80); }
  }

  requestAnimationFrame(tick);

  let _lastW = innerWidth;
  window.addEventListener('resize', () => {
    if (innerWidth === _lastW) return;
    _lastW = innerWidth;
    lockedH = innerHeight;
    document.body.style.height = (lockedH * 6) + 'px';
    camera.aspect = innerWidth / lockedH;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, lockedH);
  });
  </script>
</body>
</html>
