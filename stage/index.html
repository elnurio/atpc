<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>ATPC — Stage</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      background: #1a1f1c;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overflow-anchor: none;
    }
    body {
      min-height: 100vh;
      background: #1a1f1c;
      overflow-x: hidden;
      overflow-y: visible;
      -webkit-overflow-scrolling: touch;
      overflow-anchor: none;
    }

    #scrollRoot {
      position: relative;
      width: 100%;
      min-height: 100%;
      overflow: visible;
      pointer-events: none;
      background: transparent;
    }

    #scrollRoot::-webkit-scrollbar {
      display: none;
    }

    #scrollTrack {
      position: relative;
      width: 100%;
      min-height: 768vh;
      pointer-events: none;
      opacity: 0;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
      pointer-events: none;
      z-index: 2;
    }

    #whiteBloom {
      position: fixed;
      inset: 0;
      z-index: 9;
      pointer-events: none;
      background: #fafbfc;
      opacity: 0;
    }

    /**
     * Финал Assembly: поверх WebGL — только белый слой + iframe; без карточки, тени и подложек.
     * Полноэкранный чертёж после кроссфейда.
     */
    #assemblyShell {
      position: fixed;
      inset: 0;
      z-index: 14;
      margin: 0;
      padding: 0;
      display: block;
      background: #ffffff;
      opacity: 0;
      pointer-events: none;
    }
    #assemblyShell.on { pointer-events: auto; }
    #assemblyIFrame {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 0;
      box-shadow: none;
      background: #ffffff;
      opacity: 0;
    }

    /** Конец перехода: чистая страница чертежа, без хрома сцены. */
    html.atpc-drawing-end,
    body.atpc-drawing-end {
      background: #ffffff !important;
    }
    body.atpc-drawing-end #whiteBloom {
      opacity: 0 !important;
      visibility: hidden;
    }
    body.atpc-drawing-end .slabel,
    body.atpc-drawing-end #scrollHint {
      visibility: hidden !important;
      opacity: 0 !important;
      pointer-events: none !important;
    }
    body.atpc-drawing-end #back {
      opacity: 0;
      pointer-events: none;
    }

    #loader {
      position: fixed; inset: 0; z-index: 100;
      background: #1a1f1c;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.9s ease;
      pointer-events: none;
    }
    #loader.hide { opacity: 0; pointer-events: none; }
    #loader-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: rgba(160, 160, 160, 0.4);
      animation: ldot 1.3s ease-in-out infinite;
    }
    @keyframes ldot {
      0%,100% { transform: scale(1);   opacity: .35; }
      50%      { transform: scale(2.2); opacity: .85; }
    }

    #back {
      position: fixed; top: 36px; left: 40px; z-index: 30;
      color: rgba(150, 150, 150, 0.65);
      font: 300 10px/1 Helvetica, Arial, sans-serif;
      letter-spacing: .25em; text-transform: uppercase; text-decoration: none;
      transition: color .4s;
    }
    #back:hover { color: rgba(190, 190, 190, 0.95); }
    /** С фазы Interior: тот же серый характер, но плотнее — читается на белом полу */
    body.atpc-ui-dark #back {
      color: rgba(82, 84, 88, 0.88);
    }
    body.atpc-ui-dark #back:hover {
      color: rgba(54, 56, 60, 0.95);
    }

    #soundToggle {
      position: fixed;
      top: 36px;
      right: 40px;
      z-index: 30;
      border: none;
      background: transparent;
      color: rgba(150, 150, 150, 0.65);
      font: 300 10px/1 Helvetica, Arial, sans-serif;
      letter-spacing: .25em;
      text-transform: uppercase;
      cursor: pointer;
      transition: color .4s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    #soundToggle:hover {
      color: rgba(190, 190, 190, 0.95);
    }
    body.atpc-ui-dark #soundToggle {
      color: rgba(82, 84, 88, 0.88);
    }
    body.atpc-ui-dark #soundToggle:hover {
      color: rgba(54, 56, 60, 0.95);
    }

    .slabel {
      position: fixed; bottom: 18vh; left: 50%;
      transform: translateX(-50%) translateY(12px);
      text-align: center; pointer-events: none;
      opacity: 0; transition: opacity .7s ease, transform .7s ease;
      z-index: 20; white-space: nowrap;
    }
    .slabel.on { opacity: 1; transform: translateX(-50%) translateY(0); }
    .slabel h2 {
      color: rgba(200, 200, 200, 0.92);
      font: 200 clamp(22px, 4.2vw, 52px)/1 Helvetica, Arial, sans-serif;
      letter-spacing: .14em; text-transform: uppercase;
      transition: color 0.45s ease;
    }
    body.atpc-ui-dark .slabel h2 {
      color: rgba(58, 62, 68, 0.96);
    }

    /** Сегмент Assembly: подпись не нужна */
    #sl7 {
      display: none !important;
    }

    .scroll-hint {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      z-index: 999;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }
    .scroll-hint.hidden {
      opacity: 0;
    }
    /** До Interior — светло-серый; с Interior — чуть темнее серый под белый пол */
    .scroll-hint-text {
      font-family: Arial, sans-serif;
      font-size: 10px;
      letter-spacing: 0.22em;
      color: rgba(165, 165, 165, 0.92);
      text-transform: uppercase;
      transition: color 0.45s ease;
    }
    body.atpc-ui-dark .scroll-hint-text {
      color: rgba(58, 62, 68, 0.96);
    }
    .scroll-hint-chevrons {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .scroll-hint .chevron {
      width: 14px;
      height: 14px;
      border-right: 2px solid rgba(165, 165, 165, 0.88);
      border-bottom: 2px solid rgba(165, 165, 165, 0.88);
      transform: rotate(45deg);
      animation: scrollHintChevronBounce 1.4s ease-in-out infinite;
      transition: border-color 0.45s ease;
    }
    body.atpc-ui-dark .scroll-hint .chevron {
      border-right-color: rgba(58, 62, 68, 0.92);
      border-bottom-color: rgba(58, 62, 68, 0.92);
    }
    .scroll-hint .chevron:nth-child(2) {
      opacity: 0.5;
      animation-delay: 0.18s;
    }
    .scroll-hint .chevron:nth-child(3) {
      opacity: 0.2;
      animation-delay: 0.36s;
    }
    @keyframes scrollHintChevronBounce {
      0%, 100% {
        transform: rotate(45deg) translateY(0);
        opacity: inherit;
      }
      50% {
        transform: rotate(45deg) translateY(5px);
        opacity: 0.1;
      }
    }

    @media (max-width: 900px), (pointer: coarse) {
      #scrollTrack {
        min-height: 896vh;
      }

      #back {
        top: calc(env(safe-area-inset-top, 0px) + 18px);
        left: 16px;
        letter-spacing: .2em;
      }

      #soundToggle {
        top: calc(env(safe-area-inset-top, 0px) + 18px);
        right: 16px;
        letter-spacing: .2em;
      }

      .slabel {
        bottom: calc(env(safe-area-inset-bottom, 0px) + 14vh);
        width: min(88vw, 480px);
        white-space: normal;
        padding: 0 8px;
      }

      .slabel h2 {
        font-size: clamp(18px, 8vw, 34px);
        letter-spacing: .1em;
      }

      .scroll-hint {
        bottom: calc(env(safe-area-inset-bottom, 0px) + 24px);
      }
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.171.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.171.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="scrollRoot" aria-hidden="true">
    <div id="scrollTrack"></div>
  </div>

  <div id="loader"><div id="loader-dot"></div></div>
  <a href="../" id="back">← ATPC</a>
  <button id="soundToggle" type="button" aria-pressed="false">sound off</button>
  <audio id="stageAudio" src="atpc-stage.m4a" preload="auto" loop playsinline webkit-playsinline muted></audio>

  <div class="slabel" id="sl0">
    <h2>Site</h2>
  </div>
  <div class="slabel" id="sl1">
    <h2>Structure</h2>
  </div>
  <div class="slabel" id="sl2">
    <h2>Profile</h2>
  </div>
  <div class="slabel" id="sl3">
    <h2>Light</h2>
  </div>
  <div class="slabel" id="sl4">
    <h2>Interior</h2>
  </div>
  <div class="slabel" id="sl5">
    <h2>Space</h2>
  </div>
  <div class="slabel" id="sl6">
    <h2>Sky</h2>
  </div>
  <div class="slabel" id="sl7">
    <h2>Assembly</h2>
  </div>

  <div class="scroll-hint" id="scrollHint" aria-hidden="true">
    <div class="scroll-hint-text">Scroll Down</div>
    <div class="scroll-hint-chevrons">
      <div class="chevron"></div>
      <div class="chevron"></div>
      <div class="chevron"></div>
    </div>
  </div>

  <div id="whiteBloom" aria-hidden="true"></div>
  <div id="assemblyShell">
    <iframe id="assemblyIFrame" title="Ambient stage 2026" src="ambient-stage-2026.html"></iframe>
  </div>

  <script type="module">
  import * as THREE from 'three';
  import { mergeGeometries, mergeVertices } from 'three/addons/utils/BufferGeometryUtils.js';

  let scene, camera, renderer;
  let canopyGroup, mastGroup, cableLines, cableGeo, cablePositions, cableMat;
  /** Кромка купола для оттяжек к «якорным» деревьям (без мачт) */
  let shelterCeilingRing = null;
  let oculus, oclMat;
  let shadowDisc, bGrp, bCoreMat, bHaloMat, pool, poolMat, rayGrp, rayMats;
  let godSunGroup, godSunMat, godSunSprite;
  const sunDirTmp = new THREE.Vector3();
  let interiorGroup;
  let squareBedTentGroup, squareFabricRoofGroup, squareFabricMats, squareTentDiagMat, squareWallMesh, squareTentStakeMesh;
  let hangingInteriorFabricGroup;
  /** Пол дуба: скрыт до середины Site, спуск до середины Structure */
  let tentFloorMesh;
  /** Группа PA-колонок DJ: подъём снизу (фаза Light) */
  let djSpeakersRiseGroup = null;
  /** Текстуры/материалы concrete monolith speaker (ленивая инициализация) */
  let concreteMonolithSpkCache = null;
  let mainSun, hemiMain, fillSun;
  let sceneAmbient;
  let sceneBgOrig;
  let fogColorOrig;
  let sceneFogNearOrig;
  let sceneFogFarOrig;
  let blueprintGlow;
  let whiteBloomEl;
  let assemblyShellEl;
  let assemblyIFrameEl;
  /** Чтобы при повторном показе iframe снова сбрасывать скролл вложенной страницы (Safari) */
  let ambientRevealPrevT = 0;

  if ('scrollRestoration' in history) history.scrollRestoration = 'manual';

  function resetStageScrollOnEntry() {
    const scrollRoot = document.getElementById('scrollRoot');
    if (scrollRoot) scrollRoot.scrollTop = 0;
    window.scrollTo(0, 0);
    document.documentElement.scrollTop = 0;
    document.body.scrollTop = 0;
  }

  let hasUserInteractedWithStage = false;

  function markStageInteraction() {
    hasUserInteractedWithStage = true;
  }

  resetStageScrollOnEntry();
  window.addEventListener('pageshow', () => {
    updateStableScrollMetrics(true);
    if (!hasUserInteractedWithStage) {
      resetStageScrollOnEntry();
    }
    syncRawScrollProgress();
    if (!hasUserInteractedWithStage) {
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          if (!hasUserInteractedWithStage) resetStageScrollOnEntry();
        });
      });
    }
  }, { passive: true });
  window.addEventListener('load', () => {
    updateStableScrollMetrics(true);
    syncRawScrollProgress();
    if (!hasUserInteractedWithStage) {
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          if (!hasUserInteractedWithStage) resetStageScrollOnEntry();
        });
      });
    }
  }, { once: true });

  function resetEmbeddedAmbientScroll() {
    const el = assemblyIFrameEl;
    if (!el) return;
    const w = el.contentWindow;
    if (!w) return;
    try {
      w.scrollTo(0, 0);
      const d = w.document;
      if (d) {
        if (d.documentElement) d.documentElement.scrollTop = 0;
        if (d.body) d.body.scrollTop = 0;
      }
      requestAnimationFrame(() => {
        try {
          w.scrollTo(0, 0);
        } catch (err) {}
      });
    } catch (err) {}
  }
  let stageCanvasEl;
  /** Narrow key light through roof oculus (Sky phase) */
  let oculusSpot;

  /* Scale study from tent-japanese-concept.pdf; TENT_SCALE widens ring + height in lockstep */
  const TENT_SCALE = 24;

  const SQ_N = 4;
  const N_MASTS = SQ_N;
  const MAST_MAIN_H = 12 * TENT_SCALE;
  const MAST_SUB2_H = 9.1 * TENT_SCALE;
  const MAST_SUB_H = 7.5 * TENT_SCALE;
  const mastHeights = [MAST_MAIN_H, MAST_SUB2_H, MAST_SUB_H, MAST_SUB_H, MAST_SUB_H, MAST_SUB_H, MAST_SUB_H, MAST_SUB_H];
  const mastRadTop = [0.05, 0.03, 0.03, 0.03, 0.03, 0.03, 0.03, 0.03].map((r) => r * TENT_SCALE);
  const mastRadBot = [0.05, 0.03, 0.03, 0.03, 0.03, 0.03, 0.03, 0.03].map((r) => r * TENT_SCALE);
  function mastTopY(i) { return mastHeights[i] - 0.05 * TENT_SCALE; }
  const MAST_TOP_MAX = mastTopY(0);

  const MAST_R = 11.12 * TENT_SCALE;
  const RIM_R = 9.88 * TENT_SCALE;
  const RIM_Y_LOCAL = 0.08 * TENT_SCALE;

  /* Open-air fabric micro-city: diamond footprint, floating ceiling fields, tensile wall strips (technical sheet) */
  const SQ_HALF = MAST_R * 0.9;
  /** Rhombus vertices at (±SQ_HALF, 0) & (0, ±SQ_HALF) in XZ — plan diamond like the section drawing */
  const DIAMOND_R = SQ_HALF;
  const SQ_POST_H = MAST_MAIN_H;
  const SQ_ROOF_Y = SQ_POST_H * 0.98;
  const SQ_ROOF_OCULUS_Y = SQ_ROOF_Y - 0.14 * TENT_SCALE;

  /** Tensile canopy mast layout (asymmetric); oculus / beam align with main peak projection */
  const TENSILE_PEAK_SPEC = [
    { nx: -0.31, nz: 0.19, yLift: 1.38, pinR: 0.26, pull: 1.78 },
    { nx: 0.37, nz: -0.29, yLift: 0.48, pinR: 0.2, pull: 1.32 },
    { nx: -0.11, nz: -0.46, yLift: 0.22, pinR: 0.16, pull: 0.98 },
  ];
  const OCULUS_APERTURE_R = DIAMOND_R * 0.124;
  const OCULUS_TUBE = Math.max(0.05 * TENT_SCALE, OCULUS_APERTURE_R * 0.068);
  const OCULUS_MAJOR = OCULUS_APERTURE_R + OCULUS_TUBE;
  const OCULUS_CENTER_X = TENSILE_PEAK_SPEC[0].nx * DIAMOND_R;
  const OCULUS_CENTER_Z = TENSILE_PEAK_SPEC[0].nz * DIAMOND_R;
  /** Plan radius for removing roof quads — slightly inside fabric torus for clean ring */
  const ROOF_OCULUS_CUT_R = OCULUS_APERTURE_R * 0.94;

  const RAY_LEN_SKY = 72 * TENT_SCALE;
  const RAY_LEN_BELOW = 22 * TENT_SCALE;
  const RAY_R_SKY = 2.35 * TENT_SCALE;
  const RAY_R_IN_BASE = OCULUS_APERTURE_R * 0.99;
  const RAY_R_IN_FLOOR = 0.44 * TENT_SCALE;

  const CANOPY_Y_MIN = MAST_TOP_MAX - RIM_Y_LOCAL + 0.46 * TENT_SCALE;

  /** Оттяжки к кольцу леса: мало линий, равный шаг по кромке, радиаль к якорю (без хаотичных пересечений) */
  const NUM_TREE_GUYS = 12;
  let treeGuyAnchors = [];
  /** Индекс точки ceilingRing для каждого троса — задаётся в setupTreeGuyCablesFromRing */
  let treeGuyRingIdx = [];

  /** Купол/пол с первого кадра; боковые стены — только с фазы Structure (скролл) */
  const WALLS_SCROLL_START = 1 / 7 + 0.02;
  const WALLS_SCROLL_END = 1 / 7 + 0.14;
  /** Индекс сегмента скролла «Profile» (sl2) — тканевый купол появляется только здесь */
  const ROOF_PROFILE_SEG = 2;
  /** Короткий ход «установки» купола (не большое падение — финал = штатная геометрия натяжения) */
  const ROOF_DESCEND_Y = 0.26 * TENT_SCALE;
  /**
   * Подвесная вуаль под куполом: только финальный акцент Profile — скрыта большую часть сегмента,
   * плавное появление в последних ~12% трека установки купола (синхрон с «посадкой» мембраны).
   */
  const HANGING_PROFILE_LATE_START = 0.875;
  /** clk += 0.006/кадр — без множителя качание визуально «замерзает»; это даёт читаемый ветер */
  const HANG_WIND_CLK = 46;
  /** Tensile shell visible from first frame (structure phase); optional micro-settling only via group Y in updateScene */
  /* Стол DJ — фаза Light (sl3): появляется от начала сегмента 3 и к концу Light уже полностью */
  const INTERIOR_TABLE_LIGHT_SEG = 3;
  /* Свет/атмосфера после появления мебели (лежаки теперь с фазой Light — см. uTable) */
  const INTERIOR_PROPS_START = 0.56;
  const INTERIOR_PROPS_FULL = 0.88;
  const INTERIOR_SCALE = 5;
  /** World footprint & mesh sizes vs previous layout (1 = old scale). */
  const INTERIOR_LAYOUT = 4;
  const INTERIOR_BURY_Y = 2.55 * INTERIOR_LAYOUT;
  const INTERIOR_STAGGER = 0.052;
  /** Минимальный дополнительный зазор между лежаками (центр–центр), м; переводится в локаль интерьера */
  const FUTON_MIN_SPACING_M = 0.05;

  function interiorRiseEase(t) {
    t = clamp(t, 0, 1);
    const s = t * t * (3 - 2 * t);
    return Math.min(1, s + Math.sin(s * Math.PI) * 0.08);
  }

  /** Forest clearing: soft daylight, ground, no empty-field read */
  function makeForestGroundTexture() {
    const w = 512;
    const h = 512;
    const c = document.createElement('canvas');
    c.width = w;
    c.height = h;
    const ctx = c.getContext('2d');
    const img = ctx.createImageData(w, h);
    const d = img.data;
    for (let i = 0; i < d.length; i += 4) {
      const px = (i / 4) % w;
      const py = (i / 4 / w) | 0;
      const n = (Math.sin(px * 0.08) + Math.sin(py * 0.07)) * 6;
      const v = 118 + n + (Math.random() - 0.5) * 14;
      d[i] = clamp(v - 8, 60, 200);
      d[i + 1] = clamp(v + 18, 80, 220);
      d[i + 2] = clamp(v - 22, 50, 160);
      d[i + 3] = 255;
    }
    ctx.putImageData(img, 0, 0);
    const tex = new THREE.CanvasTexture(c);
    tex.colorSpace = THREE.SRGBColorSpace;
    tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
    tex.minFilter = THREE.LinearMipmapLinearFilter;
    tex.generateMipmaps = true;
    return tex;
  }

  function buildForestTreeRing() {
    const grp = new THREE.Group();
    /** Меньше экземпляров; клин по азимуту камеры Site (KF0/KF1) — в кадре не должно быть кроны «в лоб» */
    const nCap = 80;
    const nTarget = 52;
    /** Высота уровня купола (SQ_ROOF_Y): ствол + крона */
    const trunkH = 0.49 * MAST_MAIN_H;
    const crownR = 0.33 * MAST_MAIN_H;
    const trunkRBot = 0.48 * TENT_SCALE;
    const trunkRTop = 0.32 * TENT_SCALE;
    const trunkGeo = new THREE.CylinderGeometry(trunkRTop, trunkRBot, trunkH, 6, 1);
    trunkGeo.translate(0, trunkH * 0.5, 0);
    const crownGeo = new THREE.DodecahedronGeometry(crownR, 0);
    crownGeo.translate(0, trunkH + crownR * 0.48, 0);
    const trunkMat = new THREE.MeshStandardMaterial({
      color: 0x3a352c,
      roughness: 0.94,
      metalness: 0,
      envMapIntensity: 0.16,
    });
    const crownMat = new THREE.MeshStandardMaterial({
      color: 0x2d4236,
      roughness: 0.93,
      metalness: 0,
      envMapIntensity: 0.2,
      flatShading: true,
    });
    const trunks = new THREE.InstancedMesh(trunkGeo, trunkMat, nCap);
    const crowns = new THREE.InstancedMesh(crownGeo, crownMat, nCap);
    const dummy = new THREE.Object3D();
    const minR = DIAMOND_R * 1.44 + 38;
    const maxR = 900;
    const ringW = maxR - minR;
    const openingBearings = [
      Math.atan2(KF[0].pos[0], KF[0].pos[2]),
      Math.atan2(KF[1].pos[0], KF[1].pos[2]),
    ];
    /** Полуширина клина (рад): шире для широкого FOV на мобиле; без деревьев в секторе «впереди» камеры */
    const wedgeHalf = 1.14;
    const minTreeCamDist = 428;
    const camXZ = [
      [KF[0].pos[0], KF[0].pos[2]],
      [KF[1].pos[0], KF[1].pos[2]],
    ];
    function angDist(a, b) {
      let d = Math.abs(a - b);
      if (d > Math.PI) d = 2 * Math.PI - d;
      return d;
    }
    function inOpeningWedge(treeBearing) {
      for (let i = 0; i < openingBearings.length; i++) {
        if (angDist(treeBearing, openingBearings[i]) < wedgeHalf) return true;
      }
      return false;
    }
    let placed = 0;
    let tries = 0;
    const maxTries = 5200;
    while (placed < nTarget && tries < maxTries) {
      tries++;
      const ang = Math.random() * Math.PI * 2;
      const rad = minR + Math.random() * ringW;
      const x = Math.cos(ang) * rad;
      const z = Math.sin(ang) * rad;
      const b = Math.atan2(x, z);
      if (inOpeningWedge(b)) continue;
      let tooCloseToCam = false;
      for (let ci = 0; ci < camXZ.length; ci++) {
        const cx = camXZ[ci][0];
        const cz = camXZ[ci][1];
        if (Math.hypot(x - cx, z - cz) < minTreeCamDist) {
          tooCloseToCam = true;
          break;
        }
      }
      if (tooCloseToCam) continue;
      const sc = 0.86 + Math.random() * 0.22;
      dummy.position.set(x, 0, z);
      dummy.rotation.y = Math.random() * Math.PI * 2;
      dummy.rotation.x = (Math.random() - 0.5) * 0.06;
      dummy.rotation.z = (Math.random() - 0.5) * 0.05;
      dummy.scale.setScalar(sc);
      dummy.updateMatrix();
      trunks.setMatrixAt(placed, dummy.matrix);
      crowns.setMatrixAt(placed, dummy.matrix);
      placed++;
    }
    trunks.count = placed;
    crowns.count = placed;
    trunks.instanceMatrix.needsUpdate = true;
    crowns.instanceMatrix.needsUpdate = true;
    trunks.castShadow = false;
    crowns.castShadow = false;
    grp.add(trunks, crowns);
    return grp;
  }

  function setupForestClearingWorld(renderer, scene) {
    scene.background = new THREE.Color(0xd4ddd4);
    const fogCol = 0xc5d1c8;
    scene.fog = new THREE.Fog(fogCol, 95 * TENT_SCALE, 780 * TENT_SCALE);

    const pmrem = new THREE.PMREMGenerator(renderer);
    const envScene = new THREE.Scene();
    envScene.add(new THREE.AmbientLight(0xeef4ea, 0.55));
    const ed = new THREE.DirectionalLight(0xfff5e6, 0.72);
    ed.position.set(2.4, 4.2, 1.2);
    envScene.add(ed);
    envScene.add(new THREE.HemisphereLight(0xe8f0e8, 0x7a8f78, 0.35));
    envScene.add(new THREE.Mesh(
      new THREE.SphereGeometry(200, 32, 16),
      new THREE.MeshStandardMaterial({
        color: 0xe2ebe4,
        roughness: 1,
        metalness: 0,
        side: THREE.BackSide,
      })
    ));
    scene.environment = pmrem.fromScene(envScene, 0).texture;
    pmrem.dispose();

    const groundMap = makeForestGroundTexture();
    groundMap.repeat.set(48, 48);
    const groundMat = new THREE.MeshStandardMaterial({
      color: 0x8f9a86,
      map: groundMap,
      roughness: 0.96,
      metalness: 0,
      envMapIntensity: 0.22,
    });
    const ground = new THREE.Mesh(new THREE.PlaneGeometry(7200, 7200, 1, 1), groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.06;
    scene.add(ground);

    scene.add(buildForestTreeRing());
  }

  /** Procedural cotton / percale sheet look (diffuse + bump) */
  function makeBeddingFabricTextures() {
    const w = 1024;
    const h = 1024;
    const c = document.createElement('canvas');
    c.width = w;
    c.height = h;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#f0e8df';
    ctx.fillRect(0, 0, w, h);
    const step = 5;
    for (let y = 0; y < h; y += step) {
      ctx.strokeStyle = `rgba(168, 148, 128, ${0.05 + (y % (step * 3) === 0 ? 0.035 : 0)})`;
      ctx.lineWidth = 0.4;
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(w, y);
      ctx.stroke();
    }
    for (let x = 0; x < w; x += step) {
      ctx.strokeStyle = 'rgba(138, 122, 106, 0.042)';
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, h);
      ctx.stroke();
    }
    ctx.fillStyle = 'rgba(255, 255, 255, 0.055)';
    for (let y = 0; y < h; y += 36) ctx.fillRect(0, y, w, 8);
    const lg = ctx.createLinearGradient(0, 0, w, h);
    lg.addColorStop(0, 'rgba(255, 252, 248, 0.11)');
    lg.addColorStop(0.45, 'rgba(0, 0, 0, 0)');
    lg.addColorStop(1, 'rgba(88, 72, 58, 0.055)');
    ctx.fillStyle = lg;
    ctx.fillRect(0, 0, w, h);

    const map = new THREE.CanvasTexture(c);
    map.colorSpace = THREE.SRGBColorSpace;
    map.wrapS = map.wrapT = THREE.RepeatWrapping;
    map.repeat.set(4.2, 4.2);

    const cb = document.createElement('canvas');
    cb.width = 512;
    cb.height = 512;
    const bx = cb.getContext('2d');
    const img = bx.createImageData(512, 512);
    const d = img.data;
    for (let i = 0; i < d.length; i += 4) {
      const px = (i / 4) % 512;
      const py = (i / 4 / 512) | 0;
      const weave = Math.sin(px * 0.12) * 10 + Math.sin(py * 0.11) * 10;
      const v = clamp(118 + weave + (Math.random() - 0.5) * 14, 85, 175);
      d[i] = d[i + 1] = d[i + 2] = v;
      d[i + 3] = 255;
    }
    bx.putImageData(img, 0, 0);
    bx.strokeStyle = 'rgba(40, 35, 30, 0.07)';
    bx.lineWidth = 0.5;
    for (let y = 0; y < 512; y += 3) {
      bx.beginPath();
      bx.moveTo(0, y);
      bx.lineTo(512, y);
      bx.stroke();
    }
    const bumpMap = new THREE.CanvasTexture(cb);
    bumpMap.wrapS = bumpMap.wrapT = THREE.RepeatWrapping;
    bumpMap.repeat.set(9, 9);

    return { map, bumpMap };
  }

  /** Лёгкий процедурный bump под фото-альбедо пола (микрошум). */
  function makeTentInteriorFloorBumpMap() {
    const cb = document.createElement('canvas');
    cb.width = 256;
    cb.height = 256;
    const bx = cb.getContext('2d');
    const id = bx.createImageData(256, 256);

    for (let i = 0; i < d.length; i += 4) {
      const px = (i / 4) % 256;
      const py = (i / 4 / 256) | 0;
      const v =
        200
        + Math.sin(px * 0.21) * 14
        + Math.sin(py * 0.17) * 12
        + (Math.random() - 0.5) * 10;
      const b = Math.max(160, Math.min(240, v));
      d[i] = d[i + 1] = d[i + 2] = b;
      d[i + 3] = 255;

    bumpMap.repeat.set(10, 10);
    bumpMap.colorSpace = THREE.NoColorSpace;
    return bumpMap;
  }

  function makeBrutalistSmoothConcreteTex() {
    const c = document.createElement('canvas');
    c.width = 512;
    c.height = 1024;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#c8c4bc';
    ctx.fillRect(0, 0, 512, 1024);
    for (let i = 0; i < 8000; i++) {
      const x = Math.random() * 512;
      const y = Math.random() * 1024;
      const s = 1 + Math.random() * 4;
      const col = ~~(140 + Math.random() * 60);
      ctx.fillStyle = `rgba(${col},${col - 4},${col - 8},${0.04 + Math.random() * 0.12})`;
      ctx.fillRect(x, y, s, s);
    }
    for (let i = 0; i < 60; i++) {
      const x = Math.random() * 512;
      const y = Math.random() * 1024;
      const r = 10 + Math.random() * 45;
      const g = ctx.createRadialGradient(x, y, 0, x, y, r);
      g.addColorStop(0, `rgba(80,78,74,${0.04 + Math.random() * 0.1})`);
      g.addColorStop(1, 'rgba(80,78,74,0)');
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fillStyle = g;
      ctx.fill();
    }
    for (let i = 0; i < 6; i++) {
      ctx.strokeStyle = `rgba(100,96,90,${0.06 + Math.random() * 0.08})`;
      ctx.lineWidth = 0.5 + Math.random() * 1.5;
      ctx.beginPath();
      ctx.moveTo(Math.random() * 512, 0);
      ctx.lineTo(Math.random() * 512, 1024);
      ctx.stroke();
    }
    return new THREE.CanvasTexture(c);
  }

  function makeRoughConcTex() {

  function getConcreteMonolithSpkTextures() {
    if (concreteMonolithSpkCache) return concreteMonolithSpkCache;
    const concTex = makeBrutalistSmoothConcreteTex();

  /**
   * Perimeter anchor points (XZ diamond), fixed height — membrane edge attachment.
   */
  function createAnchors() {
    const R = DIAMOND_R;
    /** Верх периметра ближе к линии несущей рамы — нижний купол «надет» на контур */
    const y = SQ_ROOF_Y - 0.03 * TENT_SCALE;
    const nPerEdge = 18;
    const corners = [
      new THREE.Vector3(0, y, -R),
      new THREE.Vector3(R, y, 0),
      new THREE.Vector3(0, y, R),
      new THREE.Vector3(-R, y, 0),
    ];
    const pts = [];
    for (let e = 0; e < 4; e++) {
      const A = corners[e];
      const B = corners[(e + 1) % 4];
      for (let k = 0; k < nPerEdge; k++) {
        const t = k / nPerEdge;
        pts.push(new THREE.Vector3().lerpVectors(A, B, t));
      }
    }
    return pts;
  }

  /**
   * Mast / peak attachment points in world space (main = index 0, highest).
   */
  function createMasts() {
    const R = DIAMOND_R;
    const baseY = SQ_ROOF_Y;
    const peaks = TENSILE_PEAK_SPEC.map((s) => new THREE.Vector3(
      s.nx * R,
      baseY + s.yLift * TENT_SCALE,
      s.nz * R
    ));
    const pinRadii = TENSILE_PEAK_SPEC.map((s) => s.pinR * R);
    const pulls = TENSILE_PEAK_SPEC.map((s) => s.pull);
    return { peaks, pinRadii, pulls };
  }

  function diamondUvToXz(u, v, R) {
    const x = R * (u - v);
    const z = R * (-1 + u + v);
    return { x, z };
  }

  /**
   * Procedural tensile membrane: UV grid on rhombus footprint, Verlet + structural/shear springs,
   * pinned perimeter + mast peaks. Runs once at load (~ (nu·nv) · iters · edges).
   */
  function generateTensileSurface(anchorPoints, mastData, options = {}) {
    const R = DIAMOND_R;
    const nu = options.nu ?? 78;
    const nv = options.nv ?? 78;
    const kStruct = options.kStructural ?? 0.94;
    const kShear = options.kShear ?? 0.36;
    const iters = options.iterations ?? 175;
    const dt = options.dt ?? 0.26;
    const damping = options.damping ?? 0.997;
    const gY = options.gravityY ?? -0.016 * TENT_SCALE;
    /** Dimensionless convex lift vs flat IDW (tensioned inflated canopy) */
    const convexBulgeAmp = options.convexBulgeAmp ?? 0;
    /** Low undulation between peaks / perimeter (subtle height variation) */
    const undulationAmp = options.undulationAmp ?? 0;
    /** Per-iteration upward bias on interior (keeps volume under gravity) */
    const inflateK = options.inflateK ?? 0;
    const uEps = 2.1 / Math.max(nu, nv);
    const anchorY = anchorPoints[0].y;

    const count = (nu + 1) * (nv + 1);
    const pos = new Float32Array(count * 3);
    const prev = new Float32Array(count * 3);
    const pinned = new Uint8Array(count);
    const pinTarget = new Float32Array(count * 3);

    const idx = (i, j) => j * (nu + 1) + i;

    function idwY(x, z) {
      let num = 0;
      let den = 0;
      const pPow = 2.05;
      const eps = 2.8;
      for (const a of anchorPoints) {
        const dx = x - a.x;
        const dz = z - a.z;
        const w = 1 / Math.pow(dx * dx + dz * dz + eps * eps, pPow * 0.5);
        num += w * a.y;
        den += w;
      }
      const { peaks, pinRadii, pulls } = mastData;
      for (let mi = 0; mi < peaks.length; mi++) {
        const p = peaks[mi];
        const dx = x - p.x;
        const dz = z - p.z;
        const w = 1 / Math.pow(dx * dx + dz * dz + (pinRadii[mi] * 0.5) ** 2 + eps * eps, pPow * 0.5);
        const pl = pulls[mi];
        num += w * p.y * pl;
        den += w * pl;
      }
      return den > 1e-10 ? num / den : anchorY;
    }

    function closestAnchorY(x, z) {
      let bestY = anchorY;
      let bestD = 1e18;
      for (const a of anchorPoints) {
        const d = (a.x - x) ** 2 + (a.z - z) ** 2;
        if (d < bestD) {
          bestD = d;
          bestY = a.y;
        }
      }
      return bestY;
    }

    for (let j = 0; j <= nv; j++) {
      for (let i = 0; i <= nu; i++) {
        const u = i / nu;
        const v = j / nv;
        const ii = idx(i, j);
        const { x, z } = diamondUvToXz(u, v, R);
        const y0 = idwY(x, z);
        const man = Math.abs(u - 0.5) + Math.abs(v - 0.5);
        /** Softer falloff → bulge reaches further toward perimeter (fuller tensile silhouette). */
        const centerLift = Math.pow(Math.max(0, 1 - man * 0.88), 1.08);
        const convexY = convexBulgeAmp * TENT_SCALE * centerLift;
        /** Long-wave sag/hill between peaks — smooth, not crinkled micro-folds. */
        const und =
          undulationAmp * TENT_SCALE * centerLift *
          Math.sin(u * Math.PI * 2 * 1.22 + 0.28) *
          Math.sin(v * Math.PI * 2 * 0.98 - 0.18);
        const b = ii * 3;
        pos[b] = x;
        pos[b + 1] = y0
          + convexY
          + und
          + Math.sin(u * 3.8 + v * 1.25 + 0.5) * 0.0022 * TENT_SCALE
          + Math.cos(v * 3.4 - u * 1.1) * 0.0019 * TENT_SCALE;
        pos[b + 2] = z;

        let kind = 0;
        if (u <= uEps || u >= 1 - uEps || v <= uEps || v >= 1 - uEps) {
          kind = 1;
          pinTarget[b] = x;
          pinTarget[b + 1] = closestAnchorY(x, z);
          pinTarget[b + 2] = z;
        }
        const { peaks, pinRadii } = mastData;
        for (let mi = peaks.length - 1; mi >= 0; mi--) {
          const p = peaks[mi];
          const dx = x - p.x;
          const dz = z - p.z;
          if (dx * dx + dz * dz < pinRadii[mi] * pinRadii[mi]) {
            kind = 2;
            pinTarget[b] = p.x;
            pinTarget[b + 1] = p.y;
            pinTarget[b + 2] = p.z;
          }
        }
        pinned[ii] = kind > 0 ? 1 : 0;
      }
    }

    prev.set(pos);

    const edges = [];
    function pushEdge(a, b, k) {
      const ax = pos[a * 3];
      const ay = pos[a * 3 + 1];
      const az = pos[a * 3 + 2];
      const bx = pos[b * 3];
      const by = pos[b * 3 + 1];
      const bz = pos[b * 3 + 2];
      const rest = Math.hypot(bx - ax, by - ay, bz - az);
      edges.push({ a, b, rest, k });
    }

    for (let j = 0; j < nv; j++) {
      for (let i = 0; i < nu; i++) {
        const a = idx(i, j);
        const b = idx(i + 1, j);
        const c = idx(i, j + 1);
        const d = idx(i + 1, j + 1);
        pushEdge(a, b, kStruct);
        pushEdge(a, c, kStruct);
        pushEdge(b, d, kStruct);
        pushEdge(c, d, kStruct);
        pushEdge(a, d, kShear);
        pushEdge(b, c, kShear);
      }
    }

    const acc = new Float32Array(count * 3);

    for (let it = 0; it < iters; it++) {
      acc.fill(0);
      for (let e = 0, nE = edges.length; e < nE; e++) {
        const ed = edges[e];
        const ia = ed.a;
        const ib = ed.b;
        const ba = ia * 3;
        const bb = ib * 3;
        let dx = pos[bb] - pos[ba];
        let dy = pos[bb + 1] - pos[ba + 1];
        let dz = pos[bb + 2] - pos[ba + 2];
        const len = Math.hypot(dx, dy, dz);
        if (len < 1e-9) continue;
        const s = ((len - ed.rest) / len) * ed.k;
        dx *= s;
        dy *= s;
        dz *= s;
        if (!pinned[ia]) {
          acc[ba] += dx;
          acc[ba + 1] += dy;
          acc[ba + 2] += dz;
        }
        if (!pinned[ib]) {
          acc[bb] -= dx;
          acc[bb + 1] -= dy;
          acc[bb + 2] -= dz;
        }
      }

      for (let vi = 0; vi < count; vi++) {
        if (pinned[vi]) continue;
        acc[vi * 3 + 1] += gY;
      }

      if (inflateK > 0) {
        for (let vi = 0; vi < count; vi++) {
          if (pinned[vi]) continue;
          const i = vi % (nu + 1);
          const j = (vi / (nu + 1)) | 0;
          const uu = i / nu;
          const vv = j / nv;
          const manI = Math.abs(uu - 0.5) + Math.abs(vv - 0.5);
          const wt = Math.pow(Math.max(0, 1 - manI * 0.88), 1.04);
          acc[vi * 3 + 1] += inflateK * TENT_SCALE * wt;
        }
      }

      for (let vi = 0; vi < count; vi++) {
        if (pinned[vi]) continue;
        const b = vi * 3;
        const px = pos[b];
        const py = pos[b + 1];
        const pz = pos[b + 2];
        const qx = prev[b];
        const qy = prev[b + 1];
        const qz = prev[b + 2];
        const nx = px + (px - qx) * damping + acc[b] * dt * dt;
        const ny = py + (py - qy) * damping + acc[b + 1] * dt * dt;
        const nz = pz + (pz - qz) * damping + acc[b + 2] * dt * dt;
        prev[b] = px;
        prev[b + 1] = py;
        prev[b + 2] = pz;
        pos[b] = nx;
        pos[b + 1] = ny;
        pos[b + 2] = nz;
      }

      for (let vi = 0; vi < count; vi++) {
        if (!pinned[vi]) continue;
        const b = vi * 3;
        pos[b] = pinTarget[b];
        pos[b + 1] = pinTarget[b + 1];
        pos[b + 2] = pinTarget[b + 2];
        prev[b] = pinTarget[b];
        prev[b + 1] = pinTarget[b + 1];
        prev[b + 2] = pinTarget[b + 2];
      }
    }

    const verts = new Float32Array(count * 3);
    verts.set(pos);
    const uvs = new Float32Array(count * 2);
    const indices = [];
    for (let j = 0; j <= nv; j++) {
      for (let i = 0; i <= nu; i++) {
        const ii = idx(i, j);
        uvs[ii * 2] = i / nu;
        uvs[ii * 2 + 1] = j / nv;
      }
    }
    for (let j = 0; j < nv; j++) {
      for (let i = 0; i < nu; i++) {
        const a = idx(i, j);
        const b = idx(i + 1, j);
        const c = idx(i, j + 1);
        const d = idx(i + 1, j + 1);
        indices.push(a, c, b, b, c, d);
      }
    }

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(verts, 3));
    geo.setAttribute('uv', new THREE.BufferAttribute(uvs, 2));
    geo.setIndex(indices);
    geo.computeVertexNormals();

    /** Ordered rim from relaxed ceiling (v=0 → u=1 → v=1 → u=0) for wall top attachment — geometry unchanged above. */
    function vecFromPos(ii) {
      const b = ii * 3;
      return new THREE.Vector3(pos[b], pos[b + 1], pos[b + 2]);
    }
    const ceilingRing = [];
    for (let i = 0; i <= nu; i++) ceilingRing.push(vecFromPos(idx(i, 0)));
    for (let j = 1; j <= nv; j++) ceilingRing.push(vecFromPos(idx(nu, j)));
    for (let i = nu - 1; i >= 0; i--) ceilingRing.push(vecFromPos(idx(i, nv)));
    for (let j = nv - 1; j >= 1; j--) ceilingRing.push(vecFromPos(idx(0, j)));

    return { geometry: geo, vertexCount: count, ceilingRing };
  }

  /**
   * Вдавленный «кратер» на нижнем слое купола: вогнутость + мягкий валик по контуру,
   * слегка неровный край (угловая модуляция радиуса). Только геометрия Y + пересчёт нормалей.
   */
  function applyRoofCraterDisplacement(geometry) {
    const pos = geometry.attributes.position;
    if (!pos) return;
    const cx = OCULUS_CENTER_X;
    const cz = OCULUS_CENTER_Z;
    const craterR = OCULUS_APERTURE_R * 2.12;
    const depth = 0.056 * TENT_SCALE;
    const rimH = 0.019 * TENT_SCALE;
    const uCap = 1.05;
    const bowlEdge = 0.74;

    for (let i = 0; i < pos.count; i++) {
      const x = pos.getX(i);
      const y = pos.getY(i);
      const z = pos.getZ(i);
      const dx = x - cx;
      const dz = z - cz;
      const r = Math.hypot(dx, dz);
      const ang = Math.atan2(dz, dx);
      const edgeIrreg =
        1 +
        0.034 * Math.sin(3 * ang + 0.58) +
        0.02 * Math.sin(5 * ang - 1.05);
      const u = r / (craterR * edgeIrreg);
      if (u > uCap + 0.2) continue;

      const boundaryFade = ss(clamp((uCap + 0.12 - u) / 0.22, 0, 1));
      const bowl = -depth * Math.pow(clamp(1 - u / bowlEdge, 0, 1), 1.62);
      const rim = rimH * Math.exp(-Math.pow((u - 0.87) / 0.1, 2));
      const disp = (bowl + rim) * boundaryFade;
      pos.setY(i, y + disp);
    }
    pos.needsUpdate = true;
    geometry.computeVertexNormals();
  }

  /**
   * Cuts triangles whose plan centroid lies inside a cylinder — one dominant circular opening (oculus).
   * Keeps fabric ring / crater rim; call after applyRoofCraterDisplacement.
   */
  function removeRoofTrianglesInsideOpening(geometry, cx, cz, holeR) {
    const index = geometry.index;
    const pos = geometry.attributes.position;
    if (!index || !pos) return;
    const ia = index.array;
    const next = [];
    for (let i = 0; i < ia.length; i += 3) {
      const i1 = ia[i];
      const i2 = ia[i + 1];
      const i3 = ia[i + 2];
      const mx = (pos.getX(i1) + pos.getX(i2) + pos.getX(i3)) / 3;
      const mz = (pos.getZ(i1) + pos.getZ(i2) + pos.getZ(i3)) / 3;
      if (Math.hypot(mx - cx, mz - cz) < holeR) continue;
      next.push(i1, i2, i3);
    }
    geometry.setIndex(next);
    geometry.computeVertexNormals();
  }

  /**
   * Ground stakes: same winding as ceilingRing — pulled outward and down to grade (tent guy tension).
   */
  function createWallGroundAnchors(ceilingRing) {
    const yG = 0.015 * TENT_SCALE;
    const pullBase = 0.34 * TENT_SCALE;
    return ceilingRing.map((p) => {
      const h = Math.hypot(p.x, p.z) + 1e-6;
      const ox = p.x / h;
      const oz = p.z / h;
      const edge = Math.max(Math.abs(p.x), Math.abs(p.z)) / (DIAMOND_R + 1e-6);
      const pull = pullBase * (0.92 + 0.14 * edge);
      return new THREE.Vector3(p.x + ox * pull, yG, p.z + oz * pull);
    });
  }

  /**
   * Tensioned tent wall: rim → ground stakes, Verlet springs + outward/down guy logic.
   * Reads as stretched fabric (camping / tensile stake-down), not a hanging curtain.
   */
  function generateWallMembrane(ceilingRing, groundAnchors, options = {}) {
    const nU = ceilingRing.length;
    const nV = options.nV ?? 32;
    const kStruct = options.kStructural ?? 1.18;
    const kShear = options.kShear ?? 0.52;
    const iters = options.iterations ?? 210;
    const dt = options.dt ?? 0.22;
    const damping = options.damping ?? 0.997;
    const gY = options.gravityY ?? -0.0018 * TENT_SCALE;
    const outwardBias = options.outwardBias ?? 0.036 * TENT_SCALE;
    const cableK = options.cableK ?? 0.11;
    const chordK = options.chordK ?? 0.024;
    const vRest = options.verticalRestScale ?? 0.87;

    const widx = (u, v) => v * nU + u;
    const count = nU * (nV + 1);
    const pos = new Float32Array(count * 3);
    const prev = new Float32Array(count * 3);
    const pinned = new Uint8Array(count);
    const pinTarget = new Float32Array(count * 3);

    for (let v = 0; v <= nV; v++) {
      for (let u = 0; u < nU; u++) {
        const ii = widx(u, v);
        const b = ii * 3;
        const top = ceilingRing[u];
        const bot = groundAnchors[u];
        const t = v / nV;
        if (v === 0) {
          pos[b] = top.x;
          pos[b + 1] = top.y;
          pos[b + 2] = top.z;
          pinned[ii] = 1;
          pinTarget[b] = top.x;
          pinTarget[b + 1] = top.y;
          pinTarget[b + 2] = top.z;
        } else if (v === nV) {
          pos[b] = bot.x;
          pos[b + 1] = bot.y;
          pos[b + 2] = bot.z;
          pinned[ii] = 1;
          pinTarget[b] = bot.x;
          pinTarget[b + 1] = bot.y;
          pinTarget[b + 2] = bot.z;
        } else {
          let x = top.x + (bot.x - top.x) * t;
          let y = top.y + (bot.y - top.y) * t;
          let z = top.z + (bot.z - top.z) * t;
          const hl = Math.hypot(x, z) + 1e-6;
          const uAz = (u / nU) * Math.PI * 2;
          const micro = 0.0055 * TENT_SCALE * Math.sin(uAz * 9 + t * 11);
          const mid = Math.sin(Math.PI * t);
          x += (x / hl) * micro * mid;
          z += (z / hl) * micro * mid;
          pos[b] = x;
          pos[b + 1] = y;
          pos[b + 2] = z;
          pinned[ii] = 0;
        }
      }
    }

    prev.set(pos);

    /** Virtual guy points along each stake line — pull fabric down-out, not inward sag */
    const cableTargets = [];
    const nCable = Math.min(64, Math.max(20, Math.floor(nU / 4)));
    for (let c = 0; c < nCable; c++) {
      const u = Math.floor((c + 0.5) * nU / nCable) % nU;
      const top = ceilingRing[u];
      const bot = groundAnchors[u];
      const band = (c % 4) * 0.14;
      const tv = 0.36 + band;
      let cx = top.x + (bot.x - top.x) * tv;
      let cy = top.y + (bot.y - top.y) * tv;
      let cz = top.z + (bot.z - top.z) * tv;
      const ch = Math.hypot(cx, cz) + 1e-6;
      const outNudge = 0.026 * TENT_SCALE;
      cx += (cx / ch) * outNudge;
      cz += (cz / ch) * outNudge;
      cableTargets.push({ x: cx, y: cy, z: cz });
    }

    const edges = [];
    function pushEdge(a, b, k, restMul = 1) {
      const ax = pos[a * 3];
      const ay = pos[a * 3 + 1];
      const az = pos[a * 3 + 2];
      const bx = pos[b * 3];
      const by = pos[b * 3 + 1];
      const bz = pos[b * 3 + 2];
      const rest = Math.hypot(bx - ax, by - ay, bz - az) * restMul;
      edges.push({ a, b, rest, k });
    }

    for (let v = 0; v < nV; v++) {
      for (let u = 0; u < nU; u++) {
        const a = widx(u, v);
        const b = widx((u + 1) % nU, v);
        const c = widx(u, v + 1);
        const d = widx((u + 1) % nU, v + 1);
        pushEdge(a, b, kStruct * 1.06, 1);
        pushEdge(a, c, kStruct * 1.14, vRest);
        pushEdge(a, d, kShear * 1.05, 0.97);
        pushEdge(b, c, kShear * 1.05, 0.97);
      }
    }

    const acc = new Float32Array(count * 3);

    for (let it = 0; it < iters; it++) {
      acc.fill(0);
      for (let e = 0, nE = edges.length; e < nE; e++) {
        const ed = edges[e];
        const ia = ed.a;
        const ib = ed.b;
        const ba = ia * 3;
        const bb = ib * 3;
        let dx = pos[bb] - pos[ba];
        let dy = pos[bb + 1] - pos[ba + 1];
        let dz = pos[bb + 2] - pos[ba + 2];
        const len = Math.hypot(dx, dy, dz);
        if (len < 1e-9) continue;
        const s = ((len - ed.rest) / len) * ed.k;
        dx *= s;
        dy *= s;
        dz *= s;
        if (!pinned[ia]) {
          acc[ba] += dx;
          acc[ba + 1] += dy;
          acc[ba + 2] += dz;
        }
        if (!pinned[ib]) {
          acc[bb] -= dx;
          acc[bb + 1] -= dy;
          acc[bb + 2] -= dz;
        }
      }

      for (let vi = 0; vi < count; vi++) {
        if (pinned[vi]) continue;
        const b = vi * 3;
        acc[b + 1] += gY;
        const px = pos[b];
        const pz = pos[b + 2];
        const hl = Math.hypot(px, pz) + 1e-6;
        const vRowG = (vi / nU) | 0;
        const midArch = Math.sin((Math.PI * vRowG) / nV);
        const radialOE = outwardBias * (0.16 + 0.84 * midArch * midArch);
        acc[b] += (px / hl) * radialOE;
        acc[b + 2] += (pz / hl) * radialOE;
      }

      for (let vi = 0; vi < count; vi++) {
        if (pinned[vi]) continue;
        const u = vi % nU;
        const vRow = (vi / nU) | 0;
        if (vRow === 0 || vRow === nV) continue;
        const b = vi * 3;
        const px = pos[b];
        const py = pos[b + 1];
        const pz = pos[b + 2];
        const iCable = Math.floor((u / nU) * cableTargets.length) % cableTargets.length;
        for (let k = -1; k <= 1; k++) {
          const ct = cableTargets[(iCable + k + cableTargets.length) % cableTargets.length];
          const dx = ct.x - px;
          const dy = ct.y - py;
          const dz = ct.z - pz;
          const d2 = dx * dx + dy * dy + dz * dz + 280;
          const w = k === 0 ? 1 : 0.42;
          const f = (cableK * TENT_SCALE / d2) * w;
          acc[b] += dx * f;
          acc[b + 1] += dy * f;
          acc[b + 2] += dz * f;
        }
      }

      for (let vi = 0; vi < count; vi++) {
        if (pinned[vi]) continue;
        const u = vi % nU;
        const vRow = (vi / nU) | 0;
        if (vRow === 0 || vRow === nV) continue;
        const b = vi * 3;
        const top = ceilingRing[u];
        const bot = groundAnchors[u];
        const t = vRow / nV;
        const tx = top.x + (bot.x - top.x) * t;
        const ty = top.y + (bot.y - top.y) * t;
        const tz = top.z + (bot.z - top.z) * t;
        const dx = tx - pos[b];
        const dy = ty - pos[b + 1];
        const dz = tz - pos[b + 2];
        const ck = chordK * TENT_SCALE;
        acc[b] += dx * ck;
        acc[b + 1] += dy * ck;
        acc[b + 2] += dz * ck;
      }

      for (let vi = 0; vi < count; vi++) {
        if (pinned[vi]) continue;
        const b = vi * 3;
        const px = pos[b];
        const py = pos[b + 1];
        const pz = pos[b + 2];
        const qx = prev[b];
        const qy = prev[b + 1];
        const qz = prev[b + 2];
        const nx = px + (px - qx) * damping + acc[b] * dt * dt;
        const ny = py + (py - qy) * damping + acc[b + 1] * dt * dt;
        const nz = pz + (pz - qz) * damping + acc[b + 2] * dt * dt;
        prev[b] = px;
        prev[b + 1] = py;
        prev[b + 2] = pz;
        pos[b] = nx;
        pos[b + 1] = ny;
        pos[b + 2] = nz;
      }

      for (let vi = 0; vi < count; vi++) {
        if (!pinned[vi]) continue;
        const b = vi * 3;
        pos[b] = pinTarget[b];
        pos[b + 1] = pinTarget[b + 1];
        pos[b + 2] = pinTarget[b + 2];
        prev[b] = pinTarget[b];
        prev[b + 1] = pinTarget[b + 1];
        prev[b + 2] = pinTarget[b + 2];
      }
    }

    const verts = new Float32Array(count * 3);
    verts.set(pos);
    const uvs = new Float32Array(count * 2);
    const indices = [];
    for (let v = 0; v <= nV; v++) {
      for (let u = 0; u < nU; u++) {
        const ii = widx(u, v);
        uvs[ii * 2] = u / nU;
        uvs[ii * 2 + 1] = v / nV;
      }
    }
    for (let v = 0; v < nV; v++) {
      for (let u = 0; u < nU; u++) {
        const a = widx(u, v);
        const b = widx((u + 1) % nU, v);
        const c = widx(u, v + 1);
        const d = widx((u + 1) % nU, v + 1);
        indices.push(a, c, b, b, c, d);
      }
    }

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(verts, 3));
    geo.setAttribute('uv', new THREE.BufferAttribute(uvs, 2));
    geo.setIndex(indices);
    geo.computeVertexNormals();
    return { geometry: geo, vertexCount: count };
  }

  function createMicroCityFabricEnclosure(bedding, envMap) {
    const g = new THREE.Group();

    const anchorPoints = createAnchors();
    const mastData = createMasts();
    const tensile = generateTensileSurface(anchorPoints, mastData, {
      nu: 82,
      nv: 82,
      iterations: 252,
      gravityY: -0.00175 * TENT_SCALE,
      kStructural: 0.97,
      kShear: 0.37,
      convexBulgeAmp: 0.128,
      undulationAmp: 0.017,
      inflateK: 0.0155,
    });

    const wallAnchors = createWallGroundAnchors(tensile.ceilingRing);
    const wallMem = generateWallMembrane(tensile.ceilingRing, wallAnchors, {
      nV: 38,
      iterations: 228,
      outwardBias: 0.041 * TENT_SCALE,
      cableK: 0.125,
      chordK: 0.029,
      gravityY: -0.0014 * TENT_SCALE,
      kStructural: 1.24,
      kShear: 0.55,
      verticalRestScale: 0.86,
    });

    const roofBumpRep = 3.2;
    const rBump = bedding.bumpMap.clone();
    rBump.wrapS = rBump.wrapT = THREE.RepeatWrapping;
    rBump.repeat.set(roofBumpRep * 2.0, roofBumpRep * 2.0);
    const wallBump = bedding.bumpMap.clone();
    wallBump.wrapS = wallBump.wrapT = THREE.RepeatWrapping;
    wallBump.repeat.set(roofBumpRep * 2.05, roofBumpRep * 2.12);
    const wallMap = bedding.map.clone();
    wallMap.wrapS = wallMap.wrapT = THREE.RepeatWrapping;
    wallMap.repeat.set(5.4, 5.2);

    const skinRoofMat = new THREE.MeshStandardMaterial({
      color: 0xede8de,
      map: bedding.map,
      bumpMap: rBump,
      bumpScale: 0.011 * (TENT_SCALE / 4),
      roughness: 0.96,
      metalness: 0,
      envMap,
      envMapIntensity: 0.3,
      emissive: new THREE.Color(0xf3ede4),
      emissiveIntensity: 0.034,
      side: THREE.DoubleSide,
      transparent: true,
      opacity: 0.55,
      depthWrite: false,
    });
    const skinWallMat = skinRoofMat.clone();
    skinWallMat.color.setHex(0xeee6da);
    skinWallMat.map = wallMap;
    skinWallMat.bumpMap = wallBump;
    skinWallMat.bumpScale = 0.0185 * (TENT_SCALE / 4);
    skinWallMat.roughness = 0.94;
    skinWallMat.envMapIntensity = 0.34;
    skinWallMat.emissive.setHex(0xf2ebe0);
    skinWallMat.emissiveIntensity = 0.042;
    skinWallMat.opacity = 0.58;

    const roofGeo = tensile.geometry.clone();
    applyRoofCraterDisplacement(roofGeo);
    removeRoofTrianglesInsideOpening(roofGeo, OCULUS_CENTER_X, OCULUS_CENTER_Z, ROOF_OCULUS_CUT_R);
    const wallGeoForMerge = wallMem.geometry.clone();
    const roofIndexCount = roofGeo.index.count;
    const wallIndexCount = wallGeoForMerge.index.count;
    let mergedSkinGeo = mergeGeometries([roofGeo, wallGeoForMerge], false);
    mergedSkinGeo = mergeVertices(mergedSkinGeo, 3.6);
    mergedSkinGeo.clearGroups();
    mergedSkinGeo.addGroup(0, roofIndexCount, 0);
    mergedSkinGeo.addGroup(roofIndexCount, wallIndexCount, 1);
    mergedSkinGeo.computeVertexNormals();

    const unifiedSkinMesh = new THREE.Mesh(mergedSkinGeo, [skinRoofMat, skinWallMat]);
    unifiedSkinMesh.name = 'unifiedTentSkin';
    unifiedSkinMesh.visible = false;
    unifiedSkinMesh.frustumCulled = false;
    g.add(unifiedSkinMesh);

    const roofVeilGeo = tensile.geometry.clone();
    applyRoofCraterDisplacement(roofVeilGeo);
    removeRoofTrianglesInsideOpening(roofVeilGeo, OCULUS_CENTER_X, OCULUS_CENTER_Z, ROOF_OCULUS_CUT_R);
    const rBumpVeil = bedding.bumpMap.clone();
    rBumpVeil.wrapS = rBumpVeil.wrapT = THREE.RepeatWrapping;
    rBumpVeil.repeat.set(roofBumpRep * 2.0, roofBumpRep * 2.0);
    const roofVeilMat = skinRoofMat.clone();
    roofVeilMat.bumpMap = rBumpVeil;
    roofVeilMat.opacity = 0.34;
    roofVeilMat.emissiveIntensity = 0.048;
    roofVeilMat.envMapIntensity = 0.26;
    roofVeilMat.depthWrite = false;
    roofVeilMat.side = THREE.DoubleSide;
    const roofVeilMesh = new THREE.Mesh(roofVeilGeo, roofVeilMat);
    /** Вторая мембрана заметно ниже основного купола — читается как реальный второй слой, не отдельный «летающий» лист */
    roofVeilMesh.position.y = 1.52 * TENT_SCALE;
    roofVeilMesh.scale.set(1.01, 1, 1.01);
    roofVeilMesh.rotation.y = 0.011;

    const fabricRoofGroup = new THREE.Group();
    fabricRoofGroup.visible = false;
    fabricRoofGroup.add(roofVeilMesh);
    g.add(fabricRoofGroup);

    const tentFloorBump = makeTentInteriorFloorBumpMap();
    const fR = DIAMOND_R * 1.07;
    const floorShape = new THREE.Shape();
    floorShape.moveTo(0, -fR);
    floorShape.lineTo(fR, 0);
    floorShape.lineTo(0, fR);
    floorShape.lineTo(-fR, 0);
    floorShape.closePath();
    const floorGeo = new THREE.ShapeGeometry(floorShape, 36);
    floorGeo.rotateX(-Math.PI / 2);
    const fPos = floorGeo.attributes.position;
    const foldAmp = 0.06 * TENT_SCALE;
    for (let i = 0; i < fPos.count; i++) {
      const x = fPos.getX(i);
      const y = fPos.getY(i);
      const z = fPos.getZ(i);
      const w = Math.sin(x * 0.0092 + z * 0.0076) * Math.cos(z * 0.011 - x * 0.004);
      fPos.setY(i, y + foldAmp * w);
    }
    fPos.needsUpdate = true;
    floorGeo.computeVertexNormals();
    tentFloorBump.anisotropy = bedding.map.anisotropy || 1;
    const floorMat = new THREE.MeshStandardMaterial({
      color: 0xffffff,
      map: null,
      bumpMap: tentFloorBump,
      bumpScale: 0.018 * (TENT_SCALE / 4),
      roughness: 0.92,
      metalness: 0,
      envMap,
      envMapIntensity: 0.18,
      emissive: new THREE.Color(0x000000),
      emissiveIntensity: 0,
      side: THREE.DoubleSide,
      transparent: false,
      opacity: 1,
      depthWrite: true,
      polygonOffset: true,
      polygonOffsetFactor: 2,
      polygonOffsetUnits: 2,
    });
    const floorMesh = new THREE.Mesh(floorGeo, floorMat);
    floorMesh.name = 'tentInteriorFloor';
    const floorBaseY = 0.2 * TENT_SCALE;
    floorMesh.position.y = floorBaseY;
    floorMesh.renderOrder = 1;
    floorMesh.userData.floorBaseY = floorBaseY;
    /** Старт у верхней зоны купола/неба, не чуть над столом — визуально спуск с неба */
    floorMesh.userData.floorDropFromSky =
      SQ_ROOF_Y - floorBaseY + 2.05 * TENT_SCALE + FLOOR_SKY_DROP_EXTRA_SCALE * TENT_SCALE;
    g.add(floorMesh);

    const stakeEvery = Math.max(1, Math.floor(wallAnchors.length / 32));
    let nStakes = 0;
    for (let i = 0; i < wallAnchors.length; i += stakeEvery) nStakes++;
    const stakeGeo = new THREE.CylinderGeometry(0.05 * TENT_SCALE, 0.065 * TENT_SCALE, 0.055 * TENT_SCALE, 6);
    stakeGeo.translate(0, 0.028 * TENT_SCALE, 0);
    const stakeMat = new THREE.MeshStandardMaterial({
      color: 0x3a3630,
      roughness: 0.91,
      metalness: 0.07,
      envMap,
      envMapIntensity: 0.2,
    });
    const stakeMesh = new THREE.InstancedMesh(stakeGeo, stakeMat, nStakes);
    const stakeDummy = new THREE.Object3D();
    let stakeIdx = 0;
    for (let i = 0; i < wallAnchors.length; i += stakeEvery) {
      stakeDummy.position.copy(wallAnchors[i]);
      stakeDummy.rotation.set(0, 0, 0);
      stakeDummy.scale.setScalar(1);
      stakeDummy.updateMatrix();
      stakeMesh.setMatrixAt(stakeIdx++, stakeDummy.matrix);
    }
    stakeMesh.instanceMatrix.needsUpdate = true;
    stakeMesh.name = 'tentGroundStakes';
    g.add(stakeMesh);

    /**
     * Внутренние подвесные полосы (вуаль): вертикальные полупрозрачные панели под куполом,
     * не стены — глубина, проход сквозь слои, лёгкий крен в updateScene.
     */
    const hangingInteriorFabricGroup = new THREE.Group();
    hangingInteriorFabricGroup.name = 'hangingInteriorFabric';
    let hfSeed = 514229;
    function hfRnd() {
      hfSeed = (hfSeed * 16807 + 1013904223) >>> 0;
      return hfSeed / 4294967296;
    }
    const hfPlaced = [];
    const nHangPanels = 12;
    const floorTopY = 0.2 * TENT_SCALE;
    const minClearAboveFloor = 0.34 * TENT_SCALE;
    const voileMat = new THREE.MeshStandardMaterial({
      color: 0xfcfaf7,
      roughness: 0.96,
      metalness: 0,
      envMap,
      envMapIntensity: 0.38,
      emissive: new THREE.Color(0xf6f4f0),
      emissiveIntensity: 0.072,
      side: THREE.DoubleSide,
      transparent: true,
      opacity: 0.58,
      depthWrite: false,
    });
    function hfDiamondOk(px, pz) {
      return Math.abs(px) + Math.abs(pz) < DIAMOND_R * 0.84;
    }
    function hfOculusOk(px, pz) {
      return Math.hypot(px - OCULUS_CENTER_X, pz - OCULUS_CENTER_Z) > ROOF_OCULUS_CUT_R * 1.25 + 0.045 * TENT_SCALE;
    }
    const hangPeakLift =
      Math.max(...TENSILE_PEAK_SPEC.map((s) => s.yLift)) * TENT_SCALE;
    /** Одна линия крепления для всех штор (без рандома по Y — верх ровный).
     * При TENT_SCALE=24: ≈300 (было ≈307 при −0.19·T) */
    const hangRailY =
      SQ_ROOF_Y + hangPeakLift * 0.88 - 0.475 * TENT_SCALE;
    for (let hi = 0; hi < nHangPanels; hi++) {
      let px = 0;
      let pz = 0;
