<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ATPC — Stage</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #020206; }
    canvas { display: block; }
    #back {
      position: fixed; top: 36px; left: 40px;
      color: rgba(255,255,255,0.15);
      font: 300 10px/1 'Helvetica Neue', sans-serif;
      letter-spacing: .25em; text-transform: uppercase; text-decoration: none;
      transition: color .4s;
    }
    #back:hover { color: rgba(255,255,255,.5); }
    #label {
      position: fixed; bottom: 38px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 18px; pointer-events: none;
    }
    #label span {
      color: rgba(255,255,255,.12);
      font: 300 10px/1 'Helvetica Neue', sans-serif;
      letter-spacing: .32em; text-transform: uppercase; white-space: nowrap;
    }
  </style>
</head>
<body>
  <a href="../" id="back">← ATPC</a>
  <div id="label">
    <span>Stage</span><span>·</span><span>Ambient Zone</span>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script>
  'use strict';

  // ── Renderer — no shadows, capped pixel ratio ────────────────────────────
  const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 1.5));
  renderer.setSize(innerWidth, innerHeight);
  document.body.insertBefore(renderer.domElement, document.body.firstChild);

  const scene  = new THREE.Scene();
  scene.background = new THREE.Color(0x020206);
  scene.fog = new THREE.Fog(0x020206, 10, 32);

  const camera = new THREE.PerspectiveCamera(58, innerWidth / innerHeight, 0.1, 100);
  camera.position.set(0, -1.5, 9);
  camera.lookAt(0, 2, 0);

  // ── Lights ────────────────────────────────────────────────────────────────
  scene.add(new THREE.AmbientLight(0x0d1020, 1));

  const keyL = new THREE.DirectionalLight(0xd8eeff, 1.4);
  keyL.position.set(4, 10, 5);
  scene.add(keyL);

  const fillL = new THREE.DirectionalLight(0x5570a0, 0.5);
  fillL.position.set(-5, 3, -3);
  scene.add(fillL);

  // Soft under-fill simulating scattered beam light
  const underL = new THREE.PointLight(0x6888b8, 0.7, 20, 2);
  underL.position.set(0, -1, 0);
  scene.add(underL);

  // ── Floor ─────────────────────────────────────────────────────────────────
  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(60, 60),
    new THREE.MeshPhongMaterial({ color: 0x05050d, shininess: 40, specular: 0x141828 })
  );
  floor.rotation.x = -Math.PI / 2;
  floor.position.y = -5.8;
  scene.add(floor);

  // ── Pneu Canopy — geometry built ONCE, animation fully in vertex shader ──
  //
  // Vertex shader reads the rest-pose position and adds wave displacement.
  // No CPU loop, no computeVertexNormals() — normals estimated via finite
  // differences inside GLSL. Updating u_time is the only per-frame CPU work.
  //

  const VERT = /* glsl */`
    uniform float u_time;
    varying vec3 v_wpos;
    varying vec3 v_wnorm;

    // Layered wave displacement (same formula as before, now on GPU)
    float disp(float x, float z, float t) {
      float r = length(vec2(x, z));
      float breathe = sin(t * 0.45) * 0.15;
      float w1 = sin(x * 0.55 + t * 1.4) * cos(z * 0.40 + t * 0.90) * 0.12;
      float w2 = sin(r * 0.60 - t * 1.10) * 0.09;
      float w3 = cos(x * 0.28 - z * 0.22 + t * 2.20) * 0.07;
      return breathe + w1 + w2 + w3;
    }

    void main() {
      // Normalised radius (0 = centre, 1 = wing tip ≈ 5.5 units)
      float v = clamp(length(position.xz) / 5.5, 0.0, 1.0);

      float dy  = disp(position.x, position.z, u_time) * v;
      vec3  pos = position + vec3(0.0, dy, 0.0);

      // Finite-difference normal — sample two neighbours in GLSL
      float e   = 0.10;
      float dyx = disp(position.x + e, position.z,     u_time) * v;
      float dyz = disp(position.x,     position.z + e, u_time) * v;
      vec3 tx   = normalize(vec3(e, dyx - dy, 0.0));
      vec3 tz   = normalize(vec3(0.0, dyz - dy, e));
      vec3 n    = normalize(cross(tz, tx));

      v_wnorm = normalize(mat3(modelMatrix) * n);
      v_wpos  = (modelMatrix * vec4(pos, 1.0)).xyz;

      gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
    }
  `;

  const FRAG = /* glsl */`
    uniform vec3 cameraPosition;
    varying vec3 v_wpos;
    varying vec3 v_wnorm;

    void main() {
      vec3 n = normalize(v_wnorm);

      vec3 keyDir  = normalize(vec3(4.0, 10.0, 5.0));
      vec3 fillDir = normalize(vec3(-5.0, 3.0, -3.0));

      float key      = max(dot(n,  keyDir),  0.0) * 0.88;
      float keyBack  = max(dot(-n, keyDir),  0.0) * 0.18; // underside lit
      float fill     = max(dot(n,  fillDir), 0.0) * 0.35;
      float ambient  = 0.14;
      float light    = ambient + key + keyBack + fill;

      vec3 color = vec3(0.93, 0.90, 0.86) * light;

      // Simple depth fog matching scene.fog
      float dist = length(v_wpos - cameraPosition);
      float fogF = smoothstep(10.0, 32.0, dist);
      color = mix(color, vec3(0.008, 0.008, 0.024), fogF);

      gl_FragColor = vec4(color, 1.0);
    }
  `;

  const canopyMat = new THREE.ShaderMaterial({
    uniforms:       { u_time: { value: 0 } },
    vertexShader:   VERT,
    fragmentShader: FRAG,
    side:           THREE.DoubleSide,
  });

  // Build radial pneu mesh once — 40 rings × 60 sectors ≈ 2400 vertices
  const RINGS = 40, SECTORS = 60, BASE_R = 3.8;

  function pneuH(v, u) {
    const wing = Math.cos(2 * u);
    let h = v <= 0.5
      ? 1.8 + (v / 0.5) * (1 - v / 0.5) * 7.2          // dome up
      : 1.8 - Math.pow((v - 0.5) / 0.5, 2) * 5.5;       // drape down
    if (v > 0.5) h += wing * (v - 0.5);
    return h;
  }

  (function buildPneu() {
    const pos = [], uvs = [], idx = [];
    pos.push(0, pneuH(0, 0), 0); uvs.push(0.5, 0.5);

    for (let ri = 0; ri < RINGS; ri++) {
      const v = (ri + 1) / RINGS;
      for (let si = 0; si < SECTORS; si++) {
        const u = (si / SECTORS) * Math.PI * 2;
        const r = v * BASE_R * (1 + 0.35 * Math.cos(2 * u));
        pos.push(Math.cos(u) * r, pneuH(v, u), Math.sin(u) * r);
        uvs.push(0.5 + Math.cos(u) * v * 0.5, 0.5 + Math.sin(u) * v * 0.5);
      }
    }
    for (let s = 0; s < SECTORS; s++)
      idx.push(0, 1 + s, 1 + (s + 1) % SECTORS);

    for (let r = 0; r < RINGS - 1; r++) {
      const A = 1 + r * SECTORS, B = 1 + (r + 1) * SECTORS;
      for (let s = 0; s < SECTORS; s++) {
        const a = A + s, b = A + (s + 1) % SECTORS;
        const c = B + s, d = B + (s + 1) % SECTORS;
        idx.push(a, c, b,  b, c, d);
      }
    }

    const g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
    g.setAttribute('uv',       new THREE.Float32BufferAttribute(uvs, 2));
    g.setIndex(idx);

    const pneu = new THREE.Mesh(g, canopyMat);
    pneu.position.y = 2.5;
    scene.add(pneu);
  })();

  // ── Light beams — low-poly cones, additive blend ─────────────────────────
  // [x, z, tilt_x, tilt_z, intensity, phase]
  const BEAMS = [
    [-1.3,  0.7,  0.08, -0.05, 1.0, 0.0],
    [ 1.6, -0.7, -0.07,  0.09, 0.9, 1.8],
    [ 0.2,  1.8,  0.10,  0.03, 0.8, 3.5],
    [-0.5, -1.6, -0.05, -0.08, 1.0, 2.2],
  ];

  const BCOL   = 0xb8d4f0;
  const BH     = 14;           // beam height
  const BCY    = 7.5 - BH / 2; // cylinder centre Y

  const beams = BEAMS.map(([x, z, rx, rz, intens, phase]) => {
    const grp = new THREE.Group();

    // Halo (outer, back-side)
    const hMat = new THREE.MeshBasicMaterial({
      color: BCOL, transparent: true, opacity: 0.036 * intens,
      side: THREE.BackSide, blending: THREE.AdditiveBlending, depthWrite: false,
    });
    grp.add(new THREE.Mesh(
      new THREE.CylinderGeometry(0.22, 2.6, BH, 12, 1, true), hMat
    ));

    // Core (inner, front-side)
    const cMat = new THREE.MeshBasicMaterial({
      color: BCOL, transparent: true, opacity: 0.068 * intens,
      side: THREE.FrontSide, blending: THREE.AdditiveBlending, depthWrite: false,
    });
    grp.add(new THREE.Mesh(
      new THREE.CylinderGeometry(0.12, 1.9, BH, 12, 1, true), cMat
    ));

    grp.position.set(x, BCY, z);
    grp.rotation.set(rx, 0, rz);
    scene.add(grp);

    // Floor pool
    const pMat = new THREE.MeshBasicMaterial({
      color: BCOL, transparent: true, opacity: 0.09 * intens,
      blending: THREE.AdditiveBlending, depthWrite: false,
    });
    const pool = new THREE.Mesh(new THREE.CircleGeometry(2.2, 24), pMat);
    pool.rotation.x = -Math.PI / 2;
    pool.position.set(x, -5.7, z);
    scene.add(pool);

    // SpotLight (no shadow)
    const spot = new THREE.SpotLight(0xd0e8ff, 1.5 * intens, 24, Math.PI / 10, 0.4, 1.8);
    spot.position.set(x, 8.5, z);
    spot.target.position.set(x, -6, z);
    scene.add(spot, spot.target);

    return { grp, pool, cMat, hMat, pMat, phase, intens };
  });

  // ── Animate — only u_time + camera + beam pulse on CPU ───────────────────
  let clk = 0;

  (function tick() {
    requestAnimationFrame(tick);
    clk += 0.006;

    // Single uniform update — GPU does all fabric work
    canopyMat.uniforms.u_time.value = clk;

    // Beam opacity pulse
    beams.forEach(({ cMat, hMat, pMat, phase, intens }) => {
      const p = 0.82 + Math.sin(clk * 0.22 + phase) * 0.18;
      cMat.opacity = 0.068 * intens * p;
      hMat.opacity = 0.036 * intens * p;
      pMat.opacity = 0.09  * intens * (0.78 + Math.sin(clk * 0.3 + phase) * 0.22);
    });

    // Camera — slow interior orbit
    const R = 7.5;
    camera.position.x =  Math.sin(clk * 0.028) * R;
    camera.position.z =  Math.cos(clk * 0.028) * R;
    camera.position.y = -1.0 + Math.sin(clk * 0.014) * 2.5;
    camera.lookAt(0, 2.2, 0);

    renderer.render(scene, camera);
  })();

  window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });
  </script>
</body>
</html>
