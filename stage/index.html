<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ATPC — Stage</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* Body is tall — creates scroll depth; canvas is fixed */
    html { background: #020206; }
    body { height: 500vh; background: #020206; }

    canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: block;
    }

    /* ── Preloader ─────────────────────────────────────────────────────── */
    #loader {
      position: fixed; inset: 0; z-index: 100;
      background: #020206;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.8s ease;
    }
    #loader.hide { opacity: 0; pointer-events: none; }
    #loader-dot {
      width: 5px; height: 5px;
      background: rgba(255,255,255,.35);
      border-radius: 50%;
      animation: ldot 1.3s ease-in-out infinite;
    }
    @keyframes ldot {
      0%,100% { transform: scale(1);   opacity: .2; }
      50%      { transform: scale(2.2); opacity: .9; }
    }

    /* ── Navigation ────────────────────────────────────────────────────── */
    #back {
      position: fixed; top: 36px; left: 40px; z-index: 30;
      color: rgba(255,255,255,.15);
      font: 300 10px/1 'Helvetica Neue', sans-serif;
      letter-spacing: .25em; text-transform: uppercase; text-decoration: none;
      transition: color .4s;
    }
    #back:hover { color: rgba(255,255,255,.5); }

    /* ── Step labels ────────────────────────────────────────────────────── */
    .slabel {
      position: fixed;
      bottom: 18vh; left: 50%;
      transform: translateX(-50%) translateY(12px);
      text-align: center; pointer-events: none;
      opacity: 0;
      transition: opacity .7s ease, transform .7s ease;
      z-index: 20;
      white-space: nowrap;
    }
    .slabel.on {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .slabel h2 {
      color: rgba(255,255,255,.82);
      font: 200 clamp(26px, 4.5vw, 56px)/1 'Helvetica Neue', sans-serif;
      letter-spacing: .14em; text-transform: uppercase;
      margin-bottom: 10px;
    }
    .slabel p {
      color: rgba(255,255,255,.28);
      font: 300 10px/1.6 'Helvetica Neue', sans-serif;
      letter-spacing: .22em; text-transform: uppercase;
    }

    /* ── Scroll hint ────────────────────────────────────────────────────── */
    #hint {
      position: fixed; bottom: 36px; left: 50%;
      transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      pointer-events: none; z-index: 20;
      transition: opacity .8s ease;
    }
    #hint.hide { opacity: 0; }
    #hint span {
      color: rgba(255,255,255,.18);
      font: 300 9px/1 'Helvetica Neue', sans-serif;
      letter-spacing: .3em; text-transform: uppercase;
    }
    #hint-line {
      width: 1px; height: 32px;
      background: linear-gradient(to bottom, rgba(255,255,255,.22), transparent);
      animation: drip 2.2s ease-in-out infinite;
      transform-origin: top;
    }
    @keyframes drip {
      0%   { transform: scaleY(0); opacity: 1; }
      60%  { transform: scaleY(1); opacity: 1; }
      100% { transform: scaleY(1); opacity: 0; }
    }

    /* ── Step dots ──────────────────────────────────────────────────────── */
    #dots {
      position: fixed; right: 28px; top: 50%;
      transform: translateY(-50%);
      display: flex; flex-direction: column; gap: 14px;
      z-index: 20; pointer-events: none;
    }
    .dot {
      width: 3px; height: 3px; border-radius: 50%;
      background: rgba(255,255,255,.18);
      transition: background .4s, transform .4s;
    }
    .dot.on {
      background: rgba(255,255,255,.75);
      transform: scale(1.8);
    }
  </style>
</head>
<body>

  <div id="loader"><div id="loader-dot"></div></div>
  <a href="../" id="back">← ATPC</a>

  <!-- Step labels: shown one at a time -->
  <div class="slabel" id="sl0">
    <h2>Stage</h2>
    <p>An ambient zone for the festival</p>
  </div>
  <div class="slabel" id="sl1">
    <h2>Canopy</h2>
    <p>A pneumatic fabric structure breathing in space</p>
  </div>
  <div class="slabel" id="sl2">
    <h2>Light</h2>
    <p>Volumetric beams pierce through the fabric</p>
  </div>
  <div class="slabel" id="sl3">
    <h2>Ground</h2>
    <p>Light meets earth — you are inside</p>
  </div>
  <div class="slabel" id="sl4">
    <h2>ATPC Stage</h2>
    <p>Festival 2025</p>
  </div>

  <div id="hint"><span>Scroll</span><div id="hint-line"></div></div>

  <div id="dots">
    <div class="dot on" id="d0"></div>
    <div class="dot"    id="d1"></div>
    <div class="dot"    id="d2"></div>
    <div class="dot"    id="d3"></div>
    <div class="dot"    id="d4"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script>
  'use strict';

  // ── Renderer ──────────────────────────────────────────────────────────────
  const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 1.5));
  renderer.setSize(innerWidth, innerHeight);
  document.body.insertBefore(renderer.domElement, document.body.firstChild);

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x020206);

  const camera = new THREE.PerspectiveCamera(54, innerWidth / innerHeight, 0.1, 120);

  // ── Lights ────────────────────────────────────────────────────────────────
  scene.add(new THREE.AmbientLight(0x0d1020, 1));
  const keyL = new THREE.DirectionalLight(0xd8eeff, 1.4);
  keyL.position.set(4, 10, 5);
  scene.add(keyL);
  const fillL = new THREE.DirectionalLight(0x5570a0, 0.5);
  fillL.position.set(-5, 3, -3);
  scene.add(fillL);
  const underL = new THREE.PointLight(0x6888b8, 0.7, 20, 2);
  underL.position.set(0, -1, 0);
  scene.add(underL);

  // ── Floor ─────────────────────────────────────────────────────────────────
  const floorMat = new THREE.MeshPhongMaterial({
    color: 0x05050d, shininess: 40, specular: 0x141828,
    transparent: true, opacity: 0,
  });
  const floorMesh = new THREE.Mesh(new THREE.PlaneGeometry(60, 60), floorMat);
  floorMesh.rotation.x = -Math.PI / 2;
  floorMesh.position.y = -5.8;
  scene.add(floorMesh);

  // ── Canopy — GPU shader ───────────────────────────────────────────────────
  const VERT = /* glsl */`
    uniform float u_time;
    varying vec3 v_wpos;
    varying vec3 v_wnorm;

    float disp(float x, float z, float t) {
      float r  = length(vec2(x, z));
      float br = sin(t * 0.45) * 0.15;
      float w1 = sin(x * 0.55 + t * 1.4) * cos(z * 0.40 + t * 0.90) * 0.12;
      float w2 = sin(r * 0.60 - t * 1.10) * 0.09;
      float w3 = cos(x * 0.28 - z * 0.22 + t * 2.20) * 0.07;
      return br + w1 + w2 + w3;
    }

    void main() {
      float v   = clamp(length(position.xz) / 5.5, 0.0, 1.0);
      float dy  = disp(position.x, position.z, u_time) * v;
      vec3  pos = position + vec3(0.0, dy, 0.0);

      float e   = 0.10;
      float dyx = disp(position.x + e, position.z,     u_time) * v;
      float dyz = disp(position.x,     position.z + e, u_time) * v;
      vec3  tx  = normalize(vec3(e, dyx - dy, 0.0));
      vec3  tz  = normalize(vec3(0.0, dyz - dy, e));
      v_wnorm = normalize(mat3(modelMatrix) * normalize(cross(tz, tx)));
      v_wpos  = (modelMatrix * vec4(pos, 1.0)).xyz;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
    }
  `;

  const FRAG = /* glsl */`
    uniform float u_fade;
    uniform vec3  cameraPosition;
    varying vec3  v_wpos;
    varying vec3  v_wnorm;

    void main() {
      vec3 n       = normalize(v_wnorm);
      vec3 keyDir  = normalize(vec3(4.0, 10.0, 5.0));
      vec3 fillDir = normalize(vec3(-5.0, 3.0, -3.0));

      float key     = max(dot(n,  keyDir),  0.0) * 0.88;
      float keyBack = max(dot(-n, keyDir),  0.0) * 0.18;
      float fill    = max(dot(n,  fillDir), 0.0) * 0.35;
      float light   = 0.14 + key + keyBack + fill;

      vec3 color = vec3(0.93, 0.90, 0.86) * light;

      float dist = length(v_wpos - cameraPosition);
      float fog  = smoothstep(10.0, 32.0, dist);
      color = mix(color, vec3(0.008, 0.008, 0.024), fog);

      // Fade to black — no transparency needed
      gl_FragColor = vec4(color * u_fade, 1.0);
    }
  `;

  const canopyMat = new THREE.ShaderMaterial({
    uniforms: { u_time: { value: 0 }, u_fade: { value: 0 } },
    vertexShader: VERT, fragmentShader: FRAG,
    side: THREE.DoubleSide,
  });

  // Build radial pneu once — 40 rings × 60 sectors
  const RINGS = 40, SECTS = 60, BR = 3.8;
  function pH(v, u) {
    const w = Math.cos(2 * u);
    let h = v <= 0.5
      ? 1.8 + (v / 0.5) * (1 - v / 0.5) * 7.2
      : 1.8 - Math.pow((v - 0.5) / 0.5, 2) * 5.5;
    if (v > 0.5) h += w * (v - 0.5);
    return h;
  }
  (function buildPneu() {
    const pos = [], uvs = [], idx = [];
    pos.push(0, pH(0, 0), 0); uvs.push(0.5, 0.5);
    for (let ri = 0; ri < RINGS; ri++) {
      const v = (ri + 1) / RINGS;
      for (let si = 0; si < SECTS; si++) {
        const u = (si / SECTS) * Math.PI * 2;
        const r = v * BR * (1 + 0.35 * Math.cos(2 * u));
        pos.push(Math.cos(u) * r, pH(v, u), Math.sin(u) * r);
        uvs.push(0.5 + Math.cos(u) * v * 0.5, 0.5 + Math.sin(u) * v * 0.5);
      }
    }
    for (let s = 0; s < SECTS; s++)
      idx.push(0, 1 + s, 1 + (s + 1) % SECTS);
    for (let r = 0; r < RINGS - 1; r++) {
      const A = 1 + r * SECTS, B = 1 + (r + 1) * SECTS;
      for (let s = 0; s < SECTS; s++) {
        const a = A + s, b = A + (s + 1) % SECTS;
        const c = B + s, d = B + (s + 1) % SECTS;
        idx.push(a, c, b,  b, c, d);
      }
    }
    const g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
    g.setAttribute('uv',       new THREE.Float32BufferAttribute(uvs, 2));
    g.setIndex(idx);
    const pneu = new THREE.Mesh(g, canopyMat);
    pneu.position.y = 2.5;
    scene.add(pneu);
  })();

  // ── Light beams ───────────────────────────────────────────────────────────
  const BEAM_DEFS = [
    [-1.3,  0.7,  0.08, -0.05, 1.0, 0.0],
    [ 1.6, -0.7, -0.07,  0.09, 0.9, 1.8],
    [ 0.2,  1.8,  0.10,  0.03, 0.8, 3.5],
    [-0.5, -1.6, -0.05, -0.08, 1.0, 2.2],
  ];
  const BC = 0xb8d4f0, BH = 14, BCY = 7.5 - BH * 0.5;

  const beams = BEAM_DEFS.map(([x, z, rx, rz, intens, phase]) => {
    const grp = new THREE.Group();
    const hMat = new THREE.MeshBasicMaterial({
      color: BC, transparent: true, opacity: 0,
      side: THREE.BackSide, blending: THREE.AdditiveBlending, depthWrite: false,
    });
    const cMat = new THREE.MeshBasicMaterial({
      color: BC, transparent: true, opacity: 0,
      side: THREE.FrontSide, blending: THREE.AdditiveBlending, depthWrite: false,
    });
    grp.add(new THREE.Mesh(new THREE.CylinderGeometry(0.22, 2.6, BH, 12, 1, true), hMat));
    grp.add(new THREE.Mesh(new THREE.CylinderGeometry(0.12, 1.9, BH, 12, 1, true), cMat));
    grp.position.set(x, BCY, z);
    grp.rotation.set(rx, 0, rz);
    scene.add(grp);

    const pMat = new THREE.MeshBasicMaterial({
      color: BC, transparent: true, opacity: 0,
      blending: THREE.AdditiveBlending, depthWrite: false,
    });
    const pool = new THREE.Mesh(new THREE.CircleGeometry(2.2, 24), pMat);
    pool.rotation.x = -Math.PI / 2;
    pool.position.set(x, -5.7, z);
    scene.add(pool);

    const spot = new THREE.SpotLight(0xd0e8ff, 0, 24, Math.PI / 10, 0.4, 1.8);
    spot.position.set(x, 8.5, z);
    spot.target.position.set(x, -6, z);
    scene.add(spot, spot.target);

    return { cMat, hMat, pMat, spot, phase, intens };
  });

  // ── Scroll stage keyframes ─────────────────────────────────────────────────
  //
  // Each keyframe: camera position + lookAt + what's visible
  //
  const KF = [
    { pos: [0, 10, 16],  look: [0, 3, 0],   canopy: 0, beam: 0, floor: 0 }, // 0 empty space
    { pos: [10, 3, 11],  look: [0, 3, 0],   canopy: 1, beam: 0, floor: 0 }, // 1 canopy
    { pos: [6, -0.5, 9], look: [0, 2, 0],   canopy: 1, beam: 1, floor: 0 }, // 2 beams
    { pos: [2, -3.5, 7], look: [0, 0.5, 0], canopy: 1, beam: 1, floor: 1 }, // 3 ground
    { pos: [-5, 1, 8],   look: [0, 2.5, 0], canopy: 1, beam: 1, floor: 1 }, // 4 full
  ];

  // Label visibility windows [inAt, outAt] for each step (in progress 0-1)
  const LWIN = [
    [0.00, 0.14],
    [0.21, 0.40],
    [0.46, 0.62],
    [0.68, 0.80],
    [0.87, 1.00],
  ];

  const labels  = [0,1,2,3,4].map(i => document.getElementById('sl' + i));
  const dots    = [0,1,2,3,4].map(i => document.getElementById('d' + i));
  const hint    = document.getElementById('hint');
  const loader  = document.getElementById('loader');

  // ── Lerp helpers ──────────────────────────────────────────────────────────
  function lerp(a, b, t) { return a + (b - a) * t; }
  function smoothstep(t) { t = Math.max(0, Math.min(1, t)); return t * t * (3 - 2 * t); }
  function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }

  // Pre-allocated vectors
  const posA = new THREE.Vector3(), posB = new THREE.Vector3();
  const lkA  = new THREE.Vector3(), lkB  = new THREE.Vector3();
  const lkT  = new THREE.Vector3();

  // ── State ─────────────────────────────────────────────────────────────────
  let clk    = 0;           // animation clock (always runs)
  let rawSP  = 0;           // raw scroll progress 0–1
  let sp     = 0;           // smoothed scroll progress

  window.addEventListener('scroll', () => {
    const max = document.documentElement.scrollHeight - innerHeight;
    rawSP = max > 0 ? clamp(scrollY / max, 0, 1) : 0;
  }, { passive: true });

  // ── Main update ───────────────────────────────────────────────────────────
  function updateScene(p) {
    // Which transition segment (0–3) and local progress within it
    const step4 = p * 4;
    const s     = clamp(Math.floor(step4), 0, 3);
    const t     = smoothstep(step4 - s);

    const A = KF[s], B = KF[s + 1];

    // Camera position
    posA.set(...A.pos); posB.set(...B.pos);
    camera.position.lerpVectors(posA, posB, t);
    // Subtle life wobble on top
    camera.position.x += Math.sin(clk * 0.18) * 0.25;
    camera.position.y += Math.cos(clk * 0.13) * 0.18;

    // Camera lookAt
    lkA.set(...A.look); lkB.set(...B.look);
    lkT.lerpVectors(lkA, lkB, t);
    camera.lookAt(lkT);

    // Canopy fade
    canopyMat.uniforms.u_fade.value = lerp(A.canopy, B.canopy, t);

    // Beams
    const beamA = lerp(A.beam, B.beam, t);
    beams.forEach(({ cMat, hMat, pMat, spot, phase, intens }) => {
      const pulse = 0.82 + Math.sin(clk * 0.22 + phase) * 0.18;
      cMat.opacity = 0.068 * intens * beamA * pulse;
      hMat.opacity = 0.036 * intens * beamA * pulse;
      pMat.opacity = 0.09  * intens * beamA * (0.78 + Math.sin(clk * 0.3 + phase) * 0.22);
      spot.intensity = 1.5 * intens * beamA;
    });

    // Floor
    floorMat.opacity = lerp(A.floor, B.floor, t);

    // Labels
    LWIN.forEach(([inAt, outAt], i) => {
      const vis = p >= inAt && p <= outAt;
      labels[i].classList.toggle('on', vis);
    });

    // Active dot
    const activeDot = Math.round(p * 4);
    dots.forEach((d, i) => d.classList.toggle('on', i === activeDot));

    // Scroll hint
    hint.classList.toggle('hide', p > 0.07);
  }

  // ── Render loop ───────────────────────────────────────────────────────────
  let firstFrame = true;
  const targetFPS = 60;
  let lastFrameTime = 0;

  function tick(now) {
    requestAnimationFrame(tick);

    // Frame-rate cap (same as elnurio.com)
    if (now - lastFrameTime < 1000 / targetFPS) return;
    lastFrameTime = now;

    clk += 0.006;

    // Smooth scroll progress
    sp += (rawSP - sp) * 0.055;

    canopyMat.uniforms.u_time.value = clk;
    updateScene(sp);
    renderer.render(scene, camera);

    // Remove preloader after first render
    if (firstFrame) {
      firstFrame = false;
      setTimeout(() => loader.classList.add('hide'), 100);
    }
  }

  requestAnimationFrame(tick);

  window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });
  </script>
</body>
</html>
