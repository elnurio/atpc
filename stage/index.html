<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ATPC — Stage</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { background: #e0d8cc; }
    body { background: #e0d8cc; overscroll-behavior: none; }
    canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: block; }

    #loader {
      position: fixed; inset: 0; z-index: 100; background: #e0d8cc;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 1s ease;
    }
    #loader.hide { opacity: 0; pointer-events: none; }
    #loader-dot {
      width: 5px; height: 5px; border-radius: 50%; background: rgba(0,0,0,.18);
      animation: ldot 1.4s ease-in-out infinite;
    }
    @keyframes ldot { 0%,100%{transform:scale(1);opacity:.2} 50%{transform:scale(2.2);opacity:.75} }

    #back {
      position: fixed; top: 36px; left: 40px; z-index: 30;
      color: rgba(0,0,0,.22); font: 300 10px/1 'Helvetica Neue', sans-serif;
      letter-spacing: .25em; text-transform: uppercase; text-decoration: none;
      transition: color .4s;
    }
    #back:hover { color: rgba(0,0,0,.55); }

    .slabel {
      position: fixed; bottom: 18vh; left: 50%;
      transform: translateX(-50%) translateY(12px);
      text-align: center; pointer-events: none; opacity: 0;
      transition: opacity .65s ease, transform .65s ease;
      z-index: 20; white-space: nowrap;
    }
    .slabel.on { opacity: 1; transform: translateX(-50%) translateY(0); }
    .slabel h2 {
      color: rgba(0,0,0,.7);
      font: 200 clamp(24px, 4vw, 52px)/1 'Helvetica Neue', sans-serif;
      letter-spacing: .14em; text-transform: uppercase; margin-bottom: 10px;
    }
    .slabel p {
      color: rgba(0,0,0,.28);
      font: 300 10px/1.6 'Helvetica Neue', sans-serif;
      letter-spacing: .22em; text-transform: uppercase;
    }

    #hint {
      position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      pointer-events: none; z-index: 20; transition: opacity .8s ease;
    }
    #hint.hide { opacity: 0; }
    #hint span { color: rgba(0,0,0,.2); font: 300 9px/1 'Helvetica Neue', sans-serif; letter-spacing: .3em; text-transform: uppercase; }
    #hint-line {
      width: 1px; height: 32px;
      background: linear-gradient(to bottom, rgba(0,0,0,.2), transparent);
      animation: drip 2.2s ease-in-out infinite; transform-origin: top;
    }
    @keyframes drip { 0%{transform:scaleY(0);opacity:1} 60%{transform:scaleY(1);opacity:1} 100%{transform:scaleY(1);opacity:0} }

    #dots {
      position: fixed; right: 28px; top: 50%; transform: translateY(-50%);
      display: flex; flex-direction: column; gap: 14px; z-index: 20; pointer-events: none;
    }
    .dot {
      width: 3px; height: 3px; border-radius: 50%;
      background: rgba(0,0,0,.15); transition: background .4s, transform .4s;
    }
    .dot.on { background: rgba(0,0,0,.65); transform: scale(1.8); }
  </style>
</head>
<body>
  <div id="loader"><div id="loader-dot"></div></div>
  <a href="../" id="back">← ATPC</a>

  <div class="slabel" id="sl0"><h2>Location</h2><p>Sandy site — an open ground for the festival</p></div>
  <div class="slabel" id="sl1"><h2>Structure</h2><p>Support poles rise — the suspension system takes form</p></div>
  <div class="slabel" id="sl2"><h2>Stage</h2><p>The pneumatic canopy inflates above the space</p></div>
  <div class="slabel" id="sl3"><h2>Light</h2><p>Sunlight pierces through the fabric</p></div>
  <div class="slabel" id="sl4"><h2>Interior</h2><p>Step inside the ambient zone</p></div>

  <div id="hint"><span>Scroll</span><div id="hint-line"></div></div>
  <div id="dots">
    <div class="dot on" id="d0"></div><div class="dot" id="d1"></div>
    <div class="dot" id="d2"></div><div class="dot" id="d3"></div><div class="dot" id="d4"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script>
  'use strict';

  // ── Renderer ──────────────────────────────────────────────────────
  const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 1.5));
  // Lock height once — prevents mobile browser chrome (address bar)
  // from changing innerHeight mid-scroll and causing the canvas to jump
  let lockedH = innerHeight;
  document.body.style.height = (lockedH * 6) + 'px';
  renderer.setSize(innerWidth, lockedH);
  document.body.insertBefore(renderer.domElement, document.body.firstChild);

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0xe0d8cc);
  scene.fog = new THREE.Fog(0xe0d8cc, 25, 80);

  const camera = new THREE.PerspectiveCamera(42, innerWidth / lockedH, 0.1, 200);

  // ── Lights ────────────────────────────────────────────────────────
  scene.add(new THREE.HemisphereLight(0xdde6f0, 0xc8b080, 0.85));
  const sun = new THREE.DirectionalLight(0xffe8c8, 1.8);
  sun.position.set(14, 20, 8);
  scene.add(sun);
  const fill = new THREE.DirectionalLight(0xfff4e8, 0.35);
  fill.position.set(-8, 8, -5);
  scene.add(fill);

  // ── Ground — sandy desert ─────────────────────────────────────────
  // Outer earth
  scene.add(Object.assign(
    new THREE.Mesh(new THREE.PlaneGeometry(80, 80),
      new THREE.MeshLambertMaterial({ color: 0xa08860 })),
    { rotation: { x: -Math.PI / 2 }, position: { x: 0, y: -0.04, z: 0 } }
  ));
  // Sandy plaza (stage footprint)
  scene.add(Object.assign(
    new THREE.Mesh(new THREE.PlaneGeometry(22, 22),
      new THREE.MeshLambertMaterial({ color: 0xc0a878 })),
    { rotation: { x: -Math.PI / 2 }, position: { x: 0, y: 0, z: 0 } }
  ));

  // ── Canopy — Rotational Pneu — GPU shader ─────────────────────────
  const VERT = /* glsl */`
    uniform float u_time;
    varying vec3 v_wpos;
    varying vec3 v_wnorm;

    float disp(float x, float z, float t) {
      float r  = length(vec2(x, z));
      float br = sin(t * 0.28) * 0.07;
      float w1 = sin(x * 0.38 + t * 0.85) * cos(z * 0.28 + t * 0.65) * 0.05;
      float w2 = sin(r * 0.45 - t * 0.70) * 0.04;
      return br + w1 + w2;
    }

    void main() {
      float v   = clamp(length(position.xz) / 6.5, 0.0, 1.0);
      float dy  = disp(position.x, position.z, u_time) * v;
      vec3  pos = position + vec3(0.0, dy, 0.0);
      float e   = 0.12;
      float dyx = disp(position.x + e, position.z, u_time) * v;
      float dyz = disp(position.x, position.z + e, u_time) * v;
      vec3 tx   = normalize(vec3(e, dyx - dy, 0.0));
      vec3 tz   = normalize(vec3(0.0, dyz - dy, e));
      v_wnorm = normalize(mat3(modelMatrix) * normalize(cross(tz, tx)));
      v_wpos  = (modelMatrix * vec4(pos, 1.0)).xyz;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
    }
  `;

  const FRAG = /* glsl */`
    uniform float u_fade;
    uniform vec3  cameraPosition;
    varying vec3  v_wpos;
    varying vec3  v_wnorm;

    void main() {
      vec3 n       = normalize(v_wnorm);
      vec3 sunDir  = normalize(vec3(14.0, 20.0, 8.0));
      vec3 skyDir  = vec3(0.0, 1.0, 0.0);

      float sun    = max(dot(n,  sunDir), 0.0) * 0.82;
      float sky    = 0.36 + max(dot(n, skyDir), 0.0) * 0.20;
      float trans  = max(dot(-n, sunDir), 0.0) * 0.38; // backlit translucency
      float light  = sky + sun + trans;

      vec3 color   = vec3(0.97, 0.95, 0.90) * light;

      float dist   = length(v_wpos - cameraPosition);
      float fog    = smoothstep(20.0, 70.0, dist);
      color = mix(color, vec3(0.878, 0.847, 0.800), fog);

      // Fade from scene background (sandy mist) to full fabric
      vec3 bg = vec3(0.878, 0.847, 0.800);
      color   = mix(bg, color, u_fade);

      gl_FragColor = vec4(color, 1.0);
    }
  `;

  const canopyMat = new THREE.ShaderMaterial({
    uniforms: { u_time: { value: 0 }, u_fade: { value: 0 } },
    vertexShader: VERT, fragmentShader: FRAG,
    side: THREE.DoubleSide,
  });

  // Conical tent: pointed apex, rim seats on pole tops
  const RINGS = 48, SECTS = 64, BASE_R = 6.5;
  const CANOPY_Y = 4.2; // rim height = pole top level
  const CONE_H   = 8.8; // cone height above rim → world apex = CANOPY_Y + CONE_H

  function pneuH(v, u) {
    // apex (v=0) = CONE_H, rim (v=1) = 0
    return CONE_H * Math.pow(1.0 - v, 0.80);
  }
  function pneuR(v, u) {
    return v * BASE_R; // circular footprint
  }

  const tentGroup = new THREE.Group();

  (function buildPneu() {
    const pos = [], uvs = [], idx = [];
    pos.push(0, pneuH(0, 0), 0); uvs.push(0.5, 0.5);
    for (let ri = 0; ri < RINGS; ri++) {
      const v = (ri + 1) / RINGS;
      for (let si = 0; si < SECTS; si++) {
        const u = (si / SECTS) * Math.PI * 2;
        pos.push(Math.cos(u) * pneuR(v, u), pneuH(v, u), Math.sin(u) * pneuR(v, u));
        uvs.push(0.5 + Math.cos(u) * v * 0.5, 0.5 + Math.sin(u) * v * 0.5);
      }
    }
    for (let s = 0; s < SECTS; s++) idx.push(0, 1 + s, 1 + (s + 1) % SECTS);
    for (let r = 0; r < RINGS - 1; r++) {
      const A = 1 + r * SECTS, B = 1 + (r + 1) * SECTS;
      for (let s = 0; s < SECTS; s++) {
        const a = A + s, b = A + (s + 1) % SECTS;
        const c = B + s, d = B + (s + 1) % SECTS;
        idx.push(a, c, b, b, c, d);
      }
    }
    const g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
    g.setAttribute('uv',       new THREE.Float32BufferAttribute(uvs, 2));
    g.setIndex(idx);
    tentGroup.add(new THREE.Mesh(g, canopyMat));
  })();

  tentGroup.position.y = CANOPY_Y;
  scene.add(tentGroup);

  // ── Poles + suspension cables ─────────────────────────────────────
  // 6 tall poles around the pneu perimeter
  const N_POLES = 6;
  const POLE_R  = 6.2;   // radius from centre (slightly inside tent rim)
  const POLE_H  = CANOPY_Y; // pole tops align with tent rim
  const poleMat = new THREE.MeshPhongMaterial({ color: 0x6e6a62, shininess: 60, specular: 0x181810 });

  const polesGroup = new THREE.Group();

  for (let i = 0; i < N_POLES; i++) {
    const u = (i / N_POLES) * Math.PI * 2;
    const px = Math.cos(u) * POLE_R, pz = Math.sin(u) * POLE_R;
    const pole = new THREE.Mesh(
      new THREE.CylinderGeometry(0.06, 0.09, POLE_H, 6),
      poleMat
    );
    pole.position.set(px, POLE_H / 2, pz);
    polesGroup.add(pole);
  }

  // Start invisible — fade in with scroll
  polesGroup.traverse(c => { if (c.material) { c.material = c.material.clone(); c.material.transparent = true; c.material.opacity = 0; } });
  scene.add(polesGroup);

  // ── Interior furniture — Structure phase ──────────────────────────
  const interiorGroup = new THREE.Group();
  const fabMat  = new THREE.MeshLambertMaterial({ color: 0xeeeae0 }); // soft white fabric
  const woodMat = new THREE.MeshLambertMaterial({ color: 0xd8d2c6 }); // pale natural wood
  const djMat   = new THREE.MeshLambertMaterial({ color: 0xe4ddd2 }); // equipment white

  // ─ Low Japanese table (centre) ─
  const tableTop = new THREE.Mesh(new THREE.BoxGeometry(2.8, 0.08, 1.6), woodMat);
  tableTop.position.set(0, 0.22, 0);
  interiorGroup.add(tableTop);
  [[-1.22, -0.68], [1.22, -0.68], [-1.22, 0.68], [1.22, 0.68]].forEach(([tx, tz]) => {
    const leg = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.20, 0.06), woodMat);
    leg.position.set(tx, 0.10, tz);
    interiorGroup.add(leg);
  });

  // ─ DJ console on table ─
  const djBody = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.15, 1.2), djMat);
  djBody.position.set(0, 0.375, 0);
  interiorGroup.add(djBody);
  [-0.72, 0.72].forEach(x => {  // platters
    const pl = new THREE.Mesh(new THREE.CylinderGeometry(0.28, 0.28, 0.05, 24), djMat);
    pl.position.set(x, 0.475, 0);
    interiorGroup.add(pl);
  });
  const mixer = new THREE.Mesh(new THREE.BoxGeometry(0.52, 0.14, 0.95), djMat);
  mixer.position.set(0, 0.525, 0);
  interiorGroup.add(mixer);

  // ─ Loungers / futons (4 around the table) ─
  [
    [-3.0,  1.2,  0.6],
    [ 3.0,  1.2, -0.6],
    [-2.5, -2.8,  1.3],
    [ 2.5, -2.8, -1.3],
  ].forEach(([lx, lz, ry]) => {
    const mattress = new THREE.Mesh(new THREE.BoxGeometry(2.0, 0.16, 0.95), fabMat);
    mattress.position.set(lx, 0.08, lz);
    mattress.rotation.y = ry;
    interiorGroup.add(mattress);
    // pillow at head end
    const pil = new THREE.Mesh(new THREE.SphereGeometry(0.28, 10, 7), fabMat);
    pil.scale.set(1.0, 0.38, 0.82);
    pil.position.set(lx - Math.cos(ry) * 0.75, 0.19, lz - Math.sin(ry) * 0.75);
    interiorGroup.add(pil);
    // blanket lump
    const bk = new THREE.Mesh(new THREE.SphereGeometry(0.36, 8, 6), fabMat);
    bk.scale.set(1.25, 0.35, 0.88);
    bk.position.set(lx + Math.cos(ry) * 0.3, 0.18, lz + Math.sin(ry) * 0.3);
    interiorGroup.add(bk);
  });

  // ─ Scattered floor pillows ─
  [
    [ 0.8,  3.6, 0.4], [-0.7,  3.9, 1.2],
    [ 1.6, -3.6,-0.3], [-4.3,  0.5, 0.8],
    [ 4.2, -0.9,-0.5],
  ].forEach(([x, z, ry]) => {
    const fp = new THREE.Mesh(new THREE.SphereGeometry(0.30, 10, 6), fabMat);
    fp.scale.y = 0.32;
    fp.position.set(x, 0.10, z);
    fp.rotation.y = ry;
    interiorGroup.add(fp);
  });

  // ─ Column speakers (2, near edges) ─
  [[-4.5, -1.2], [4.5, 1.2]].forEach(([x, z]) => {
    const spk = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.26, 1.1, 18), djMat);
    spk.position.set(x, 0.55, z);
    interiorGroup.add(spk);
  });

  // Clone all materials, start fully invisible
  interiorGroup.traverse(c => {
    if (c.isMesh) { c.material = c.material.clone(); c.material.transparent = true; c.material.opacity = 0; }
  });
  scene.add(interiorGroup);

  // ── Sun beams — warm golden cones ────────────────────────────────
  // 4 beams through the fabric, slightly tilted toward sun
  const BEAM_DEFS = [
    [-0.8,  0.4, 0.06, -0.04, 1.0, 0.0],
    [ 1.0, -0.6,-0.05,  0.07, 0.85, 2.1],
    [ 0.2,  1.2, 0.08,  0.02, 0.9, 3.8],
    [-0.5, -1.0,-0.04, -0.06, 0.95, 1.4],
  ];
  const BCOL = 0xffe8a0;

  const beams = BEAM_DEFS.map(([x, z, rx, rz, intens, phase]) => {
    const g = new THREE.Group();
    const hMat = new THREE.MeshBasicMaterial({
      color: BCOL, transparent: true, opacity: 0,
      side: THREE.BackSide, blending: THREE.AdditiveBlending, depthWrite: false,
    });
    const cMat = new THREE.MeshBasicMaterial({
      color: BCOL, transparent: true, opacity: 0,
      side: THREE.FrontSide, blending: THREE.AdditiveBlending, depthWrite: false,
    });
    g.add(new THREE.Mesh(new THREE.CylinderGeometry(0.5, 3.0, 9, 16, 1, true), hMat));
    g.add(new THREE.Mesh(new THREE.CylinderGeometry(0.2, 1.8, 9, 16, 1, true), cMat));
    // Beam from y=CANOPY_Y+3 (inside fabric dome) down to y=CANOPY_Y-9/2
    g.position.set(x, CANOPY_Y - 0.5, z);
    g.rotation.set(rx, 0, rz);
    scene.add(g);

    const pMat = new THREE.MeshBasicMaterial({
      color: BCOL, transparent: true, opacity: 0,
      blending: THREE.AdditiveBlending, depthWrite: false,
    });
    const pool = new THREE.Mesh(new THREE.CircleGeometry(3.2, 24), pMat);
    pool.rotation.x = -Math.PI / 2; pool.position.set(x, 0.01, z);
    scene.add(pool);

    return { g, cMat, hMat, pMat, phase, intens };
  });

  // ── 5 scroll keyframes ────────────────────────────────────────────
  // p * 4 → step 0–4, lerp between KF[s] and KF[s+1]
  const KF = [
    { pos:[20, 28, 20], look:[0,  0,   0] }, // 0 — aerial empty
    { pos:[11,  7, 11], look:[0,  1.5, 0] }, // 1 — structure: medium aerial, interior visible
    { pos:[16, 10,  2], look:[0,  8.0, 0] }, // 2 — side view (tent silhouette)
    { pos:[12,  5,  0], look:[0,  8.5, 0] }, // 3 — side view + beams
    { pos:[ 5,  3,  5], look:[0,  1.0, 0] }, // 4 — inside corner, looking at furniture
  ];

  // Label windows [inAt, outAt]
  const LWIN = [
    [0.02, 0.18],
    [0.25, 0.42],
    [0.50, 0.65],
    [0.72, 0.85],
    [0.90, 1.00],
  ];

  const labels = [0,1,2,3,4].map(i => document.getElementById('sl' + i));
  const dots   = [0,1,2,3,4].map(i => document.getElementById('d' + i));
  const loader = document.getElementById('loader');
  const hint   = document.getElementById('hint');

  // ── Helpers ───────────────────────────────────────────────────────
  const lerp = (a,b,t) => a + (b - a) * t;
  const ss   = t => { t = Math.max(0, Math.min(1, t)); return t*t*(3-2*t); }
  const clamp = (v,a,b) => Math.max(a, Math.min(b, v));
  const posA = new THREE.Vector3(), posB = new THREE.Vector3();
  const lkA  = new THREE.Vector3(), lkB  = new THREE.Vector3();
  const lkT  = new THREE.Vector3();

  // ── State ─────────────────────────────────────────────────────────
  let clk = 0, rawSP = 0, sp = 0;
  let lastFrame = 0, firstFrame = true;
  const FPS = 60;

  window.addEventListener('scroll', () => {
    const max = document.documentElement.scrollHeight - lockedH;
    rawSP = max > 0 ? clamp(scrollY / max, 0, 1) : 0;
  }, { passive: true });

  // ── Scene update ──────────────────────────────────────────────────
  function updateScene(p) {
    const step4 = p * 4;
    const s = clamp(Math.floor(step4), 0, 3);
    const t = ss(step4 - s);

    // Camera
    posA.set(...KF[s].pos);   posB.set(...KF[s+1].pos);
    lkA.set(...KF[s].look);   lkB.set(...KF[s+1].look);
    camera.position.lerpVectors(posA, posB, t);
    camera.position.x += Math.sin(clk * 0.15) * 0.20;
    camera.position.y += Math.cos(clk * 0.11) * 0.12;
    lkT.lerpVectors(lkA, lkB, t);
    camera.lookAt(lkT);

    // Poles: fade in p=0.18→0.26
    const pA = clamp((p - 0.18) / 0.10, 0, 1);
    polesGroup.traverse(c => { if (c.material && 'opacity' in c.material) c.material.opacity = pA; });

    // Interior: fade in with Structure p=0.20→0.34
    const intA = clamp((p - 0.20) / 0.14, 0, 1);
    interiorGroup.traverse(c => { if (c.isMesh) c.material.opacity = intA; });

    // Canopy: fade in p=0.25→0.35
    canopyMat.uniforms.u_fade.value = clamp((p - 0.25) / 0.12, 0, 1);

    // Beams: appear p=0.68→0.80
    const bA = clamp((p - 0.68) / 0.12, 0, 1);
    beams.forEach(({ cMat, hMat, pMat, phase, intens }) => {
      const pulse = bA > 0.01 ? (0.82 + Math.sin(clk * 0.25 + phase) * 0.18) : 0;
      cMat.opacity = 0.18 * intens * bA * pulse;
      hMat.opacity = 0.08 * intens * bA * pulse;
      pMat.opacity = 0.32 * intens * bA * (0.78 + Math.sin(clk * 0.3 + phase) * 0.22);
    });

    // Labels
    LWIN.forEach(([inAt, outAt], i) => labels[i].classList.toggle('on', p >= inAt && p <= outAt));

    // Active dot
    const ad = clamp(Math.floor(p * 5), 0, 4);
    dots.forEach((d, i) => d.classList.toggle('on', i === ad));

    hint.classList.toggle('hide', p > 0.07);
  }

  // ── Render loop — FPS capped ──────────────────────────────────────
  function tick(now) {
    requestAnimationFrame(tick);
    if (now - lastFrame < 1000 / FPS) return;
    lastFrame = now;

    clk += 0.006;
    sp  += (rawSP - sp) * 0.055;

    canopyMat.uniforms.u_time.value = clk;
    tentGroup.rotation.y = clk * 0.008; // slow rotation of the pneu

    updateScene(sp);
    renderer.render(scene, camera);

    if (firstFrame) { firstFrame = false; setTimeout(() => loader.classList.add('hide'), 80); }
  }

  requestAnimationFrame(tick);

  // Only respond to width changes (e.g. orientation flip).
  // Height-only changes = mobile browser chrome hide/show → ignore.
  let _lastW = innerWidth;
  window.addEventListener('resize', () => {
    if (innerWidth === _lastW) return;
    _lastW = innerWidth;
    lockedH = innerHeight; // re-lock after orientation change
    document.body.style.height = (lockedH * 6) + 'px';
    camera.aspect = innerWidth / lockedH;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, lockedH);
  });
  </script>
</body>
</html>
